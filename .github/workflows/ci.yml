# Tier 2 — make check
# Runs gofumpt+gci diff, go vet, go build, golangci-lint, go test -race,
# go mod tidy check, coverage gate, and govulncheck.
# Non-merge-blocking: no required status check configured in branch protection.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    name: check (Tier 2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache dev tools
        uses: actions/cache@v4
        with:
          path: .tools
          key: tools-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Install dev tools
        run: make tools

      - name: make check
        run: make check
