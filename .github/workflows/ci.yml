# Tier 2 — make check-short
# Runs gofumpt+gci diff, go vet, go build, golangci-lint, and go test -short
# -race. Skips real-daemon E2E tests (skipRealDaemonE2EInShort) that require
# br, twin binaries, and a live daemon — none available on ubuntu-latest.
# Those tests belong in the separate Tier 3 hk-6hzci lane.
# Merge-blocking (A5): continue-on-error dropped — check-short failures now block merges.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    name: check (Tier 2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Cache dev tools
        uses: actions/cache@v4
        with:
          path: .tools
          key: tools-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Install dev tools
        run: make tools

      - name: make check-short
        run: make check-short

  hooks:
    name: hooks (non-merge-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache dev tools
        uses: actions/cache@v4
        with:
          path: .tools
          key: tools-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Install dev tools
        run: make tools

      - name: Install git hooks
        run: make install-hooks

      - name: Assert installed hooks match lefthook.yml
        run: make check-hooks
