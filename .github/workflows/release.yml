# Release pipeline — tag-triggered goreleaser build → dogfooding soak → manual CERTIFY.
#
# Stages (spec: specs/release-pipeline.md):
#   CREATE   — goreleaser builds the binary matrix and publishes a GitHub pre-release.
#   [soak]   — fleet dogfoods the pre-release on main continuously (days/weeks).
#   CERTIFY  — captain promotes to stable via `harmonik release certify` when confident.
#
# There is NO automated VALIDATE gate and NO auto-yank. Dogfooding IS the validation.
# A tag push publishes the pre-release and stops; CERTIFY is always a deliberate human act.
#
# Trigger: push of a signed tag matching v[0-9]+\.[0-9]+\.[0-9]+ to main.
# Refs: hk-6hkh8  Epic: hk-brc3z  Label: codename:release-pipeline
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  create:
    name: CREATE — goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Extract tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Record pre-release in release ledger
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          commit="$(git rev-list -n 1 "$tag")"

          git fetch origin main
          git checkout -B main origin/main
          git pull --ff-only origin main

          go run ./cmd/harmonik release record-create "$tag" \
            --commit "$commit" \
            --tag "$tag" \
            --project .

          if [ -z "$(git status --porcelain -- .harmonik/release-ledger.json)" ]; then
            echo "release ledger already contains $tag"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .harmonik/release-ledger.json
          git commit -m "chore(release): record $tag pre-release"
          git push origin HEAD:main
