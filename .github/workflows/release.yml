# Release pipeline — tag-triggered goreleaser build → dogfooding soak → manual CERTIFY.
#
# Stages (spec: specs/release-pipeline.md):
#   CREATE   — goreleaser builds the binary matrix and publishes a GitHub pre-release.
#   [soak]   — fleet dogfoods the pre-release on main continuously (days/weeks).
#   CERTIFY  — captain promotes to stable via `harmonik release certify` when confident.
#
# There is NO automated VALIDATE gate and NO auto-yank. Dogfooding IS the validation.
# A tag push publishes the pre-release and stops; CERTIFY is always a deliberate human act.
#
# Trigger: push of a signed tag matching v[0-9]+\.[0-9]+\.[0-9]+ to main.
# Refs: hk-6hkh8  Epic: hk-brc3z  Label: codename:release-pipeline
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  create:
    name: CREATE — goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Extract tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
