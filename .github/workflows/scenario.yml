# Tier 3 — make test-scenario
# Builds all twin binaries then runs the scenario suite (-race, -tags=scenario, 10m).
# Covers test/scenario/... and internal/daemon/... scenario build-tag files.
# Non-merge-blocking: no required status check configured in branch protection.
name: Scenario

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  schedule:
    # Nightly at 04:00 UTC. The job below sets continue-on-error, so this
    # workflow's run/workflow conclusion is ALWAYS green and does NOT surface
    # a failing scenario suite on its own. Failures are surfaced out-of-band by
    # ops-monitor, which probes this scheduled run's "make test-scenario" STEP
    # conclusion (scripts/ops-monitor-check.sh → checks['scenario-nightly']).
    # (hk-plw4z)
    - cron: "0 4 * * *"

jobs:
  scenario:
    name: scenario (Tier 3)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: make test-scenario
        run: make test-scenario
        continue-on-error: true
