version: "2"
run:
  timeout: 5m
  go: "1.25"
linters:
  default: none
  enable:
    # Correctness
    - errcheck        # unhandled errors — CRITICAL for agent-coded
    - govet           # stdlib correctness analyzers
    - staticcheck     # SA/ST/S correctness + simplification
    - ineffassign     # writes with no read
    - unused          # dead code (replaces deadcode/structcheck/varcheck)
    # gosimple removed: merged into `staticcheck` in golangci-lint v2 (no longer a standalone linter name)
    - errorlint       # %w wrapping + errors.Is/As correctness
    - nilerr          # returning nil when err is non-nil
    - copyloopvar     # Go 1.22+ loop var capture (redundant now, belt+suspenders)
    - testifylint     # testify misuse (wrong assertion fn, missing compare, etc.)
    - errchkjson      # ignored JSON marshal/unmarshal errors
    - exhaustive      # missing enum cases in switch statements
    # Resource / context
    - bodyclose       # http.Response.Body leaks
    - rowserrcheck    # sql.Rows.Err()
    - sqlclosecheck   # sql.Rows/Stmt close
    - contextcheck    # context.Context propagation
    - noctx           # http requests without context
    - containedctx    # context.Context stored in structs (ban)
    - fatcontext      # context.Context leaks in loops
    # Style / diagnostics
    - gocritic        # diagnostic + style bundle
    - revive          # replacement for golint; minimal ruleset
    - misspell        # typos in comments/strings
    - unparam         # always-same param values (catches dead branches)
    - unconvert       # unnecessary type conversions
    - prealloc        # slice prealloc hints
    - nakedret        # naked returns > 20 lines
    - nolintlint      # nolint directives must be justified
    - gosec           # security smells (advisory; see below)
    - forbidigo       # ban specific calls (see config)
    - depguard        # import-graph + component-layer rules (subsystem-organization.md)
    # ── Track C: complexity ceiling (ratchet via --new-from-rev; grandfathers existing) ──
    - funlen          # function length ceiling — new/changed code only
    - cyclop          # per-function cyclomatic complexity ceiling
    - gocognit        # cognitive complexity (better "hard to follow" signal than raw cyclo)
  exclusions:
    rules:
      # tools/ holds one-shot CLI utilities that print to stdout and run synchronously
      # without a broader cancellation context. forbidigo (fmt.Print*) and noctx
      # (exec.Command) bans target daemon/library code, not CLI tools.
      - path: ^tools/
        linters:
          - forbidigo
          - noctx
      # Complexity ceilings target production logic, not table-driven tests or the
      # full-stack scenario harness / self-assert audit packages.
      - path: (_test\.go$|^internal/scenario/|^internal/specaudit/)
        linters:
          - funlen
          - cyclop
          - gocognit
      # internal/testhelpers is test infrastructure invoked from *_test.go files;
      # forbidigo bans (panic) target production code paths, not assertion helpers.
      - path: ^internal/testhelpers/
        linters:
          - forbidigo
      # SC6 (agent-input-substrate T9): the time.Sleep/After/NewTimer ban is
      # PATH-SCOPED to the structured input-driver packages. This rule EXCLUDES
      # the SC6-DRIVER-CLOCKPORT finding for every file EXCEPT those packages
      # (path-except), so the ban bites ONLY there — FakeClock's own spin
      # (internal/substrate) and all other code stay unaffected. Matching on the
      # SC6-DRIVER-CLOCKPORT marker leaves the fmt.Print / panic bans intact.
      - linters:
          - forbidigo
        text: 'SC6-DRIVER-CLOCKPORT'
        path-except: internal/(codexinput|codexdriver)/
      # SC6 carve-out: the ban targets the PRODUCTION driver path. Driver test
      # files legitimately poll with time.Sleep (arm-before-advance spins) and
      # backstop with time.After — those are harness plumbing, not driver timing.
      - linters:
          - forbidigo
        text: 'SC6-DRIVER-CLOCKPORT'
        path: _test\.go$
  settings:
    errcheck: { check-type-assertions: true, check-blank: true, exclude-functions: ["(io.Closer).Close"] }
    revive:   { rules: [{name: exported}, {name: package-comments}, {name: var-naming}, {name: error-return}, {name: error-naming}, {name: if-return}] }
    gocritic: { enabled-tags: [diagnostic, performance, style], disabled-checks: [hugeParam, rangeValCopy] }
    nolintlint: { require-explanation: true, require-specific: true, allow-unused: false }
    funlen:
      lines: 100          # 104 existing funcs exceed this — all grandfathered by --new-from-rev
      statements: 60
      ignore-comments: true
    cyclop:
      max-complexity: 15  # per-function ceiling (linter default 10; 15 = headroom for real branching)
      package-average: 0  # disabled — rely on the per-function ceiling only
    gocognit:
      min-complexity: 20  # report cognitive complexity above 20 (golangci default 30; 20 is stricter)
    forbidigo:
      forbid:
        - { pattern: '^fmt\.Print.*$', msg: "use the structured logger" }
        - { pattern: '^panic$',         msg: "return an error; panics only in main/init" }
        # SC6 (agent-input-substrate T9): the structured Codex input-driver
        # packages must take EVERY wait through the substrate ClockPort so the
        # bounded-liveness windows replay in virtual time. A literal-Sleep ban
        # alone is insufficient — the live path's blind waits are time.After in a
        # select — so time.After / time.NewTimer are banned too. These bans are
        # SCOPED to the driver packages by the SC6-DRIVER-CLOCKPORT exclusion rule
        # below (path-except), so FakeClock's own spin (internal/substrate) and
        # every other package stay unaffected.
        - { pattern: '^time\.Sleep$',    msg: "SC6-DRIVER-CLOCKPORT: driver waits go through substrate.ClockPort.Sleep, never time.Sleep" }
        - { pattern: '^time\.After$',    msg: "SC6-DRIVER-CLOCKPORT: driver waits go through substrate.ClockPort, never time.After" }
        - { pattern: '^time\.NewTimer$', msg: "SC6-DRIVER-CLOCKPORT: driver waits go through substrate.ClockPort, never time.NewTimer" }
    depguard:
      # Component-graph rules (subsystem layering) live here per subsystem-organization.md §Dependency layering enforcement.
      # One `rules.<name>` entry per component; `files:` scopes the rule, `allow:`/`deny:` set the allowed edges.
      # Full matrix is in subsystem-organization.md. Example stub:
      rules:
        # BI-002: All Beads interactions MUST route through internal/brcli (the sole adapter).
        # No other harmonik package may access Beads's SQLite file directly or link against
        # a SQLite driver for Beads access. internal/brcli and internal/testhelpers are exempt.
        #
        # The ban covers database/sql (the stdlib SQL interface) and the four most common
        # pure-Go and cgo SQLite drivers. Additional drivers should be added here if they
        # appear in go.sum. The fixture in testdata/depguard/beads_direct_access_fixture.go
        # (//go:build ignore) exists to verify this rule fires when golangci-lint is run against it.
        #
        # Rationale: specs/beads-integration.md §4.2 BI-002.
        beads-direct-access-ban:
          files:
            - "**/*.go"
            - "!**/internal/brcli/**"
            - "!**/internal/testhelpers/**"
          deny:
            - { pkg: "database/sql", desc: "BI-002: Beads access must route through internal/brcli; direct SQL access is forbidden (specs/beads-integration.md §4.2)" }
            - { pkg: "github.com/mattn/go-sqlite3", desc: "BI-002: Beads SQLite driver must not be linked outside internal/brcli (specs/beads-integration.md §4.2)" }
            - { pkg: "modernc.org/sqlite", desc: "BI-002: Beads SQLite driver must not be linked outside internal/brcli (specs/beads-integration.md §4.2)" }
            - { pkg: "crawshaw.io/sqlite", desc: "BI-002: Beads SQLite driver must not be linked outside internal/brcli (specs/beads-integration.md §4.2)" }
            - { pkg: "zombiezen.com/go/sqlite", desc: "BI-002: Beads SQLite driver must not be linked outside internal/brcli (specs/beads-integration.md §4.2)" }

        # PL-INV-002: the daemon binary MUST NOT import any LLM SDK in its transitive closure.
        # At MVH no packages exist yet, so this is encoded as a global deny rule covering all source files.
        # When cmd/harmonik/ and internal/daemon/ land, narrow this rule to those file trees
        # and remove the global catch-all (or keep both for belt-and-suspenders).
        # Rationale: specs/process-lifecycle.md §PL-INV-002, §PL-018, architecture.md §4.2.
        llm-sdk-ban:
          files: ["**/*.go"]
          deny:
            - { pkg: "github.com/anthropics/", desc: "PL-INV-002: daemon must not import any LLM SDK" }
            - { pkg: "github.com/openai/", desc: "PL-INV-002: daemon must not import any LLM SDK" }
            - { pkg: "github.com/sashabaranov/go-openai", desc: "PL-INV-002: daemon must not import any LLM SDK" }
            - { pkg: "github.com/liushuangls/go-anthropic", desc: "PL-INV-002: daemon must not import any LLM SDK" }
  
        # crew: stdlib + core + self-import (external test pattern); MUST NOT import daemon.
        # The crew registry is a leaf durable-state package read by daemon and CLI.
        # Rationale: docs/plans/captain/05-specs/c2-spec.md §3.3; bead hk-i1ue4.
        crew:
          files: ["**/internal/crew/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/core"
            - "github.com/gregberns/harmonik/internal/crew"
          deny:
            - { pkg: "github.com/gregberns/harmonik/internal/daemon", desc: "crew MUST NOT import daemon (c2-spec.md §3.3)" }

        # keeper: stdlib + core + eventbus + presence + self-import (external test
        # pattern); MUST NOT import daemon or workloop.
        # presence: the hitl-decisions K5 orphan reaper (presence.ReapOrphanedDecisions)
        # runs on the keeper watch tick (watcher.go); internal/presence is the leaf
        # that owns the open-decision projection + the Offline presence predicate +
        # the reaper, so the keeper tick imports it without importing daemon
        # (hitl-decisions SPEC §5 / N9; bead hk-061).
        # Rationale: codename:session-keeper (hk-ekap1); bead hk-fzzc6, hk-061.
        keeper:
          files: ["**/internal/keeper/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/core"
            - "github.com/gregberns/harmonik/internal/eventbus"
            - "github.com/gregberns/harmonik/internal/presence"
            - "github.com/gregberns/harmonik/internal/keeper"
            - "github.com/gregberns/harmonik/internal/dashboard"
            - "github.com/gregberns/harmonik/internal/digest"
            # substrate: the ClockPort determinism seam (D4/SK-008/SK-R3). The
            # cycle core reads time exclusively through substrate.ClockPort so a
            # FakeClock can replay timeouts. substrate is a stdlib-only leaf; this
            # edge is the intended keeper→substrate consumer direction (the
            # reverse is denied by the substrate leaf rule). Rationale: T5.
            - "github.com/gregberns/harmonik/internal/substrate"
          deny:
            - { pkg: "github.com/gregberns/harmonik/internal/daemon", desc: "keeper MUST NOT import daemon (session-keeper spec hk-ekap1)" }
            - { pkg: "github.com/gregberns/harmonik/internal/workloop", desc: "keeper MUST NOT import workloop (session-keeper spec hk-ekap1)" }

        # Leaf: internal/core must not import any sibling subsystem.
        # In depguard v2 a deny-only rule defaults to stdlib-only; we must list
        # the narrow set of external deps core is permitted to use.
        core:
          files: ["**/internal/core/**"]
          allow:
            - "$gostd"
            - "github.com/google/uuid"
          deny:
            - { pkg: "github.com/gregberns/harmonik/internal/", desc: "core is a leaf; no subsystem imports" }
  
        # Queue: core only at scaffold time. eventbus import added by T12 (hk-hn363)
        # when queue-lifecycle events are wired. Spec ref: specs/queue-model.md §1.
        queue:
          files: ["**/internal/queue/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/core"

        # schedule: generic recurring-job primitive (codename:schedule, hk-0es).
        # Pure types + next-fire clock + durable single-writer store. Leaf:
        # stdlib + self-import only (no core dep today; action execution + the
        # work-loop tick live in internal/daemon which imports this package).
        # MUST NOT import daemon. Spec ref: hk-0es brief (operator-locked D1/D2).
        schedule:
          files: ["**/internal/schedule/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/schedule"
          deny:
            - { pkg: "github.com/gregberns/harmonik/internal/daemon", desc: "schedule MUST NOT import daemon (hk-0es: leaf primitive)" }

        # substrate: generic record→replay seam (codename:session-restart-substrate).
        # Leaf: stdlib + self-import only. Verticals instantiate substrate, never the
        # reverse. MUST NOT import a vertical (codex, keeper) or the daemon.
        # Rationale: specs/replay-substrate.md §RS-005; substrate-design.md §1.3.
        substrate:
          files: ["**/internal/substrate/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/substrate"
          deny:
            - { pkg: "github.com/gregberns/harmonik/internal/codexreactor", desc: "substrate MUST NOT import a vertical (codex)" }
            - { pkg: "github.com/gregberns/harmonik/internal/codexwire", desc: "substrate MUST NOT import a vertical (codex)" }
            - { pkg: "github.com/gregberns/harmonik/internal/codexdigitaltwin", desc: "substrate MUST NOT import a vertical (codex)" }
            - { pkg: "github.com/gregberns/harmonik/internal/keeper", desc: "substrate MUST NOT import a vertical (keeper)" }
            - { pkg: "github.com/gregberns/harmonik/internal/daemon", desc: "substrate MUST NOT import daemon" }

        # codex vertical: reactor + digital twin instantiate the substrate seam.
        # Companion rule pinning the "verticals depend on substrate, never
        # sideways or on the daemon" invariant (codename:session-restart-substrate).
        # Allow: stdlib + substrate + the codex sibling packages (codexwire/
        # codexreactor). Deny: daemon and the keeper vertical.
        # Rationale: specs/replay-substrate.md §RS-005; substrate-design.md §1.3.
        codex-vertical:
          files: ["**/internal/codexreactor/**", "**/internal/codexdigitaltwin/**", "**/internal/codexinput/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/substrate"
            - "github.com/gregberns/harmonik/internal/codexwire"
            - "github.com/gregberns/harmonik/internal/codexreactor"
            - "github.com/gregberns/harmonik/internal/codexdigitaltwin"
            - "github.com/gregberns/harmonik/internal/codexinput"
          deny:
            - { pkg: "github.com/gregberns/harmonik/internal/daemon", desc: "codex vertical MUST NOT import daemon" }
            - { pkg: "github.com/gregberns/harmonik/internal/keeper", desc: "codex vertical MUST NOT import a sibling vertical (keeper)" }
            # SC6 (agent-input-substrate T9): the structured input reactor is on
            # the direct-stdio input path (AIS-009); it MUST NEVER re-import the
            # tmux write verbs. This mirrors the codexdriver→tmux deny below.
            - { pkg: "github.com/gregberns/harmonik/internal/lifecycle/tmux", desc: "codex input path MUST NOT import tmux (AIS-009: the driver owns child stdio; tmux is not on the structured input path)" }

        # codexdriver: the structured Codex app-server driver — the second
        # handler.Substrate implementation (agent-input-substrate T6,
        # codename:agent-input-substrate). The driver shell may import handler
        # (the Substrate/InputPort seam it implements), apptap (the capture
        # tee), substrate (ClockPort + Run), and the codex vertical siblings
        # (codexwire codec + codexinput reactor). It MUST NEVER import
        # internal/lifecycle/tmux (AIS-009/AIS-010: tmux is not on the
        # structured input path — the AIS-016 CommandRunner seam is declared
        # locally) or daemon.
        codexdriver:
          files: ["**/internal/codexdriver/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/substrate"
            - "github.com/gregberns/harmonik/internal/codexwire"
            - "github.com/gregberns/harmonik/internal/codexinput"
            - "github.com/gregberns/harmonik/internal/codexdriver"
            - "github.com/gregberns/harmonik/internal/apptap"
            - "github.com/gregberns/harmonik/internal/handler"
          deny:
            - { pkg: "github.com/gregberns/harmonik/internal/lifecycle/tmux", desc: "codexdriver MUST NOT import tmux (AIS-009: the driver owns the child stdio; tmux is not on the structured input path)" }
            - { pkg: "github.com/gregberns/harmonik/internal/daemon", desc: "codexdriver MUST NOT import daemon (composition root injects, never the reverse)" }

        # sessioncapture: the CONSUMER side of the capture tee (agent-input-
        # substrate T7, codename:agent-input-substrate; AIS-014). The apptap tee
        # owns no file format (RS-016); this package is the caller-supplied
        # writer that does persistence + HC-032 OUTPUT scrub + keep-N/age-prune
        # retention + the mechanical CAPTURE-LOG ledger. It may import substrate
        # (ClockPort for the age-prune cutoff, RS-015) and self only. It MUST
        # NEVER import daemon (composition root injects, never the reverse), the
        # codex vertical, or tmux.
        sessioncapture:
          files: ["**/internal/sessioncapture/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/substrate"
            - "github.com/gregberns/harmonik/internal/sessioncapture"
          deny:
            - { pkg: "github.com/gregberns/harmonik/internal/daemon", desc: "sessioncapture MUST NOT import daemon (composition root injects the capture sink, never the reverse)" }
            - { pkg: "github.com/gregberns/harmonik/internal/codexdriver", desc: "sessioncapture is the driver's consumer, not its dependency (no import cycle)" }
            - { pkg: "github.com/gregberns/harmonik/internal/lifecycle/tmux", desc: "sessioncapture MUST NOT import tmux" }

        # keepertwin: the keeper vertical's trace-driven digital twin (T9,
        # codename:session-restart-substrate; measurement-design §2). Synthesizes
        # input-event schedules from the recorded corpus goldens and replays them
        # through the generic substrate Twin into the pure keeper reactor.
        # Allow: stdlib + substrate + keeper + core + self (external test pattern).
        # Deny: daemon and the codex vertical.
        keepertwin:
          files: ["**/internal/keepertwin/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/substrate"
            - "github.com/gregberns/harmonik/internal/keeper"
            - "github.com/gregberns/harmonik/internal/core"
            - "github.com/gregberns/harmonik/internal/keepertwin"
          deny:
            - { pkg: "github.com/gregberns/harmonik/internal/daemon", desc: "keepertwin MUST NOT import daemon (offline twin)" }
            - { pkg: "github.com/gregberns/harmonik/internal/codexreactor", desc: "keepertwin MUST NOT import a sibling vertical (codex)" }
            - { pkg: "github.com/gregberns/harmonik/internal/codexdigitaltwin", desc: "keepertwin MUST NOT import a sibling vertical (codex)" }

        # keepertest: the keeper vertical's L0–L3 replay test tiers (T10,
        # codename:session-restart-substrate; measurement-design §3; RS-017/018).
        # Test-only package (external keepertest_test): corpus goldens → keepertwin
        # Twin → pure keeper reactor → substrate doubles / bridge sink, with the
        # recorded stream decoded via internal/replay. Zero-token, offline.
        # Deny: daemon and the codex vertical.
        keepertest:
          files: ["**/internal/keepertest/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/substrate"
            - "github.com/gregberns/harmonik/internal/keeper"
            - "github.com/gregberns/harmonik/internal/keepertwin"
            - "github.com/gregberns/harmonik/internal/replay"
            - "github.com/gregberns/harmonik/internal/core"
            - "github.com/google/uuid"
          deny:
            - { pkg: "github.com/gregberns/harmonik/internal/daemon", desc: "keepertest MUST NOT import daemon (zero-token offline tiers)" }
            - { pkg: "github.com/gregberns/harmonik/internal/codexreactor", desc: "keepertest MUST NOT import a sibling vertical (codex)" }
            - { pkg: "github.com/gregberns/harmonik/internal/codexdigitaltwin", desc: "keepertest MUST NOT import a sibling vertical (codex)" }

        # runexectest: the run-state-machine L2 fault-matrix + relaunch-oracle
        # tiers (RT11, codename:run-state-machine; RSM-030). Test-only package
        # (external runexectest_test), mirroring keepertest: corpus summaries →
        # replay.StimulusSynthesizer schedules → substrate.Twin → the pure
        # runexec reactors under FakeClock virtual time. Zero-token, offline.
        # Deny: daemon (RSM-028 stays intact — the tiers exercise the reactors,
        # never the shell) and the verticals.
        runexectest:
          files: ["**/internal/runexectest/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/substrate"
            - "github.com/gregberns/harmonik/internal/runexec"
            - "github.com/gregberns/harmonik/internal/replay"
            - "github.com/gregberns/harmonik/internal/core"
          deny:
            - { pkg: "github.com/gregberns/harmonik/internal/daemon", desc: "runexectest MUST NOT import daemon (zero-token offline tiers; RSM-028)" }
            - { pkg: "github.com/gregberns/harmonik/internal/keeper", desc: "runexectest MUST NOT import a sibling vertical (keeper)" }
            - { pkg: "github.com/gregberns/harmonik/internal/codexreactor", desc: "runexectest MUST NOT import a sibling vertical (codex)" }

        # replay: the session-restart invariant-checking harness (codename:session-restart-substrate).
        # Reads a recorded events.jsonl via eventbus.ScanAfter and decodes through the typed
        # core registry (DispatchObservational / DecodePayloadStrict). Allowed edges: stdlib +
        # core + eventbus + uuid + self-import (external test pattern). MUST NOT import a vertical
        # (keeper) or the daemon — it is an offline consumer, not part of the live pipeline.
        # Rationale: events-design.md §4 (EV-U3/EV-048); decisions D6.
        replay:
          files: ["**/internal/replay/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/core"
            - "github.com/gregberns/harmonik/internal/eventbus"
            - "github.com/gregberns/harmonik/internal/replay"
            - "github.com/google/uuid"
          deny:
            - { pkg: "github.com/gregberns/harmonik/internal/keeper", desc: "replay MUST NOT import a vertical (keeper); it reads the recorded log offline" }
            - { pkg: "github.com/gregberns/harmonik/internal/daemon", desc: "replay MUST NOT import daemon (offline consumer)" }

        # agentmanifest: leaf package loading .harmonik/agents/<type>/manifest.yaml.
        # Depends only on stdlib + yaml.v3. Self-import for external test pattern.
        agentmanifest:
          files: ["**/internal/agentmanifest/**"]
          allow:
            - "$gostd"
            - "gopkg.in/yaml.v3"
            - "github.com/gregberns/harmonik/internal/agentmanifest"
          deny:
            - { pkg: "github.com/gregberns/harmonik/internal/daemon", desc: "agentmanifest MUST NOT import daemon (leaf primitive)" }

        # BI-004: The handler subsystem MUST NOT import internal/brcli.
        # The daemon invokes br directly (as a subprocess via the brcli adapter);
        # agents invoke br only through the Beads-CLI skill injected at launch time
        # per handler-contract.md §4.11. Neither the handler launch path nor the
        # handler-contract package may short-circuit that discipline by importing
        # the brcli adapter directly.
        #
        # Scope: internal/handler and internal/handlercontract.
        # Both packages are part of the handler subsystem (skill-injection seam).
        # The structural guard in internal/handler/bi004_handler_gate_test.go is
        # the belt-and-suspenders runtime check; this rule is the primary static
        # enforcement surface.
        #
        # Rationale: specs/beads-integration.md §4.2 BI-004.
        handler-brcli-ban:
          files:
            - "**/internal/handler/**"
            - "**/internal/handlercontract/**"
          deny:
            - { pkg: "github.com/gregberns/harmonik/internal/brcli", desc: "BI-004: handler MUST NOT import brcli; agents access br only via the Beads-CLI skill per handler-contract.md §4.11 (specs/beads-integration.md §4.2)" }

        # handler↛tmux: the machine-enforced seam inversion (HC-071 / AIS-002).
        # internal/handler DECLARES the InputPort seam (SubmitInput / CloseInput);
        # the concrete input driver — the interim tmux/paste implementation and the
        # future structured Codex driver — is SUPPLIED daemon-side. internal/handler
        # therefore MUST NOT import internal/lifecycle/tmux; this replaces the former
        # doc-comment-only "boundary" (internal/handler/substrate.go) with a real,
        # machine-checkable deny, landed with the port.
        #
        # Rationale: specs/handler-contract.md §4.1a HC-071; specs/agent-input.md §4.1 AIS-002.
        handler-tmux-ban:
          files:
            - "**/internal/handler/**"
          deny:
            - { pkg: "github.com/gregberns/harmonik/internal/lifecycle/tmux", desc: "HC-071/AIS-002: internal/handler declares the InputPort seam; the tmux driver is supplied daemon-side — handler MUST NOT import internal/lifecycle/tmux (specs/handler-contract.md §4.1a, specs/agent-input.md §4.1)" }

        # lifecycle/tmux: may import internal/core, internal/lifecycle (provenance),
        # and stdlib only. No other harmonik subsystem imports are permitted.
        # Rationale: process-lifecycle.md §4.5 PL-021b, PL-021c; workspace-model.md §4.1 WM-002a.
        lifecycle-tmux:
          files: ["**/internal/lifecycle/tmux/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/core"
            - "github.com/gregberns/harmonik/internal/lifecycle"

        # eventbus / policy / handler-contract: may import core only.
        # Self-imports (internal/eventbus) are required for _test.go files in the
        # same module that import the package under test.
        eventbus:
          files: ["**/internal/eventbus/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/core"
            - "github.com/gregberns/harmonik/internal/eventbus"
            - "github.com/google/uuid"
        policy:
          files: ["**/internal/policy/**"]
          allow: ["$gostd", "github.com/gregberns/harmonik/internal/core"]
        # presence: core + eventbus + self-import (external test pattern).
        # Leaf package owning the agent-presence projection (lifted from
        # cmd/harmonik/comms.go) AND the hitl-decisions open-decision projection +
        # orphan reaper (lifted from internal/daemon), so internal/keeper can import
        # it for the K5 keeper-tick reaper without importing internal/daemon.
        # MUST NOT import daemon. Spec ref: hitl-decisions SPEC §5 / N9; bead hk-061.
        presence:
          files: ["**/internal/presence/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/core"
            - "github.com/gregberns/harmonik/internal/eventbus"
            - "github.com/gregberns/harmonik/internal/presence"
          deny:
            - { pkg: "github.com/gregberns/harmonik/internal/daemon", desc: "presence is a leaf; MUST NOT import daemon (hitl-decisions hk-061)" }
        # handler-contract: core + uuid (sessionid.go) + self-import (external test pattern).
        # uuid is a leaf utility needed by sessionid.go (NewSessionID) and test fixtures.
        # Self-import allows the standard Go external test pattern (package handlercontract_test).
        # No other subsystem imports present in production code — audited hk-t5h2p.
        handler-contract:
          files: ["**/internal/handlercontract/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/core"
            - "github.com/gregberns/harmonik/internal/handlercontract"
            - "github.com/google/uuid"

        # handler-contract/lifecycle: leaf package — stdlib only (HC-064..HC-067).
        # No internal/ deps. Event emission wired in B4 (hk-q0uba follow-up).
        handler-contract-lifecycle:
          files: ["**/internal/handlercontract/lifecycle/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/handlercontract/lifecycle"

        # Adapters: core only.
        adapter-br:
          files: ["**/internal/adapter/br/**"]
          allow: ["$gostd", "github.com/gregberns/harmonik/internal/core"]
        adapter-ntm:
          files: ["**/internal/adapter/ntm/**"]
          allow: ["$gostd", "github.com/gregberns/harmonik/internal/core"]

        # Workspace: core + eventbus + adapter-br + handlercontract + uuid.
        # uuid is a leaf utility (no harmonik-internal deps); workspace needs it
        # to parse RunID/WorkflowID strings from JSON (leaselock.go, test helpers).
        # Already in core's allow-list; adding here is consistent.
        # handlercontract: conflictresolution_wm024.go builds a LaunchSpec and
        # claudetrust_wm040b.go wraps handlercontract.ErrStructural (hk-bfvby) so
        # the dispatch path classifies a bounded-lock timeout as structural.
        workspace:
          files: ["**/internal/workspace/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/core"
            - "github.com/gregberns/harmonik/internal/eventbus"
            - "github.com/gregberns/harmonik/internal/adapter/br"
            - "github.com/gregberns/harmonik/internal/handlercontract"
            - "github.com/google/uuid"
            # lifecycle/tmux: the remote-substrate-aware "…Via(runner)" workspace
            # helpers (ComputeDiffHashVia, ReadReviewVerdictVia — hk-f3u6o) take a
            # tmux.CommandRunner so a REMOTE run's worktree reads route through the
            # worker's SSHRunner instead of a box-A os.ReadFile. diffhash.go,
            # remotematerialize.go, worktreepath.go already depend on it.
            - "github.com/gregberns/harmonik/internal/lifecycle/tmux"

        # Agent runner: core + eventbus + handler contract + adapter-ntm.
        agentrunner:
          files: ["**/internal/agentrunner/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/core"
            - "github.com/gregberns/harmonik/internal/eventbus"
            - "github.com/gregberns/harmonik/internal/handlercontract"
            - "github.com/gregberns/harmonik/internal/adapter/ntm"

        # Hook: core + eventbus.
        hook:
          files: ["**/internal/hook/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/core"
            - "github.com/gregberns/harmonik/internal/eventbus"

        # Memory: core + eventbus.
        memory:
          files: ["**/internal/memory/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/core"
            - "github.com/gregberns/harmonik/internal/eventbus"

        # Handlers (claudecode, pi, twin): core + handlercontract.
        # Note: handler-impls targets internal/handler/claudecode, /pi, /twin subdirs which
        # do not yet exist (all handler code is flat in internal/handler/). Zero violations.
        # Path for handler/contract corrected to handlercontract per actual package layout.
        handler-impls:
          files: ["**/internal/handler/claudecode/**", "**/internal/handler/pi/**", "**/internal/handler/twin/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/core"
            - "github.com/gregberns/harmonik/internal/handlercontract"

        # Scenario harness: DEFERRED — 12 violations (daemon, lifecycle, queue, workspace
        # imports + yaml.v3 + self-imports in test files). Real violations: scenario currently
        # drives the full stack and imports daemon/queue/lifecycle/workspace directly.
        # Follow-up: hk-uyxg0.
        # Revisit if the harness needs broader access (subsystem-organization.md §Deferred).
        # scenario:
        #   files: ["**/internal/scenario/**"]
        #   allow:
        #     - "$gostd"
        #     - "github.com/gregberns/harmonik/internal/core"
        #     - "github.com/gregberns/harmonik/internal/eventbus"
        #     - "github.com/gregberns/harmonik/internal/agentrunner"
        #     - "github.com/gregberns/harmonik/internal/orchestrator"
  
        # Improvement loop: core + eventbus + memory.
        # improvement:
        #   files: ["**/internal/improvement/**"]
        #   allow:
        #     - "$gostd"
        #     - "github.com/gregberns/harmonik/internal/core"
        #     - "github.com/gregberns/harmonik/internal/eventbus"
        #     - "github.com/gregberns/harmonik/internal/memory"
  
        # Orchestrator: the pure work-loop-brain leaf (M5 slice 3, codename
        # orchestrator). Value-in/value-out decision predicates over narrow
        # snapshot structs projected by the daemon under the QueueStore lock;
        # trimmed to $gostd + core exactly like internal/policy. internal/queue
        # is deliberately NOT allowed — enum fields are projected as
        # booleans/strings at the daemon boundary.
        orchestrator:
          files: ["**/internal/orchestrator/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/core"
  
        # Composition root: may import every harmonik subsystem.
        # Also subject to llm-sdk-ban (see above).
        # uuid and yaml.v3 are direct deps of daemon production code.
        # depguard allow-list uses trailing-slash prefix matching (not Go-module "...").
        # mergeq: the merge-queue exclusion domain (RSM-002/RSM-012,
        # codename:run-state-machine). Leaf: stdlib + self-import only. The
        # daemon threads its prepare/commit closures IN as `critical` funcs, so
        # the direction is daemon -> mergeq; mergeq MUST NOT import daemon back.
        # NEW rule (not in TC-6's pre-authorization) applied per the same
        # "applied per carve" pattern (track-c-enforcement.md §2.2).
        # Rationale: specs/run-state-machine.md; merge-queue-design.md §1.
        mergeq:
          files: ["**/internal/mergeq/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/mergeq"
          deny:
            - { pkg: "github.com/gregberns/harmonik/internal/daemon", desc: "mergeq MUST NOT import daemon (leaf exclusion domain; daemon drives it)" }

        # runexec: the two pure run-lifecycle reactors (Dispatch + Run machines,
        # RSM-001/028, codename:run-state-machine). Trimmed leaf allow-list
        # ($gostd + core + substrate + self, design 00b R8): core supplies the
        # event-type constants the ActEmit actions carry; substrate supplies the
        # ClockPort determinism seam + the generic Run/EventSource/Effector the
        # reactors are driven by. The daemon shell (runshell.go) threads its
        # effector IN — direction is daemon -> runexec; runexec MUST NOT import
        # daemon back (RSM-028). NEW rule applied per the "applied per carve"
        # pattern (track-c-enforcement.md §2.2).
        # Rationale: specs/run-state-machine.md; runexec-design §0.
        runexec:
          files: ["**/internal/runexec/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/core"
            - "github.com/gregberns/harmonik/internal/substrate"
            - "github.com/gregberns/harmonik/internal/runexec"
          deny:
            - { pkg: "github.com/gregberns/harmonik/internal/daemon", desc: "runexec MUST NOT import daemon (RSM-028; pure reactor leaf)" }

        daemon:
          files: ["**/internal/daemon/**"]
          allow:
            - "$gostd"
            - "go/"
            - "github.com/gregberns/harmonik/internal/"
            - "github.com/google/uuid"
            - "gopkg.in/yaml.v3"
            - "github.com/stretchr/testify/"
            - "go.uber.org/goleak"

        # CLI entry-point: composition root — may import every harmonik subsystem
        # plus cmd subpackages and external utility deps.
        # Also subject to llm-sdk-ban (see above).
        # depguard allow-list uses trailing-slash prefix matching (not Go-module "...").
        cmd:
          files: ["**/cmd/**"]
          allow:
            - "$gostd"
            - "github.com/gregberns/harmonik/internal/"
            - "github.com/gregberns/harmonik/cmd/"
            - "github.com/google/uuid"
            - "gopkg.in/yaml.v3"
    exhaustive:
      default-signifies-exhaustive: true
    testifylint:
      enable-all: true
issues: { max-issues-per-linter: 0, max-same-issues: 0 }
