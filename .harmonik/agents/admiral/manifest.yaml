type: admiral
cardinality: { min: 0, max: 1 }
harness: claude

identity:
  soul: soul.md
  parent_intent: operator

context:
  - { ref: boot,                                        as: skill,       presence: injected }
  - { ref: operating.md,                                as: instruction, presence: injected }
  - { ref: agent-comms,                                 as: skill,       presence: injected }
  - { ref: .claude/skills/orchestrator-rules/SKILL.md,  as: doc,         presence: retrieved }
  - { ref: docs/components/internal/kerf.md,            as: doc,         presence: retrieved }

triggers:
  - id: alignment-audit
    source: cron
    every: 1h
    enabled: false  # OFF 2026-07-13 — fleet frozen (freeze-and-carve); nothing runs, nothing to audit. Re-enable when execution resumes.
    deliver: comms
    message: "Run the hourly alignment audit."
    activity_guard: 24h

handoff:
  channel: private

keeper:
  thresholds: default

lifecycle:
  self_restart: true
  persistent: true

tools_dir: null

markers:
  never_emits:
    - queue_submit:main
