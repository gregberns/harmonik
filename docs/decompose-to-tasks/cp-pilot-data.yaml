  # the execution-model failure classes per [execution-model.md §8]." NO cp-error.taxonomy
  # bead minted. Consumers (CP-015, CP-023, CP-027, CP-034b) block-on em-error.taxonomy
  # directly per discipline §2.6 schema-cite direction (F-pilot-CP-1, F-pilot-CP-3).

  # ───────────────────────── Test-infra beads (5) ─────────────────────────

  - mnem: cp-test.policy-yaml-fixture
    kind: test-infra
    title: "Policy-YAML required-section + config-precedence + N-1-readability fixture"
    description: |
      Per §10.2 (CP-034..CP-038): canonical policy-YAML fixtures covering required-section validation (CP-035 missing-section rejection); deep-merge config-precedence arithmetic across the 4 layers (runtime override > operator-policy file > workflow definition > default config per CP-037); N-1 schema readability (CP-038); `expr-lang/expr` round-trip on each section's expressions (CP-034 environment binding); DOT-attribute name-resolution against §6.3 sections (CP-036, no inline policy bodies). Foundation policy-loading harness for CP + downstream subsystem tests.

  - mnem: cp-test.cost-ceiling-harness
    kind: test-infra
    title: "Policy-expression cost-ceiling harness (AST-step + wall-clock)"
    description: |
      Per §10.2 (CP-034b): pathologically-deep expressions exercising primary AST-step bound (deterministic; `bound_fired=ast_steps`); pathologically-slow expressions exercising secondary wall-clock backstop (`bound_fired=wall_clock`); abort-and-emit durability pair test — crash injection between the abort and the `policy_expression_exceeded_cost` event reaching JSONL durability triggers replay re-abort, NOT silent drop; per-abort `io_determinism` tag verification.

  - mnem: cp-test.replay-safety-harness
    kind: test-infra
    title: "Cognition-tagged replay-safety harness (envelope hash + Cat-6 escalation)"
    description: |
      Per §10.2 (CP-039..CP-042 + CP-INV-003): verdict-persistence-at-invocation tests (Gate writes to Transition.evidence keyed by gate_name BEFORE transition advances; Hook writes to .harmonik/hooks/<run_id>/<id>.json + emits hook_verdict_persisted); envelope-hash computation determinism tests (CP-040a 5-input canonical-JSON SHA-256, AST-walker reachability stable across runtime versions); replay-reads-persisted-verdict-on-hash-match (no second model call observable); replay-escalates-to-Cat-6-on-hash-mismatch (verdict_envelope_mismatch event emission + reconciliation/spec.md §4.2 routing); Cat-6 stale-verdict re-invocation tests.

  - mnem: cp-test.budget-replay-fixture
    kind: test-infra
    title: "Budget JSONL-replay rehydration fixture"
    description: |
      Per §10.2 (CP-022..CP-027 + CP-026a): canonical run with N in-flight runs at daemon restart; JSONL log carrying `run_started` + budget_accrual events for each; rehydration must sum-from-`run_started` per-Budget deltas to reconstruct pre-crash counter state; rehydration MUST complete BEFORE handler accepts any dispatch (CP-023); double-spend negative case (in-flight run started with zero counter when prior accruals exist → defect); reconciliation wall-clock outer-bound composition test (CP-027) — admissible-under-inner-but-exceeds-outer-remaining → DENIED with `budget_exhausted`.

  - mnem: cp-test.registration-fixture
    kind: test-infra
    title: "Two-pass registration fixture (idempotency, divergent-body, batch-id pairing)"
    description: |
      Per §10.2 (CP-043..CP-046 + CP-INV-001 + §7.1 registration sequence): idempotent-by-name tests (re-register identical body succeeds silently); divergent-body rejection tests; daemon-local scope (no cross-daemon sharing); deterministic-lookup tests (LookupByName / LookupByTrigger / LookupByAttachPoint return reproducible orderings); cognition-Guard rejection at registration (CP-020); two-pass cross-document reference resolution (§7.1 OQ-CP-005 default — all policies parsed before registration; missing refs fail startup); `control_points_registration_started` / `control_points_registered` batch_id pairing — absence of `_registered` paired with prior `_started` of the same batch_id signals crashed-mid-registration; replay rebuilds from policy YAML.

