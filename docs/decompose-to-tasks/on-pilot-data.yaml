# F-pilot-ON-4 [local — applies §2.11(c) mechanically + SHAPE-not-COUNT
#   tiebreaker per F-pilot-WM-2] — ON §8 has 24 exit-code rows (codes
#   0..23 incl. code 0 success — 24 entries). Raw COUNT exceeds the ~11 threshold cited in
#   §2.11(c) for "large §8 taxonomy → one bead per category". HOWEVER per
#   F-pilot-WM-2 SHAPE-not-COUNT context: the test is whether each row
#   represents independent IMPLEMENTATION work (e.g., RC's 11 reconciliation
#   categories each have distinct detection rules + dispatch paths) OR
#   whether the rows are sentinel VALUES of a single vocabulary (BI's
#   `BrError` 5 values; WM's 12 typed-error sentinel set; ON's 23 exit
#   codes). ON's §8 is shape-equivalent to WM's: it is a vocabulary owner
#   — each row names a `(code, category, detection rule, emitted event,
#   remediation pointer)` tuple, but the implementation work for each row
#   lives in the consumer §4 req that emits the code (e.g., ON-002 implements
#   the obligation; ON-016 detects queue-schema-unsupported and emits code
#   2; ON-027 detects drain-timeout-escalated and emits code 11). The §8
#   table is the routing dictionary the consumers reference, not 23
#   independent codepaths. Decision: SINGLE bead `on-error.taxonomy`
#   (kind:taxonomy), identical posture to BI and WM. Per discipline v0.9
#   §2.11(c.2), edges run <consumer-req> → on-error.taxonomy (16 intra-ON
#   edges enumerated above). The taxonomy bead's own predecessors are
#   limited to schema-shaped cross-spec beads it consumes (none in this
#   pilot — the taxonomy is leaf-shaped on the producer side). Not a
#   discipline patch candidate; SHAPE-not-COUNT precedent already captured
#   at v0.9 via F-pilot-WM-2.
