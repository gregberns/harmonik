epic:
  mnem: "on"
  title: "Operator NFR spec — implementation"
  description: |
    Implements specs/operator-nfr.md v0.4.1 (60 first-class §4 req beads from 60 active §4 entries — 1 envelope + 59 topical — after 0 §2.3 coalesces and 0 §2.1a collapses, 4 invariants — ON-INV-001/003/005/006; ON-INV-002 + ON-INV-004 retired in v0.3 never reusable, 0 §6 schemas — §6.1/§6.2/§6.3 explicitly omitted per §6 declaration, see F-pilot-ON-3, 1 §8 single-bead error-taxonomy on-error.taxonomy covering 24 exit codes (codes 0..23 incl. code 0 success) — single-bead form per §2.11(c) + SHAPE-not-COUNT tiebreaker per F-pilot-WM-2, see F-pilot-ON-4, 1 multi-step split — ON-027 8-step graceful-shutdown drain SPLIT into umbrella + 8 step beads, DEVIATES from PL precedent per F8b independent-code-path tiebreaker, see F-pilot-ON-5, 11 test-infra beads from §10.2 obligations). depends-on: [architecture, event-model, execution-model, handler-contract, control-points, process-lifecycle, reconciliation, beads-integration]. Workspace-model NOT in depends-on; WM cites surface as F-pilot-EV-3 informational findings (see F-pilot-ON-6). PL ↔ ON cycle-break per PL §9.3 NOTE (PL excludes ON; ON includes PL). RC cross-spec edges forward-deferred per F-pilot-EM-2 / Option B precedent (logged as forward:rc-NNN).
  labels:
    - "kind:spec-parent"

beads:
  # kinds: req | invariant | schema | error-taxonomy | test-infra

  # ───────────────────────── §4.a Subsystem envelope ─────────────────────────

  - mnem: on-env-001
    kind: req
    req: ON-ENV-001
    title: "Foundation-cross-cutting envelope declaration"
    description: |
      Per ON-ENV-001: declare the foundation-cross-cutting envelope (voluntary publication; AR-052 exempts foundation-cross-cutting specs from AR-053). (a) Events produced (operator_pause_status paired-phase, operator_resuming, operator_stopped, operator_upgrading, operator_upgrade_completed, operator_upgrade_rejected, operator_command_rejected, dispatch_deferred — emitted from §4.3/§4.6 operator-control path, registered in EV §8.7); (b) events consumed (daemon_ready, reconciliation_category_assigned, budget_warning/exhausted/accrual, agent_warning_silent_hang); (c) types introduced — none (this spec references existing types owned by EV/CP/WM); (d) handlers implemented — none; (e) state owned — none persistently (operator-control state-machine is daemon-in-memory; reconstruction per ON-030 via git+Beads); (f) control points provided — none; (g) NFRs inherited — ON IS the NFR home; (h) boundary classification per operation table.

  # ───────────────────────── §4.1 Exit codes + obligations ─────────────────────────

  - mnem: on-001
    kind: req
    req: ON-001
    title: "Operator-observable exit codes are structured"
    description: |
      Per ON-001: every operator-invoked harmonik command (`daemon`, `attach`, `enqueue`, `status`, `pause`, `stop`, `upgrade`, all multi-daemon commands per §4.10) MUST return a structured exit code. Zero MUST mean success. Non-zero codes MUST map one-to-one to a failure category declared in the §8 exit-code taxonomy. The mapping MUST be stable across releases within the N-1 compat window.

  - mnem: on-002
    kind: req
    req: ON-002
    title: "Exit-code taxonomy obligation"
    description: |
      Per ON-002: spec-draft pass MUST produce a normative exit-code taxonomy naming every non-zero exit code emitted by any operator command. Per code: failure category, operator-observable symptom, emitted event type (if any), operator remediation pointer. The taxonomy lives in §8 of this spec; cross-references from other specs (e.g., [process-lifecycle.md §4.10 harmonik status]) MUST resolve to §8 entries. Obligation is satisfied when the §8 table exists per §10.1 conformance bootstrap.

  - mnem: on-003
    kind: req
    req: ON-003
    title: "Startup failure-mode catalog obligation"
    description: |
      Per ON-003: spec-draft pass MUST produce a normative startup failure-mode catalog co-owned with [process-lifecycle.md §4.2]. For every daemon-startup prerequisite failure (git bad state, Beads SQLite unavailable, schema-version unsupported, stale-pidfile race, filesystem unwritable, disk-full during checkpoint commit, socket bind failure), catalog MUST specify: detection rule, exit code per ON-001, operator remediation procedure, emitted event type per [event-model.md §6.3], reconciliation Cat 0 classification per [reconciliation/spec.md §4.3]. Catalog is the authoritative input to `harmonik status`'s infrastructure-prereq reporting per [process-lifecycle.md §4.10].

  - mnem: on-004
    kind: req
    req: ON-004
    title: "Config inventory obligation"
    description: |
      Per ON-004: spec-draft pass MUST produce a normative config inventory enumerating every operator-configurable knob across foundation specs. Per knob: precedence layer (runtime override / operator-policy file / workflow definition / default per CP-037), default value, allowed range, change-takes-effect semantics. Coverage at minimum: timer-flush cadence (EV §4.4), budget warning threshold (CP §4.5), drain timeout (§4.7), RTO thresholds (§4.8), queue-empty re-query cadence (PL §4.4), Cat 0 pre-check retry cadence (RC §4.3), per-Cat reconciliation budgets (RC §4.4). Inventory home is OQ-ON-001; default-if-unresolved is sibling file under specs/operator-nfr/config-inventory.md.

  # ───────────────────────── §4.2 Integrity gate ─────────────────────────

  - mnem: on-005
    kind: req
    req: ON-005
    title: "Commit-hash integrity gate is the MVH binary-install check"
    description: |
      Per ON-005: pause-to-upgrade path MUST verify the to-be-installed binary's source-commit hash against operator-supplied expected hash before exec-replacement. Check MUST fail-closed: on mismatch or missing hash, daemon MUST NOT exec-replace and MUST remain `paused` with `operator_upgrade_rejected` emitted per [event-model.md §8.7]. Handler binaries installed via [handler-contract.md §4.10] MUST also carry the commit-hash check; this requirement names the daemon-level invariant.
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: on-005a
    kind: req
    req: ON-005a
    title: "Commit-hash source via build-time ldflags stamp"
    description: |
      Per ON-005a: daemon's `actual_hash` for ON-005's gate MUST be computed from a build-time embedded ldflags stamp (`-ldflags="-X main.commitHash=<sha>"` at compile). Binaries lacking the embedded stamp MUST fail the integrity gate immediately on `harmonik upgrade` invocation with §8 code 14 (`upgrade-hash-mismatch`); failure mode `failure_mode=binary-stamp-missing` distinguishes this from operator-supplied-hash-mismatch. Operator's `expected_commit_hash` source is operator-discretion (Slack, release-page, `git rev-parse`); ON-005's gate is a version-identity check, not cryptographic-integrity (signing is post-MVH per ON-006).

  - mnem: on-006
    kind: req
    req: ON-006
    title: "Full binary signing is deferred post-MVH"
    description: |
      Per ON-006: full cryptographic signing of binaries (code-signing certs, reproducible build attestations, signature-chain verification) is deferred post-MVH. Conforming MVH implementations MUST NOT be required to verify signatures beyond the commit-hash match of ON-005. Post-MVH introduction of signing is additive and does NOT invalidate MVH conformance.
    extra_labels:
      - "post-mvh"

  # ───────────────────────── §4.3 Operator-control between tasks ─────────────────────────

  - mnem: on-007
    kind: req
    req: ON-007
    title: "Operator `task` equals execution-model `run`"
    description: |
      Per ON-007: for operator-facing documentation, CLI output, and event payload human-readable fields, "task" MUST denote one complete run of a workflow from `run_started` to `run_completed`/`run_failed` per [execution-model.md §4.3]. Normative spec text, event payload field names, and internal logs MUST use `run` / `run_id`. Surfaces that render human-facing copy MAY translate `run` to "task"; wire formats MUST NOT.

  - mnem: on-008
    kind: req
    req: ON-008
    title: "Pause and upgrade respect the between-task invariant"
    description: |
      Per ON-008: an operator `pause` or `upgrade` issued while daemon status is `ready` MUST NOT interrupt any in-flight run (per §3 `in_flight(run)`). Daemon MUST transition `running → pausing`, allow every in-flight run to proceed to its next durable checkpoint per [execution-model.md §4.5], AND complete the full drain sequence of ON-027 (all eight steps) before transitioning to `paused`. The `pausing → paused` transition is gated on drain-completion: entry into `paused` is forbidden until (a) no run satisfies `in_flight(run)` AND (b) every drain step of ON-027 has completed (or drain-timeout escalation per ON-029 fired). `upgrade` further transitions `paused → upgrading → (exec-replace) → running` under §4.6.
    extra_labels:
      - "axis:idempotency-non-idempotent"
      - "cite:wide-fanout"

  - mnem: on-009
    kind: req
    req: ON-009
    title: "`stop --immediate` is the only control that aborts in-flight runs"
    description: |
      Per ON-009: `stop --immediate` and SIGKILL (treated equivalently) MUST abort in-flight runs (per §3 `in_flight(run)`). Aborted runs MUST emit `run_failed` with class `canceled` per [execution-model.md §8.4] once daemon restarts and reconciliation classifies them per [reconciliation/spec.md §4.3]. No other operator control is permitted to abort in-flight runs; proposals to add `pause --immediate` or `upgrade --immediate` MUST be rejected as ON-008 violations.

  - mnem: on-010
    kind: req
    req: ON-010
    title: "Reconciliation carve-out: pause queues during `reconciling`"
    description: |
      Per ON-010: pause MUST NOT interrupt reconciliation workflows per [reconciliation/spec.md §4.1]. Daemon's status progression is `starting → (optional degraded) → reconciling → ready` per [process-lifecycle.md §4.2]; the between-task invariant of ON-008 applies only after daemon reaches `ready`. An operator pause issued during `reconciling` MUST be queued and applied at the boundary event "all reconciliation runs have either resumed into normal flow or produced a verdict."

  - mnem: on-011
    kind: req
    req: ON-011
    title: "Operator-control state machine + serializable transitions"
    description: |
      Per ON-011: daemon MUST implement the operator-control state machine of §7.1. States: `running`, `pausing`, `paused`, `resuming`, `stopped` (terminal-recoverable via `start`), `upgrading`. Improvement-pause is NOT a distinct state — reuses `pausing/paused` with `pause_reason=improvement` discriminator per ON-012. Operator-control transitions MUST be serializable: daemon MUST hold a single mutex (or equivalent CAS primitive) guarding the transition function. Concurrent operator commands (per OQ-ON-004) are arbitrated by mutex acquisition order; the loser observes the post-winner state. The mutex MUST be acquired before evaluating a transition guard and held until the transition's emission and durable-marker write per ON-030a complete.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: on-012
    kind: req
    req: ON-012
    title: "Improvement-pause is a subtype of pause"
    description: |
      Per ON-012: S09 improvement cycle MUST NOT introduce a new operator-control state. An improvement-pause MUST transition `running → pausing → paused` via the same path as operator pause, sharing identical state table with `pause_reason` discriminator distinguishing operator-initiated (`pause_reason=operator`) from improvement-initiated (`pause_reason=improvement`). Additional invariant: `paused → resuming` is triggered automatically when improvement loop completes (no operator action required). Discriminator carried on `operator_pause_status` per [event-model.md §6.3] structured-fields mechanism; NOT a separate pair of state-machine states. Earlier framing of separate `improvement-pausing/improvement-paused` states is retired.

  - mnem: on-013
    kind: req
    req: ON-013
    title: "Operator-control events emitted per state transition"
    description: |
      Per ON-013: daemon MUST emit one typed event per operator-control state transition. Per paired-phase rule [event-model.md §8.9(h)], pause `pausing` and `paused` are lifecycle phases of a single pause emitted as `operator_pause_status` with `status ∈ {pausing, paused}` (forbidden as keepalive re-emission). Emission timing: `operator_pause_status{status=pausing}` on `running → pausing` (incl. improvement-pause path); `operator_pause_status{status=paused}` on `pausing → paused` (only after all ON-027 drain steps complete) — with `drain_summary` field naming each ON-027 step's completion timestamp + drain-timeout escalations (cross-spec coordination request to EV: extend §8.7.6 payload with `drain_summary?`); `operator_resuming` on `paused → resuming`; `operator_stopped` on entry to `stopped` with `mode ∈ {graceful, immediate}` per [event-model.md §8.7.8]; `operator_upgrading` on `paused → upgrading` with `upgrade_version` field per [event-model.md §8.7.9]; `operator_upgrade_completed` on `upgrading → running` after exec-replace; `operator_upgrade_rejected` when ON-005 commit-hash check fails or cross-version schema check refuses; `operator_command_rejected` (§8 code 16) when invalid for current state; `dispatch_deferred` (§8 code 18) when blocked by ON-041 machine-ceiling. ON owns *when*; EV owns *shape*.
    extra_labels:
      - "axis:idempotency-non-idempotent"
      - "cite:wide-fanout"

  - mnem: on-013a
    kind: req
    req: ON-013a
    title: "Per-command supervision (defer recover() barrier)"
    description: |
      Per ON-013a: every operator-command-dispatch goroutine (handling `pause`, `stop`, `upgrade`, `attach`, `enqueue`) MUST install a `defer recover()` barrier. On panic the barrier MUST: (a) emit `operator_command_failed{command, panic_class, run_id?}` (cross-spec coordination request to EV); (b) revert any partial state-machine transition by clearing the `.harmonik/daemon.state` marker's pending-transition field; (c) escalate to `degraded` if panic occurred during a drain step. The top-level PL-018a panic barrier remains the daemon's outer-defense; ON-013a is the operator-command inner-defense.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: on-013c
    kind: req
    req: ON-013c
    title: "Operator-command idempotency on no-op transitions"
    description: |
      Per ON-013c: operator commands MUST be idempotent on no-op transitions. `pause` issued while already `paused` MUST return success (exit 0) with `operator_pause_status{status=paused}` re-emitted at most once per command (deduplicated via session_id). `stop` while `stopped` MUST return success with no event emission. `resume` while `running` MUST return success with no transition. The operator's CLI MUST NOT see a different exit code for "already in target state" vs "transitioned successfully."

  - mnem: on-014
    kind: req
    req: ON-014
    title: "Reconciliation operator override (pre-execution verdict pause)"
    description: |
      Per ON-014: spec-draft pass MUST produce a normative per-reconciliation-workflow policy option to pause daemon's verdict-execution step (per [reconciliation/spec.md §4.5]) until an operator confirms or vetoes. Naming convention: `harmonik confirm-verdict <run_id>` / `harmonik veto-verdict <run_id> [--promote-to escalate-to-human]`. Default: execution proceeds without operator confirmation; operators opt in by policy. Applies to all investigator-dispatched reconciliation categories (Cat 2, 3, 6a per RC §4.2 and RC §8.12). Foundation owns naming convention; [reconciliation/spec.md §4.5] owns execution-step specifics.

  # ───────────────────────── §4.4 Queue-format compatibility ─────────────────────────

  - mnem: on-015
    kind: req
    req: ON-015
    title: "Beads is the queue; overlay schema is harmonik's half"
    description: |
      Per ON-015: operator's pending-tasks list and harmonik's dispatchable queue are the same store: Beads (SQLite, `Dicklesworthstone/beads_rust`) per [beads-integration.md §4.1]–[beads-integration.md §4.3]. Queue-format compatibility MUST be union of (a) Beads schema compat (managed upstream) AND (b) harmonik's overlay schema compat: `Harmonik-Bead-ID` trailers in checkpoint commits per [execution-model.md §4.4], bead-ID references in events per [event-model.md §6.3], session-log bead-ID metadata per [workspace-model.md §4.7]. Both halves MUST be N-1 readable.

  - mnem: on-016
    kind: req
    req: ON-016
    title: "Queue schema version check on daemon startup"
    description: |
      Per ON-016: on daemon startup, daemon MUST check both Beads SQLite schema version and harmonik's overlay schema version against the running binary's supported set (current N + prior N-1). Unsupported version MUST cause startup failure with the exit code assigned to category "queue-format-unsupported" per §8 (code 2), naming required migration release in failure event payload. Check is part of the startup failure-mode catalog of ON-003.
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: on-017
    kind: req
    req: ON-017
    title: "Beads pre-1.0 breakage absorbed via `br` adapter, not forked"
    description: |
      Per ON-017: harmonik MUST version-pin Beads per the external-inputs protocol (problem-space §External inputs) and MUST route all Beads interactions through the `br`-CLI adapter of [beads-integration.md §4.2]. A Beads breaking change MUST produce one localized adapter update; harmonik MUST NOT fork Beads. This is a structural obligation on the adapter boundary, not on every caller.

  # ───────────────────────── §4.5 Schema compat window ─────────────────────────

  - mnem: on-018
    kind: req
    req: ON-018
    title: "N-1 compatibility is the MVH compat window"
    description: |
      Per ON-018: every versioned on-disk or wire artifact declared by foundation specs — event-envelope schema ([event-model.md §6.1]), event payload schemas ([event-model.md §6.3]), checkpoint trailers and sibling files ([execution-model.md §4.4]), queue overlay (ON-015), policy schema ([control-points.md §6.3]) — MUST maintain N-1 readability. A reader pinned to N-1 MUST successfully parse and interpret artifacts written by N, with additive fields treated as unknown but non-fatal. Breaking changes MUST be accompanied by a migration release and MUST NOT be introduced mid-run; they MUST land at an operator pause per §4.3.

  - mnem: on-019
    kind: req
    req: ON-019
    title: "Migration releases are operator-paused boundaries"
    description: |
      Per ON-019: a migration release (any release that bumps an N-1-covered schema version to break the compat window — i.e., a change no longer readable by readers at current N) MUST require an operator pause before installation. The `harmonik upgrade` contract of §4.6 MUST refuse to exec-replace into a migration release unless daemon is in `paused` state AND on-disk state's schema version is within the new binary's supported set. Installing a migration release MUST NOT auto-migrate on-disk state; a dedicated migration workflow (post-MVH) is the path.

  # ───────────────────────── §4.6 `harmonik upgrade` contract ─────────────────────────

  - mnem: on-020
    kind: req
    req: ON-020
    title: "`harmonik upgrade` contract obligation (7 sub-rules including rollback)"
    description: |
      Per ON-020: spec-draft pass MUST produce a normative `harmonik upgrade` contract specifying: (a) binary-source mechanism (repo-relative path and/or explicit hash-supply flag); (b) operator-supplied expected commit-hash check per ON-005; (c) drain-vs-reconciliation interaction (MUST queue if reconciliation in-flight per ON-010; MUST NOT interrupt); (d) cross-version state contract (MUST succeed for same and N-1; MUST refuse for broader mismatches per ON-019); (e) socket continuity — daemon MUST preserve bound listener fd across exec-replace via fd-passing per [process-lifecycle.md §4.9 PL-027(iii)]: outgoing daemon clears `FD_CLOEXEC` and passes fd via `HARMONIK_LISTENER_FD`; new binary adopts via `net.FileListener` and re-sets `FD_CLOEXEC`. Adoption is gap-free; clients observe no `ECONNREFUSED` window; (f) rollback as first-class — on `harmonik upgrade --rollback` while `paused` after successful upgrade, daemon MUST exec-replace back to prior binary at `.harmonik/daemon.binary.prev`; expected_commit_hash for rollback is prior binary's stamp; live-window rollback unsupported; (g) post-exec-replace failure — operator recovers by `harmonik upgrade --rollback` (removes stale pidfile/socket, restores prior binary, consumes `.harmonik/daemon.upgrading` marker for hash determination).
    extra_labels:
      - "axis:idempotency-non-idempotent"
      - "cite:wide-fanout"

  - mnem: on-020a
    kind: req
    req: ON-020a
    title: "Upgrade-intent durable marker (`.harmonik/daemon.upgrading`)"
    description: |
      Per ON-020a: when `harmonik upgrade` enters drain phase, daemon MUST atomically write `.harmonik/daemon.upgrading` containing: (a) operator-supplied `expected_commit_hash` per ON-005; (b) upgrade-initiation timestamp; (c) operator's session_id (per ON-013b daemon-instance handshake). Write MUST follow temp+rename+fsync atomicity. On daemon startup, [process-lifecycle.md §4.2 PL-005] step 0 MUST read this marker; if present and on-disk binary's commit hash matches the marker's `expected_commit_hash`, startup proceeds normally and marker is removed; if hash does not match, daemon MUST refuse startup with §8 code 14 (`upgrade-hash-mismatch`) and emit `daemon_startup_failed{failure_mode=upgrade-hash-mismatch-on-restart}`. The PL-027(iv) marker, currently informative, is hereby promoted to normative per this requirement (cross-spec coordination request to PL).
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: on-021
    kind: req
    req: ON-021
    title: "Upgrade preserves in-flight run recoverability (iff drain-completed)"
    description: |
      Per ON-021: an `upgrade` operation MUST NOT make any in-flight run unrecoverable. The recoverability invariant holds iff entry into `paused` implies drain-completion (per ON-008 and ON-027): because the `pausing → paused` transition is gated on all eight drain steps completing AND no run satisfying `in_flight(run)` remaining, the state the new binary inherits MUST be reconstructible from git + Beads per [execution-model.md §4.7] and the restart RTO of §4.8. Cross-version state contract of ON-020 MUST reject upgrades that would violate this invariant.

  # ───────────────────────── §4.7 Secrets redaction + graceful shutdown ─────────────────────────

  - mnem: on-022
    kind: req
    req: ON-022
    title: "Secrets injected at handler launch; never logged; redactor fail-closed"
    description: |
      Per ON-022: secrets (API keys, tokens, credentials) MUST be injected at handler launch per [handler-contract.md §4.7]. Secrets MUST NOT appear in event log. Secrets MUST NOT appear in session logs without redaction. Redaction is mechanism-tagged and MUST be enforced pre-emission: handler implementations MUST apply prefix-regex matching and per-handler redaction patterns before any write to a durable sink (event bus, session log, audit record). The redactor MUST fail-closed: if redactor itself panics or returns an error during emission of any event/log/audit-record carrying typed `Secret` fields, daemon MUST abort the emission, MUST emit `redaction_failed{event_type, run_id?, error_class}` (cross-spec coordination request to EV: add `redaction_failed` to §8 taxonomy), and MUST NOT fall through to a non-redacted emission. Repeated redactor panics within T_redact_fail (default 60s, operator-tunable) MUST escalate daemon to `degraded` per ON-037.
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: on-023
    kind: req
    req: ON-023
    title: "Secrets-redaction compile-time payload-schema check"
    description: |
      Per ON-023: event payload schemas declared per [event-model.md §6.3] MUST NOT declare any field typed as `Secret` or equivalent. A compile-time check (lint pass or generated-code assertion) MUST reject any payload schema that would carry a secret through the event bus. This closes the redaction-obligation loop: redaction cannot be forgotten at an emission site because no emission site is permitted to carry secret-typed fields.

  - mnem: on-024
    kind: req
    req: ON-024
    title: "Command-execution sandbox invariant"
    description: |
      Per ON-024: agents MUST execute within a leased workspace directory per [workspace-model.md §4.3]. Escape attempts (symlinks resolving outside workspace, path-traversal patterns, git hooks sourced from untrusted paths) MUST be prevented. Specific enforcement is owned by subsystem specs for S04 (handler runner) and S06 (workspace manager); this spec states the cross-cutting invariant. Note: WM cite is informational per F-pilot-ON-6 (WM not in ON depends-on).

  - mnem: on-025
    kind: req
    req: ON-025
    title: "Network egress and skill-injection policy enforcement"
    description: |
      Per ON-025: network egress MUST be governed by policy per [control-points.md §6.3]; a policy MAY whitelist domains for agent access. Skills provisioned per [handler-contract.md §4.11] MUST honor egress policy: a provisioned skill that would require egress to a non-whitelisted domain MUST fail provisioning, and handler MUST emit `skills_provisioned` event (per [event-model.md §8.3]) listing only the skills actually installed. Skills requiring filesystem access outside the workspace MUST fail provisioning per ON-024.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: on-026
    kind: req
    req: ON-026
    title: "Prompt-injection defense is handler-owned"
    description: |
      Per ON-026: input sanitization for user-provided content in the input workspace MUST be the handler's responsibility per [handler-contract.md §4.1]. Handlers MUST NOT let user-provided content in the input workspace alter the agent's system-prompt instructions. This spec states the obligation; the enforcement mechanism lives in handler-contract.

  - mnem: on-027
    kind: req
    req: ON-027
    title: "Graceful-shutdown ordering (8-step drain umbrella)"
    description: |
      Per ON-027: on `stop --graceful` or SIGTERM — AND on `pause` / `upgrade` per the ON-008 drain-gate — daemon MUST execute the shutdown/drain sequence in the following order, each step completing before the next begins: (1) orchestrator stops pulling new tasks; (2) every in-flight run proceeds to its next checkpoint then suspends per [execution-model.md §4.5]; (3) agent runners wait for handler subprocesses to complete or reach drain timeout; (3a) `br`-CLI adapter intent-log per [beads-integration.md §4.10 BI-029/BI-030] MUST be drained to completion; (4) event bus flushes pending events (fsync per [event-model.md §4.4]); (5) memory layer flushes indexing; (6) workspace manager unlocks leased workspaces and cleans up incomplete adze setups per [workspace-model.md §4.3] [WM cite informational]; (7) orchestrator exits with code 0 if clean, or §8 code 11 "drain-timeout-escalated" if any step exceeded its bound. In pause/upgrade path the exit of step 7 is replaced by "enter `paused`" (no process exit); step sequence is identical. Completion of ALL eight steps is the precondition for `pausing → paused` transition of ON-008. Per §2.2 + F8b "diverse code paths" tiebreaker (F-pilot-ON-5), this requirement SPLITS into umbrella + 8 step beads (s1, s2, s3, s3a, s4, s5, s6, s7).
    extra_labels:
      - "axis:idempotency-non-idempotent"
      - "protocol:multi-step"
      - "cite:wide-fanout"

  - mnem: on-027.s1
    kind: req
    req: ON-027
    title: "Step 1 — Orchestrator stops pulling new tasks from the queue"
    description: |
      Per ON-027 step 1: at drain entry, orchestrator's dispatch loop MUST stop pulling new beads from Beads (`br ready` query loop terminated). No new run dispatch is permitted from this point until daemon exits or transitions back to `running`. Step 1 completion is a single boolean toggle on the dispatcher; no subsystem coordination required. Per ON-027a, completion MUST be marked durably in `.harmonik/daemon.state` before step 2 begins. On crash mid-step, restart resumes from step 1 (idempotent — re-toggling the dispatcher off is a no-op).
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: on-027.s2
    kind: req
    req: ON-027
    title: "Step 2 — In-flight runs reach next checkpoint, then suspend"
    description: |
      Per ON-027 step 2: every run for which `in_flight(run)` holds (per §3) proceeds to its next durable checkpoint per [execution-model.md §4.5], then suspends. Bounded by `timeout.step_2` per ON-029. On step-2 timeout per ON-029, escalation path fires (SIGKILL surviving subprocesses at step 4 wait window per ON-040 silent-hang synthesis). Step 2 completion signal: `in_flight(run)` evaluates to false for every run via dispatch-status JSON-RPC per [process-lifecycle.md §4.1 PL-003a]. Per ON-027a, durably marked.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: on-027.s3
    kind: req
    req: ON-027
    title: "Step 3 — Agent runners wait for handler subprocesses to complete"
    description: |
      Per ON-027 step 3: agent runners (HC watcher goroutines per [handler-contract.md §4.3 HC-011]) wait for handler subprocesses to complete or reach the drain timeout `timeout.step_3` per ON-029. Step 3 is bounded by HC-018 SIGTERM→SIGKILL escalation interval. On step-3 timeout, surviving agent subprocesses are SIGKILLed AT step 4's wait window with synthesized `agent_warning_silent_hang{reason=drain_forced}` per ON-040. Per ON-027a, durably marked.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: on-027.s3a
    kind: req
    req: ON-027
    title: "Step 3a — `br`-CLI adapter intent-log drain"
    description: |
      Per ON-027 step 3a: the `br`-CLI adapter intent-log per [beads-integration.md §4.10 BI-029/BI-030] MUST be drained to completion: every pending intent-log entry's terminal-transition write MUST resolve (success or BI-031 status-check classification) before step 4 proceeds. Drain failures (e.g., `BrUnavailable` per [beads-integration.md §6.1a]) escalate to step 4 with the failed entries marked for next-restart Cat 3a routing per RC. Bounded by `timeout.step_3a` per ON-029. Per ON-027a, durably marked.
    extra_labels:
      - "axis:idempotency-recoverable-non-idempotent"

  - mnem: on-027.s4
    kind: req
    req: ON-027
    title: "Step 4 — Event bus flushes pending events (fsync)"
    description: |
      Per ON-027 step 4: event bus flushes all pending events to JSONL with `fsync(file_fd)` + `fsync(parent_dir_fd)` per [event-model.md §4.4]. Bounded by `timeout.step_4` per ON-029. fsync failure produces §8 code 21 `drain-step-errored` (not code 11 — code 11 is timeout-escalation; code 21 is non-recoverable error). Step 4 also synthesizes `agent_warning_silent_hang{reason=drain_forced}` per ON-040 BEFORE SIGKILL emission to any still-running agent subprocess from step 3 timeout. Per ON-027a, durably marked.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: on-027.s5
    kind: req
    req: ON-027
    title: "Step 5 — Memory layer flushes indexing"
    description: |
      Per ON-027 step 5: memory layer (S07 memory subsystem) flushes its indexing state to disk. Bounded by `timeout.step_5` per ON-029. fsync failure produces §8 code 21. Per ON-027a, durably marked.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: on-027.s6
    kind: req
    req: ON-027
    title: "Step 6 — Workspace manager unlocks leased workspaces"
    description: |
      Per ON-027 step 6: workspace manager unlocks leased workspaces and cleans up incomplete adze setups per [workspace-model.md §4.3] [WM cite informational per F-pilot-ON-6]. Bounded by `timeout.step_6` per ON-029. Lock-release failure produces §8 code 21 with `drain_error.step=6` discriminator. Per ON-027a, durably marked.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: on-027.s7
    kind: req
    req: ON-027
    title: "Step 7 — Orchestrator exits (or enters `paused`)"
    description: |
      Per ON-027 step 7: orchestrator exits with code 0 if clean, or §8 code 11 (`drain-timeout-escalated`) if any prior step exceeded its bound. In the pause/upgrade path, the exit of step 7 is replaced by "enter `paused`" (no process exit) — the step sequence is identical. Completion of step 7 is the precondition for the `pausing → paused` transition per ON-008.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: on-027a
    kind: req
    req: ON-027a
    title: "Drain step atomicity and crash-recovery (F8c constraint)"
    description: |
      Per ON-027a: the eight steps of ON-027 MUST execute strictly sequentially on a single goroutine; no parallel execution between steps is permitted. Each step's completion MUST be marked durably (in `.harmonik/daemon.state` marker per ON-030a, augmented with `drain_step_completed` field) before the next step begins. On crash mid-drain, next daemon startup MUST resume drain from next-uncompleted step rather than restart from step 1; resumption MUST be idempotent on completed steps (each step's effect is replay-safe). Per §2.2 F8c, this is a constraint requirement adjacent to the ON-027 umbrella; it gets its own bead with `blocks` edge from the umbrella (the umbrella cannot close until atomicity discipline is met).
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: on-028
    kind: req
    req: ON-028
    title: "`stop --immediate` skips drain steps 2–3"
    description: |
      Per ON-028: on `stop --immediate` or SIGKILL, daemon MUST skip steps 2 and 3 of ON-027. In-flight agent subprocesses MUST be killed (SIGTERM with a short bounded window, then SIGKILL). In-flight run state is recoverable on next startup via checkpoint + reconciliation per [reconciliation/spec.md §4.2], but in-flight agent subprocesses are not gracefully stopped.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: on-029
    kind: req
    req: ON-029
    title: "Drain timeout per-step + optional sum-bound (F8c constraint)"
    description: |
      Per ON-029: the drain timeout of ON-027 is configurable per-step (`timeout.step_2`, `timeout.step_3`, etc.); the §7.2 pseudocode is normative for the per-step apportionment. A single `drain_timeout_total` MAY be declared as the sum-bound; if declared, individual `timeout.step_N` MUST sum to ≤ `drain_timeout_total`. Drain timeout knobs MUST be operator-configurable per the config inventory of ON-004. Default values are specified in the config inventory; change-takes-effect semantics is "next daemon start" (drain timeouts are read once at startup). Per §2.2 F8c, this is a constraint requirement adjacent to the ON-027 umbrella; own bead with `blocks` from umbrella.

  # ───────────────────────── §4.8 Restart RTO ─────────────────────────

  - mnem: on-030
    kind: req
    req: ON-030
    title: "Restart reconstruction path (git + Beads, no JSONL replay)"
    description: |
      Per ON-030: daemon restart MUST reconstruct the in-memory model by walking the git checkpoint trail per [execution-model.md §4.7] and querying Beads via `br` per [beads-integration.md §4.2]. The JSONL event log MUST NOT be replayed for state reconstruction (per [event-model.md §4.4] and [event-model.md §4.5], and locked decision #12 — no DTW). Reconciliation workflows MUST spawn for in-flight runs (per §3 `in_flight(run)`) per [reconciliation/spec.md §4.2].
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: on-030a
    kind: req
    req: ON-030a
    title: "Pause-state durable marker (`.harmonik/daemon.state`)"
    description: |
      Per ON-030a: the operator-control state machine of §7.1 MUST persist its current state via an atomic-written marker file `.harmonik/daemon.state` containing current `DaemonStatus` plus pause-reason discriminator (when applicable; one of `operator`, `improvement`, `upgrade-prepare`). Write MUST use temp+rename+fsync+parent-fsync per [workspace-model.md §4.7 WM-026] [WM cite informational per F-pilot-ON-6] and MUST happen synchronously on every state transition that produces `paused`, `pausing`, `upgrade-prepare`, or `stopped` state. On daemon startup, [process-lifecycle.md §4.2 PL-005] step 0 MUST read `.harmonik/daemon.state`; if marker indicates paused/upgrade-prepare state, daemon MUST initialize into that state rather than `running`, preserving operator intent across crashes. Marker MUST be removed on clean transition to `running` or process exit via the normal-startup path.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: on-031
    kind: req
    req: ON-031
    title: "Restart RTO target (30s p95 nominal / 300s hard ceiling)"
    description: |
      Per ON-031: restart MUST reach pre-restart state within RTO target, measured from SIGTERM (or crash) to daemon emitting `ready` status event per [process-lifecycle.md §4.2]. MVH RTO target: **30 seconds nominal fixture target** (p95 under standard fixture defined in ON-032 criterion 1) with a **300-second hard ceiling** (ON-032 criterion 3). Sensor: restart-RTO test harness backed by the standard fixture (`≤ 500 open beads`, `≤ 50 in-flight runs`, git-log depth `≤ 10,000` commits, `≤ 100` Cat-3-pending runs, `≤ 10` active investigator workflows). See OQ-ON-005 for residual ambiguity on auto-escalate vs notify-only on ceiling breach.
    extra_labels:
      - "axis:io-determinism-best-effort"
      - "axis:idempotency-idempotent"

  - mnem: on-032
    kind: req
    req: ON-032
    title: "RTO criteria and hard ceiling (3 criteria)"
    description: |
      Per ON-032: RTO target MUST be set against three criteria. **Criterion 1 — operator expectation (nominal fixture).** MVH assumes single-operator, single-instance deployment. Target: **≤ 30 seconds at 95th percentile** under the standard fixture (`≤ 500 open beads, ≤ 50 in-flight runs, git-log depth ≤ 10,000 commits since the oldest open bead's first checkpoint, ≤ 100 reconciliation-Cat-3-pending runs, ≤ 10 active investigator workflows`). These bounds are the harness's reference state. **Criterion 2 — reconstruction complexity.** Restart time is proportional to (a) git-log walk depth since oldest open bead's first checkpoint, and (b) Beads query latency for ready + in-flight bead sets. JSONL event count is NOT a restart-time factor. **Criterion 3 — hard ceiling: 300 seconds.** Beyond this the operator MUST be notified (daemon MUST enter `degraded` reporting `reconciling` with progress markers). Criterion 3 is non-negotiable. Reconciliation-workflow dispatch time is part of the RTO; reconciliation-workflow execution time (investigator-agent LLM calls per RC §4.4) is NOT.

  - mnem: on-033
    kind: req
    req: ON-033
    title: "RTO measurement boundary (monotonic-corrected clock)"
    description: |
      Per ON-033: RTO of ON-031 MUST be measured using a monotonic-corrected clock source: SIGTERM receipt and `daemon_ready` emission timestamps MUST both carry an `_at_ns_since_boot` companion field (cross-spec coordination request to EV: add `shutdown_at_ns_since_boot` and `ready_at_ns_since_boot` to `daemon_shutdown` and `daemon_ready` payloads in §8.7.2 / §8.7.3). On boot-transition (post-reboot), monotonic-clock comparison is undefined; RTO MUST be marked `rto_undefined` for the boot-transition cycle and excluded from the p95 measurement. SIGKILL terminations have no `daemon_shutdown` emission; RTO is `rto_undefined` for those cycles. Measurement MUST NOT start from `harmonik daemon` invocation time; the boundary is SIGTERM (or daemon crash timestamp recorded by the OS) to daemon's `ready` status event emission per [process-lifecycle.md §4.2].

  - mnem: on-053
    kind: req
    req: ON-053
    title: "Post-panic forensic file (`.harmonik/panic-<timestamp>.log`)"
    description: |
      Per ON-053: when daemon's top-level panic barrier ([process-lifecycle.md §4.6 PL-018a]) intercepts a panic and exits with §8 code 19 (`runtime-panic`), daemon MUST atomically write a forensic file to `.harmonik/panic-<timestamp>.log` containing: (a) the Go runtime panic message and stack trace; (b) daemon's PID, PGID, project_hash, and binary commit hash; (c) timestamp of the panic in both wall-clock (RFC 3339) and `time.Since(boot)` monotonic forms; (d) last-emitted run_id / node_id / event_id (best-effort from in-memory cursor). Write MUST follow temp+rename+fsync+parent-fsync atomicity discipline of [workspace-model.md §4.7 WM-026] [WM cite informational per F-pilot-ON-6]. File is NOT consumed by reconciliation; it exists for operator post-mortem inspection. Multiple panic files MAY accumulate; ON does NOT mandate cleanup at this revision (tracked under OQ-ON-010).
    extra_labels:
      - "axis:idempotency-non-idempotent"

  # ───────────────────────── §4.9 Observability envelope ─────────────────────────

  - mnem: on-034
    kind: req
    req: ON-034
    title: "Every subsystem emits typed events"
    description: |
      Per ON-034: every subsystem MUST emit events per [event-model.md §6.3]. Event taxonomy additions introduced by a subsystem MUST be declared via the subsystem envelope (per [architecture.md §4.4] AR-013) and registered per [event-model.md §4.6]. Every event MUST carry the four-axis and mechanism/cognition tags per [architecture.md §4.1].

  - mnem: on-035
    kind: req
    req: ON-035
    title: "Every subsystem emits structured logs (NDJSON wire format)"
    description: |
      Per ON-035: every subsystem MUST emit structured logs. Unstructured log lines (free-form text only) are forbidden at spec-declared emission points. Structured logs are MVH substrate for observability; Prom/OTel formats are post-MVH per ON-043. Wire format owned by this spec (promoted from unreferenced `[event-model.md §3.8]` cite). Minimum NDJSON record carries: `ts` (RFC 3339 with ms), `log_schema_version` (current `"1.0"`), `level ∈ {debug, info, warn, error}`, `subsystem`, `source_subsystem` (per [event-model.md §4.9 EV-034a]), `run_id?`, `node_id?`, `event_id?` (UUIDv7 correlation per [event-model.md §4.1] when log corresponds to event emission), `msg`, `fields`. Secrets-redaction per ON-022 MUST apply pre-emission; producer-side; consumers MUST NOT re-redact. Log files MUST rotate at 100 MiB or 24 hours; prior files moved to `.harmonik/logs/<subsystem>-<rotated_at>.jsonl`. `log_schema_version` is under N-1 compat per ON-INV-001 (cross-spec coordination request: add structured logs to ON-018 enumeration; tracked OQ-ON-011). Detailed schema deferred to OQ-ON-007 (`quality-checks.md`).
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: on-036
    kind: req
    req: ON-036
    title: "Every subsystem exposes a health-check interface"
    description: |
      Per ON-036: every subsystem MUST expose a health-check interface returning `health_status ∈ {OK, degraded, failed}` with optional reason string. Orchestrator MUST aggregate subsystem health into a harmonik-wide health status exposed via `harmonik status` per [process-lifecycle.md §4.10].

  - mnem: on-037
    kind: req
    req: ON-037
    title: "Every subsystem emits liveness heartbeats"
    description: |
      Per ON-037: every subsystem MUST emit a liveness heartbeat event on a defined cadence. Missing heartbeats beyond tolerance MUST trigger `degraded` classification for that subsystem and raise the aggregated harmonik-wide health accordingly. Cadence and tolerance are operator-configurable per ON-004.
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: on-038
    kind: req
    req: ON-038
    title: "Audit records are a subset of traces"
    description: |
      Per ON-038: audit records MUST be produced as a subset of transition records per [execution-model.md §4.4]: the subset where `actor_role` is in a privileged role (per [architecture.md §4.8]) AND `chosen_action` affected policy, role permissions, or budget. No separate audit-log store is introduced; audit is a query over transition-record sibling files and their projections.
    extra_labels:
      - "cite:wide-fanout"

  - mnem: on-039
    kind: req
    req: ON-039
    title: "All observability operations are mechanism-tagged"
    description: |
      Per ON-039: every observability operation (health-check evaluation, heartbeat emission, metric emission, log emission, audit-record derivation) MUST be mechanism-tagged per [architecture.md §4.1, §4.2]. Any operation that requires cognition to produce the observability signal MUST be represented as a separate verification node per [architecture.md §4.3], NOT folded into the observability protocol.

  - mnem: on-040
    kind: req
    req: ON-040
    title: "Silent-hang detection obligation + drain-forced synthesis"
    description: |
      Per ON-040: detection of silent hangs (handler subprocesses producing no output and no heartbeat within bounded window) is obligated under [handler-contract.md §4.6]. This spec names the obligation to ensure operator-observable consequence (`agent_warning_silent_hang` event per [event-model.md §8.3] + subsystem `degraded` classification per ON-037) is not silently deferred. Enforcement mechanism lives in handler-contract. If a drain timeout escalation per ON-029 produces a SIGKILL to a still-running agent subprocess, daemon MUST synthesize an `agent_warning_silent_hang{reason=drain_forced, run_id, node_id}` event prior to the SIGKILL emission, even if no prior silent-hang detection had fired. The synthesis MUST occur within drain step 4's wait window per ON-027.

  # ───────────────────────── §4.10 Multi-daemon + multi-tenancy deferral ─────────────────────────

  - mnem: on-041
    kind: req
    req: ON-041
    title: "Multi-daemon commands obligation + per/cross-daemon ceiling distinction"
    description: |
      Per ON-041: spec-draft pass MUST produce normative definitions for machine-level operator commands: (a) `harmonik list` enumerate running daemons machine-wide with project path, pid, socket path, current status; (b) daemon-identification flags on all daemon-communicating commands (stop, pause, attach, status, upgrade) — at minimum `--socket <path>`, `--cwd <path>`, `--daemon-id <id>`; (c) machine-level agent-subprocess ceiling — cross-daemon bound on concurrently running agent subprocesses enforced by shared lock or machine-level coordinator. **Scope clarification:** per-daemon concurrency ceiling per [process-lifecycle.md §4.5 PL-014a] applies WITHIN one daemon; the machine-level ceiling above is a SEPARATE cross-daemon bound. Multi-tenancy deferral of ON-042 applies to multi-daemon coordination concerns (shared LLM budgets, shared identities, shared skill registries) only; per-daemon and machine-level ceilings are both in-scope for MVH. **Daemon-discovery:** `harmonik list` scans operator's home dir for `**/.harmonik/daemon.pid` (default scope: `$HOME` and any path in `$HARMONIK_PROJECT_ROOTS`). Pidfiles whose socket is unreachable or whose PID does not respond to `kill(pid, 0)` are reported `stale`. **Output columns:** `daemon_id` (project_hash from PL-006a), `project_root`, `pid`, `status`, `socket_path`, `started_at`, `last_exit_code`, `budget_summary` (rolled up to per-daemon totals per ON-049 attribution). Operators MUST be able to filter by status and project-root substring.
    extra_labels:
      - "cite:wide-fanout"

  - mnem: on-042
    kind: req
    req: ON-042
    title: "Multi-tenancy is explicitly deferred post-MVH"
    description: |
      Per ON-042: per-project daemon isolation (one daemon per project per [process-lifecycle.md §4.1]) is the MVH answer to multi-tenancy. Per-tenant cost attribution is out of scope for MVH; running N daemons does not auto-partition costs. Acknowledged-and-deferred concerns: shared operator LLM budgets (Anthropic quota is per-account; running N daemons does not create N quotas — machine-level budget coordinator required post-MVH); shared operator identity and auth (`harmonik attach` across N daemons is the same human with same skills and same `br` binary; global install conflicts and access controls are shared concerns); shared skill registries (skills installed machine-wide e.g. `~/.claude/skills/` — provisioning failure in one project is global failure surface). "Deferred" means "not solved by per-project-daemon isolation"; NOT "dismissed."
    extra_labels:
      - "post-mvh"

  - mnem: on-043
    kind: req
    req: ON-043
    title: "Metrics exposition format is deferred post-MVH"
    description: |
      Per ON-043: Prom and OTel wire formats for metric exposition are deferred post-MVH. MVH observability is structured logs (ON-035) plus typed events (ON-034). An implementation MAY additionally expose Prom/OTel endpoints but MUST NOT require them for MVH conformance.
    extra_labels:
      - "post-mvh"

  - mnem: on-044
    kind: req
    req: ON-044
    title: "Distributed tracing across daemons is deferred post-MVH"
    description: |
      Per ON-044: distributed tracing across multiple harmonik instances is deferred post-MVH. Per-project daemon isolation means multi-instance tracing is an OS-process-isolation concern, not a harmonik-code concern — each daemon is a separate process with its own event log and own state. Cross-daemon correlation (if ever needed) is an external-tooling layer, not a foundation spec.
    extra_labels:
      - "post-mvh"

  - mnem: on-050
    kind: req
    req: ON-050
    title: "`harmonik attach` minimum surface (5 sub-rules)"
    description: |
      Per ON-050: `harmonik attach` MUST: (a) connect to `.harmonik/daemon.sock` and verify daemon-instance handshake per ON-013b (when ON-013b lands; for MVH, accept any daemon); (b) stream a live event tap (subset of `daemon_*`, `run_*`, `node_*`, `operator_*`, `error` events per [event-model.md §8]) to operator's terminal; (c) present a periodic status snapshot (output of `harmonik status`) every T_attach_status (default 10s, operator-tunable); (d) accept operator commands inline (subset of `pause`, `resume`, `stop`, `enqueue`); (e) detach cleanly on operator SIGINT or `:detach` command without affecting daemon's state. Attach session_id MUST be carried in any operator-command emission for audit-trail correlation per ON-039.

  - mnem: on-051
    kind: req
    req: ON-051
    title: "Multi-attach arbitration"
    description: |
      Per ON-051: multiple operators MAY attach simultaneously to the same daemon. Each attach session has a unique session_id; each operator-command emission carries the originating session_id. Concurrent commands are serialized per ON-011's mutex discipline; losers observe the post-winner state per ON-013c idempotency. Detach by one operator MUST NOT affect other attached operators or daemon's state.

  - mnem: on-054
    kind: req
    req: ON-054
    title: "`harmonik status` reports pause-reason discriminator"
    description: |
      Per ON-054: when daemon is in `paused` (or `pausing`) status per §7.1, `harmonik status` MUST report the pause-reason discriminator: `operator-pause` (issued via `harmonik pause`), `improvement-pause` (per ON-012), `upgrade-prepare` (when `harmonik upgrade` is in progress per ON-019). Discriminator MUST match `operator_pause_status` payload's pause-reason tag (per [event-model.md §6.3]) and is sourced from durable pause-state marker of ON-030a. Operator inspecting `harmonik status` during pause MUST be able to distinguish these three reasons without consulting the event log.

  # ───────────────────────── §4.11 Resource budgets ─────────────────────────

  - mnem: on-045
    kind: req
    req: ON-045
    title: "Budgets declared, enforced, attributed cross-subsystem"
    description: |
      Per ON-045: resource budgets (token, wall-clock, iterations) MUST be declared in policy per [control-points.md §4.5], enforced at dispatch by agent runner per [control-points.md §4.5], and attributed in observability per run, per role, aggregated to per-workflow and per-harmonik-instance. Cost attribution per tenant is out of scope for MVH per ON-042.

  - mnem: on-046
    kind: req
    req: ON-046
    title: "Budget events are operator-observable"
    description: |
      Per ON-046: budget-threshold events (`budget_warning`, `budget_exhausted`, `budget_accrual` per [event-model.md §8.4] and [control-points.md §4.5]) MUST be operator-observable via `harmonik status` and the attach UI per [process-lifecycle.md §4.10]. Operator-observable MUST NOT require parsing raw JSONL; a summarized view is adequate.

  - mnem: on-047
    kind: req
    req: ON-047
    title: "Category defaults for resource budgets (5-row table)"
    description: |
      Per ON-047: every policy MUST have a declared default value for each budget category when a node/role/workflow does not declare one explicitly. Foundation-level category defaults: Token budget (per-run) = 200_000 tokens, applies to any agentic node, override at node/role policy. Wall-clock budget (per-run) = 30 minutes, override at node/role. Iterations budget (per-run) = 50 iterations (tool-use cycles), override at node/role. Wall-clock budget (per-reconciliation-workflow) = 10 minutes, override at RC §4.4 policy. Warning threshold = 80% of budget across all categories (per CP-025). Defaults are operator-configurable via policy schema [control-points.md §6.3] and registered in config inventory per ON-004. Make "no policy declared" a safe state.

  - mnem: on-048
    kind: req
    req: ON-048
    title: "Exhaustion protocol (4-step sequence)"
    description: |
      Per ON-048: on budget exhaustion (any category reaches 100%), enforcing subsystem (agent runner per CP §4.5; reconciliation policy for reconciliation-workflow budgets) MUST: (1) emit `budget_exhausted` per [event-model.md §8.4.3]; emitter MUST tag `category` and `scope` via EV's structured-fields mechanism (payload shape — `run_id`, `session_id?`, `budget_ref`, `attempted_dispatch_cost` — is EV-owned). (2) Terminate in-flight LLM call or tool invocation at next safe boundary (post-chunk for token budgets; post-iteration for iterations budgets; post-step for wall-clock). (3) Route through exhaustion-routing policy: default `pause-and-escalate` — run transitions to failed state with fallback verdict per [reconciliation/spec.md §4.4 RC-018]; daemon MAY enter paused if policy declares `pause-on-exhaustion=true` (default false). (4) Emit `dispatch_deferred` per §8 code 18 if exhaustion cascades to multi-run ceiling breach. Exhaustion protocol is deterministic; pause-vs-escalate decision is per-policy.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: on-049
    kind: req
    req: ON-049
    title: "Attribution shape (who-consumed-what 5-tuple + delegation_path)"
    description: |
      Per ON-049: budget attribution MUST be surfaced at conceptual shape `(run_id, role, node_id, category, amount)` plus `delegation_path` identifier per [control-points.md §4.8 CP-039] for cost incurred by a cognition-tagged step, so cost can be traced to the specific model-class invoked. Concrete payload-field placement on `budget_warning`, `budget_consumed`, `budget_exhausted` is owned by [event-model.md §8.4]; ON is normative for the attribution surface (5 fields + `delegation_path` for cognition-tagged steps), EV is normative for on-wire field names and envelope placement. Aggregation levels: per-run (`run_id`), per-role (`role`), per-workflow (`workflow_id`), per-harmonik-instance (total over daemon's lifetime). Aggregation is read-side projection; emission side MUST surface attribution on every budget-affecting operation.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  # ───────────────────────── §5 invariants (4 active; 2 retired) ─────────────────────────

  - mnem: on-inv-001
    kind: invariant
    req: ON-INV-001
    title: "Sensor: N-1 compat window holds across every versioned artifact"
    description: |
      Per ON-INV-001: every versioned on-disk or wire artifact declared by foundation specs MUST hold the N-1 readability property of ON-018 simultaneously. A release that breaks N-1 for any single artifact is a migration release per ON-019 and MUST require operator pause for install. Constrains event-model, execution-model, control-points, beads-integration together.
      Sensor: corpus-wide compat-matrix test harness — for every artifact declared by foundation specs (event envelope, event payload schemas per [event-model.md §4.7], checkpoint trailer per [execution-model.md §4.4], queue overlay, policy schema per [control-points.md §6.3]), produce writer output at version N and parse at a reader pinned to N-1; failure of ANY pair flips the invariant. Sensor runs corpus-level per [architecture.md §4.1] AR-004.

  - mnem: on-inv-003
    kind: invariant
    req: ON-INV-003
    title: "Sensor: secrets never appear in durable sinks unredacted"
    description: |
      Per ON-INV-003: for every event-model-declared sink (event log per [event-model.md §4.4], dead-letter log per [event-model.md §4.3], session log per [workspace-model.md §4.7]), secrets MUST NOT appear unredacted. The invariant holds jointly across ON-022, ON-023, and the handler-contract secrets-injection rule — losing any one breaks the invariant.
      Sensor: two-part — (a) compile-time schema linter (per ON-023) that rejects any payload field typed as `Secret`; (b) regression test harness that writes each durable sink under a fixture whose secrets-injection set is known, then scans sink's output for any fixture-secret substring. Sensor failure on either part flips the invariant. WM session-log cite is informational per F-pilot-ON-6.

  - mnem: on-inv-005
    kind: invariant
    req: ON-INV-005
    title: "Sensor: every subsystem reports its reconstruction contribution"
    description: |
      Per ON-INV-005: every subsystem MUST expose a reconstruction-contribution interface such that restart-recovery per ON-030 can enumerate and verify its part of the reconstructed state. Specific interface (Go method or startup-probe event) is per subsystem, but invariant requires: (a) NO subsystem reconstructs silently, (b) every subsystem's reconstruction terminates (bounded) before daemon emits `ready`, (c) any subsystem that cannot reconstruct MUST cause daemon to fail startup with a categorized exit code (per §8) rather than enter silently-partial `ready` state.
      Sensor: fixture-backed restart-recovery test harness — inject a known pre-restart state across every subsystem, restart daemon, assert each subsystem emits a reconstruction-completed signal before `ready`. Missing or silent reconstruction flips the invariant.
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: on-inv-006
    kind: invariant
    req: ON-INV-006
    title: "Sensor: no subsystem introduces a control surface bypassing between-task invariant"
    description: |
      Per ON-INV-006: no subsystem MAY introduce a new control surface (CLI command, API endpoint, signal handler, socket protocol action) that aborts an in-flight run without routing through `stop --immediate` per ON-009 OR the drain-gated pause/upgrade path of ON-008. Subsystems MUST NOT add local escape-hatches (e.g., `kill-run`, `abandon-run`, `skip-reconciliation`) that bypass drain gate or reconciliation carve-out.
      Sensor: corpus-wide grep-plus-reviewer audit — every subsystem spec's §4.a Subsystem envelope (per [architecture.md §4.4] AR-013) is inspected for operator-control-affecting operations; any such operation not routing through state machine of §7.1 flips the invariant. Reviewer-enforced pending mechanical lint for control-surface declarations.

  # ───────────────────────── §8 single-bead error taxonomy ─────────────────────────
  # Per F-pilot-ON-4 + §2.11(c) SHAPE-not-COUNT (F-pilot-WM-2 precedent):
  # 24 exit codes (codes 0..23 incl. code 0 success) are sentinel VALUES of a
  # single vocabulary, not 24 independent codepaths. Single-bead form per
  # BI/WM precedent.

  - mnem: on-error.taxonomy
    kind: error-taxonomy
    title: "ON exit-code taxonomy (§8) — 24-code authoritative table"
    description: |
      Implement the §8 exit-code taxonomy: 24 codes (codes 0..23 incl. code 0 success — 0=success, 1=generic-failure, 2=queue-format-unsupported, 3=checkpoint-schema-unsupported, 4=event-schema-unsupported, 5=pidfile-locked, 6=socket-bind-failed, 7=git-bad-state, 8=beads-unavailable, 9=filesystem-unwritable, 10=disk-full, 11=drain-timeout-escalated, 12=rto-hard-ceiling-exceeded, 13=upgrade-requires-paused, 14=upgrade-hash-mismatch, 15=upgrade-schema-incompatible, 16=operator-control-invalid-state, 17=multi-daemon-target-missing, 18=machine-ceiling-exhausted, 19=runtime-panic, 20=signal-terminated, 21=drain-step-errored, 22=ntm-unavailable, 23=orchestrator-agent-unavailable). For each: failure category, detection rule, emitted event (if any), remediation pointer. Taxonomy is AUTHORITATIVE for the corpus — PL §8.x and other-spec consumers cite ON §8 by reference (per ON-002 obligation; cross-references resolve here per §10.1 conformance bootstrap). Code-to-category mapping MUST be stable across releases within the N-1 window per ON-001. Additions MAY land within the N-1 window as long as existing mappings remain stable. Per discipline v0.9 §2.11(c.2), edges run `<consumer-req> → on-error.taxonomy`; the taxonomy bead's own predecessors are limited to schema-shaped beads it consumes (none in this pilot — the taxonomy is leaf-shaped on the producer side). Cross-spec consumer→on-error.taxonomy edges from PL/RC/etc. live in those pilots, not here.
    extra_labels:
      - "kind:taxonomy"

  # ───────────────────────── Test-infra beads (11) ─────────────────────────

  - mnem: on-test.exit-code-taxonomy-fixture
    kind: test-infra
    title: "Exit-code taxonomy + obligations fixture (ON-001..ON-004)"
    description: |
      Per §10.2 (ON-001..ON-004): negative-path tests covering every exit code listed in §8; static-check test verifying that every requirement with cross-reference to §4.1 resolves to a §8 entry. Verify config-inventory artifact existence; verify startup failure-mode catalog co-owned with PL §4.2 covers all enumerated prerequisite failures; verify `harmonik status` resolves §8 entries on every non-zero exit observed.

  - mnem: on-test.integrity-gate-harness
    kind: test-infra
    title: "Commit-hash integrity gate harness (ON-005, ON-005a, ON-006)"
    description: |
      Per §10.2 (ON-005, ON-006): upgrade scenario tests with matching and mismatched commit hashes; verify `operator_upgrade_rejected` on mismatch with §8 code 14; verify post-MVH signing extension does not break MVH conformance. ON-005a: binary-without-stamp test asserts `failure_mode=binary-stamp-missing` at upgrade invocation. Cross-spec coordination: handler binary commit-hash check at HC §4.10 follows same discipline.

  - mnem: on-test.operator-control-fsm-harness
    kind: test-infra
    title: "Operator-control state-machine scenario harness (ON-007..ON-014, ON-013a, ON-013c)"
    description: |
      Per §10.2 (ON-007..ON-014): state-machine scenario tests enumerating every transition in §7.1; verify reconciliation-carve-out queueing of pause during `reconciling`; verify improvement-pause auto-resumes; verify `stop --immediate` aborts in-flight runs and emits `run_failed` with class `canceled` on next restart. ON-011 mutex serializability: race test asserts concurrent commands are arbitrated by mutex acquisition order. ON-013a: panic-injection test asserts `defer recover()` barrier emits `operator_command_failed` and reverts partial state-machine transition. ON-013c: idempotent no-op test asserts `pause` while paused returns 0 with `operator_pause_status{paused}` deduplicated via session_id.

  - mnem: on-test.queue-compat-harness
    kind: test-infra
    title: "Queue-format compat harness (ON-015..ON-017)"
    description: |
      Per §10.2 (ON-015..ON-017): upgrade scenario tests with N-1, N, N+1 Beads schemas; verify startup failure on unsupported with §8 code 2; verify `br` adapter localizes a simulated Beads breaking change (single adapter update, no caller-side fork). Beads version-pin manifest entry verified against release pinning protocol.

  - mnem: on-test.schema-compat-harness
    kind: test-infra
    title: "Schema compat window harness (ON-018, ON-019, ON-INV-001)"
    description: |
      Per §10.2 (ON-018, ON-019) + ON-INV-001 sensor: cross-artifact compat tests — write at N, read at N-1, for every listed artifact (event envelope, event payload schemas, checkpoint trailers, queue overlay, policy schema). Verify migration release refusal to install without a pause. Sensor: corpus-wide compat-matrix test harness flips the invariant on any pair failure.

  - mnem: on-test.upgrade-contract-harness
    kind: test-infra
    title: "Upgrade contract scenario harness (ON-020, ON-020a, ON-021)"
    description: |
      Per §10.2 (ON-020, ON-021): full upgrade scenario tests covering all sub-obligations of ON-020 — binary-source mechanism, hash check, drain-vs-reconciliation interaction, cross-version state contract, fd-passing socket continuity (gap-free; no `ECONNREFUSED` window observable), rollback first-class (`harmonik upgrade --rollback` while paused after successful upgrade), post-exec-replace failure recovery (rollback removes stale pidfile/socket, restores prior binary). ON-020a: marker write test asserts `.harmonik/daemon.upgrading` is durable on disk before `execve`; on next-startup mismatch, exit code 14 with `failure_mode=upgrade-hash-mismatch-on-restart`. ON-021: cross-version state preservation across same-version and N-1 upgrades; iff drain-completed.

  - mnem: on-test.security-and-shutdown-harness
    kind: test-infra
    title: "Security + shutdown 8-step drain harness (ON-022..ON-029, ON-027a, ON-INV-003)"
    description: |
      Per §10.2 (ON-022..ON-029): secret-redaction tests covering every sink (event log, dead-letter log, session log [WM cite informational]); schema-level tests asserting no field is typed as `Secret` in any payload; sandbox escape-attempt tests; graceful-shutdown scenario tests for all 8 drain steps (1, 2, 3, 3a, 4, 5, 6, 7) with per-step bound exhaustion → §8 code 11 escalation and per-step error → §8 code 21; `stop --immediate` tests verifying steps 2–3 are skipped. ON-027a atomicity: crash-mid-drain test asserts next-startup resumes from next-uncompleted step (not step 1); each completed step is replay-safe. ON-040 silent-hang synthesis: drain-timeout SIGKILL test asserts `agent_warning_silent_hang{reason=drain_forced}` synthesized prior to SIGKILL emission within step 4 wait window. ON-INV-003 secrets sensor: compile-time linter + regression scan.

  - mnem: on-test.restart-rto-harness
    kind: test-infra
    title: "Restart RTO benchmark + monotonic-clock harness (ON-030..ON-033, ON-053, ON-INV-005)"
    description: |
      Per §10.2 (ON-030..ON-033): restart scenario benchmarks measuring SIGTERM-to-`ready` across representative hardware at MVH scale; verify 30s p95 nominal under standard fixture (`≤ 500 open beads, ≤ 50 in-flight runs, git-log depth ≤ 10,000 commits, ≤ 100 Cat-3-pending runs, ≤ 10 active investigators`) and 300s hard ceiling. ON-033: monotonic-clock companion field verification (`shutdown_at_ns_since_boot`, `ready_at_ns_since_boot`); boot-transition cycles marked `rto_undefined`; SIGKILL terminations marked `rto_undefined`. ON-030a marker: pause-state durable across crash; on startup, daemon initializes into persisted suffix-state. ON-053 forensic file: post-panic atomic write verified for content (PID, PGID, project_hash, binary commit hash, dual-form timestamp, last-emitted run/node/event ids). ON-INV-005 reconstruction: per-subsystem reconstruction-completed signal asserted before `ready`.

  - mnem: on-test.observability-envelope-harness
    kind: test-infra
    title: "Observability envelope + silent-hang harness (ON-034..ON-040)"
    description: |
      Per §10.2 (ON-034..ON-040): per-subsystem-conformance tests verifying typed event emission (every subsystem MUST register taxonomy additions per AR-013), structured log emission (NDJSON wire format with `log_schema_version`, `source_subsystem`, `event_id?` correlation when log emits a tracked event), health-check interface presence (`health_status ∈ {OK, degraded, failed}`), liveness heartbeat cadence (operator-configurable per ON-004), audit-record derivation (subset of transition records where actor_role is privileged AND chosen_action affected policy/permissions/budget), mechanism-tagging of every observability operation. ON-040 silent-hang obligation test per HC §4.6.

  - mnem: on-test.multi-daemon-and-attach-harness
    kind: test-infra
    title: "Multi-daemon + attach surface harness (ON-041..ON-046, ON-050, ON-051, ON-054)"
    description: |
      Per §10.2 (ON-041..ON-046): multi-daemon scenario tests verifying `harmonik list` (scans `**/.harmonik/daemon.pid` under `$HOME` + `$HARMONIK_PROJECT_ROOTS`; queries socket via JSON-RPC `status`; reports stale on unreachable socket / unreachable PID; output columns `daemon_id` / `project_root` / `pid` / `status` / `socket_path` / `started_at` / `last_exit_code` / `budget_summary`); flag-based targeting (`--socket`/`--cwd`/`--daemon-id`); machine-ceiling enforcement (separate from per-daemon PL-014a ceiling). Budget tests verify declared-enforced-attributed pipeline. ON-050 attach surface: handshake / live event tap / periodic status snapshot every T_attach_status / inline operator commands / clean detach without affecting daemon state; attach session_id carried in operator-command emissions. ON-051 multi-attach: concurrent attaches serialized per ON-011 mutex, idempotent per ON-013c; one operator's detach does not affect others. ON-054 status pause-reason: discriminator `operator-pause` / `improvement-pause` / `upgrade-prepare` distinguishable without consulting event log.

  - mnem: on-test.budget-defaults-and-attribution-harness
    kind: test-infra
    title: "Budget defaults + exhaustion + attribution harness (ON-047..ON-049)"
    description: |
      Per §10.2 (ON-047..ON-049): policy-default application tests (run without explicit budgets consumes the ON-047 5-row defaults: 200K tokens/run, 30 min wall-clock/run, 50 iterations/run, 10 min per-reconciliation-workflow, 80% warning threshold). ON-048 exhaustion-protocol tests: emit `budget_exhausted` per [event-model.md §8.4.3], terminate at safe boundary (post-chunk for tokens, post-iteration for iterations, post-step for wall-clock), route through pause-or-escalate policy (default `pause-and-escalate`; `pause-on-exhaustion=true` opt-in), cascade to `dispatch_deferred` on machine-ceiling breach. ON-049 attribution-shape tests: every budget-affecting event carries the 5-tuple `(run_id, role, node_id, category, amount)` plus `delegation_path` for cognition-tagged steps; aggregation indexed per-run / per-role / per-workflow / per-instance.

# Edges. `from` = citing bead; `to` = prerequisite/blocker bead.
# discipline §2.5 convention: "A blocks B" → loader emits `br dep add B A -t blocks`
# (B depends on A). YAML `from`/`to` matches the (citing, prereq) tuples.
#
# Mnemonic prefix selects resolution map:
#   on-* → intra-spec (this spec's mnem-map, generated at load)
#   ar-* / em-* / ev-* / hc-* / cp-* / pl-* / bi-* → cross-spec
#   forward:* → forward-deferred (logged only, NOT loaded into beads); used
#     for rc targets per F-pilot-EM-2 / Option B precedent.
edges:
  # ───────────────────────── §4.a envelope edges ─────────────────────────
  - {from: on-env-001, to: ar-052}                                    # spec-category front-matter (foundation-cross-cutting)
  - {from: on-env-001, to: ar-053}                                    # subsystem envelope shape (voluntary publication)

  # ───────────────────────── §4.1 exit-codes + obligations ─────────────────────────
  - {from: on-001, to: on-error.taxonomy}                             # exit-code → §8 category mapping (consumer → vocabulary owner per §2.11(c.2))
  - {from: on-002, to: on-error.taxonomy}                             # taxonomy obligation IS the §8 table
  - {from: on-003, to: on-001}                                        # catalog cites exit codes per ON-001
  - {from: on-003, to: on-error.taxonomy}                             # catalog entries cite §8 codes
  - {from: on-004, to: on-001}                                        # config inventory enumerates exit-code-related knobs

  # ───────────────────────── §4.2 integrity gate ─────────────────────────
