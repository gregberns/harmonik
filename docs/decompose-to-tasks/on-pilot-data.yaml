# F-pilot-ON-5 [class — F8b deviation / discipline patch candidate, MEDIUM
#   priority] — ON-027 is the second multi-step protocol in this pilot
#   that fires all three §2.2 split signals. PL precedent (F-pilot-PL-3)
#   collapsed PL-005's 11-step startup, PL-006's 6-bullet sweep, PL-011's
#   9-step shutdown, and PL-027's 5-sub-rule upgrade contract via F8b's
#   shared-function-body tiebreaker. Considering ON-027 (8 drain steps:
#   1, 2, 3, 3a, 4, 5, 6, 7):
#     Signal 1 (≥3 steps):                 ✓ (8 steps)
#     Signal 2 (independent testability):  ✓ (each step's bound exhaust →
#                                              code 11 escalation, each
#                                              step's error → code 21
#                                              with `drain_error.step`
#                                              discriminator; per-step
#                                              `timeout.step_N` knobs)
#     Signal 3 (umbrella loses meaning when stripped): ✓ (the drain order
#                                              is the umbrella's normative
#                                              content — without the
#                                              steps the rule reduces
#                                              to "drain in some order")
#   F8b shared-function-body tiebreaker analysis: in any plausible Go
#   implementation, the 8 drain steps DO NOT share a function body. Each
#   step DELEGATES to a distinct subsystem (step 1: orchestrator dispatch
#   loop; step 2: run-checkpoint suspension via EM; step 3: agent runner
#   subprocess wait via HC; step 3a: br-CLI intent-log via BI; step 4:
#   event bus flush via EV; step 5: memory layer flush — separate
#   subsystem; step 6: workspace manager unlock via WM; step 7: orchestrator
#   exit). The drain orchestration glue is a 30-line `for step := range
#   steps { execute(step) }` loop; the BODIES of each step live in the
#   subsystem each delegates to. This is the F8b "diverse code paths
#   (not shared function body)" condition cited in §2.2 — the decision
#   for this case is "prefer multi-step split per §2.2".
#   Contrast with PL-005 11-step startup (collapsed to single bead): PL's
#   bootstrap function body is one cohesive sequence inside `internal/daemon`
#   — composition root, lock acquire, sweep, socket bind, cat-0 check, git
#   walk, beads query, model build, dispatch — every step touches the same
#   Go package and shares accumulated state (error variables, in-memory
#   model under construction, daemon-instance-id, etc.). Drain steps are
#   the inverse: each subsystem is the OWNER of its own drain step's body.
#   Decision applied: SPLIT ON-027 into umbrella + 8 step beads. This
#   DEVIATES from PL-005/PL-006/PL-011/PL-027 collapse precedent. The
#   class-lane signal: §2.2 F8b's "shared function body" criterion needs
#   a clearer disambiguation between "one cohesive function body" (PL
#   posture) and "delegating orchestrator with per-step subsystem
#   bodies" (ON-027 posture). RECORDED as discipline-patch candidate;
