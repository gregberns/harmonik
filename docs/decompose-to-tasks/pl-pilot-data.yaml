    - "kind:spec-parent"

beads:
  # kinds: req | invariant | schema | error-taxonomy | test-infra

  # ───────────────────────── §4.a Subsystem envelope ─────────────────────────

  - mnem: pl-env-001
    kind: req
    req: PL-ENV-001
    title: "Subsystem envelope declaration (daemon-core / `internal/daemon`)"
    description: |
      Per PL-ENV-001: declare the process-lifecycle subsystem envelope per [architecture.md §4.0 AR-053]: (a) events produced (daemon_started, daemon_ready, daemon_shutdown, daemon_startup_failed, daemon_degraded, daemon_orphan_sweep_completed, infrastructure_unavailable, dispatch_deferred, plus operator-control suffix events emitted by the daemon-core); (b) events consumed (reconciliation_category_assigned, reconciliation_verdict_executed, operator-control events); (c) types introduced (DaemonStatus, PidfileLock, ProjectHash, ProvenanceMarker, OrphanSweepReport, SocketWireRequest/Response); (d) handlers implemented (none — daemon HOSTS handlers per HC-001); (e) state owned (DaemonStatus, daemon_instance_id, pidfile, socket, .upgrading marker, project-hash-derived tmux namespace, composition-root registries); (f) control points provided (none — daemon hosts the registry); (g) NFRs inherited (ON-002, ON-020, ON-027, ON-031, ON-041); (h) boundary classification per operation table.

  # ───────────────────────── §4.1 Per-project daemon scope ─────────────────────────

  - mnem: pl-001
    kind: req
    req: PL-001
    title: "One daemon per project"
    description: |
      Per PL-001: each project (a git repo containing a `.harmonik/` directory) MUST run exactly one daemon. Multiple projects on the same machine MAY run multiple independent daemons, one per project. The daemon has no awareness of other daemons on the same machine; multi-daemon operator commands are owned by [operator-nfr.md §4.10 ON-041]. This is the structural precondition for the pidfile-based per-project singularity invariant (PL-INV-001).

  - mnem: pl-002
    kind: req
    req: PL-002
    title: "Pidfile at `.harmonik/daemon.pid`"
    description: |
      Per PL-002: daemon MUST write its PID to `.harmonik/daemon.pid` on startup and MUST hold an advisory lock on that file for its lifetime. A second daemon invocation against the same project that finds the pidfile held by a live process MUST exit with exit code `5` "pidfile-locked" per [operator-nfr.md §8], directing the operator to query the running daemon. Pairs with PL-002a (lock primitive) and PL-002b (atomic write).
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: pl-002a
    kind: req
    req: PL-002a
    title: "Pidfile lock is fd-lifetime advisory (`flock` / `F_OFD_SETLK`)"
    description: |
      Per PL-002a: pidfile lock MUST use a fd-lifetime advisory primitive: `flock(LOCK_EX|LOCK_NB)` on macOS; `flock(LOCK_EX|LOCK_NB)` or `fcntl(F_OFD_SETLK)` on Linux. Lock MUST release automatically on daemon termination (clean OR crash) so restart can re-acquire without operator intervention. POSIX process-lifetime `fcntl(F_SETLK)` FORBIDDEN (any fd-close inside the process releases the lock). Daemon MUST disambiguate (a) "pidfile present, lock held by live process" (exit 5) from (b) "pidfile present, no lock, recorded PID not live" (stale pidfile per PL-024) by attempting `flock` first, then probing with `kill(pid, 0)`. MAY corroborate via `/proc/<pid>/cmdline` (Linux) or `proc_pidpath` (darwin); ambiguity refuses startup (OQ-PL-007).
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: pl-002b
    kind: req
    req: PL-002b
    title: "Atomic pidfile write via truncate-rewrite-keep-fd"
    description: |
      Per PL-002b: daemon MUST write the pidfile content atomically via truncate-rewrite (NOT temp+rename, which would break the flock association). Procedure: (1) `open(.harmonik/daemon.pid, O_RDWR|O_CREAT|O_CLOEXEC)` without `O_TRUNC`; (2) acquire fd-lifetime lock per PL-002a; (3) only after lock: `ftruncate(fd, 0)`; (4) write three lines (PID / PGID / `daemon_instance_id` UUIDv7) terminated by `\n`; (5) `fsync(fd)` + `fsync(parent_directory_fd)` (REQUIRED for power-loss safety on APFS / ext4); (6) retain fd for daemon lifetime; intermediate `close()` FORBIDDEN. Readers MUST tolerate one-line (v0.2.x) and two-line (v0.4.0) backwards-compat formats. On `flock` failure with non-EAGAIN errno, exit code 9 + emit `daemon_startup_failed{failure_mode="pidfile-lock-error"}`.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: pl-003
    kind: req
    req: PL-003
    title: "Socket at `.harmonik/daemon.sock` (mode 0600)"
    description: |
      Per PL-003: daemon MUST listen on local Unix socket at `.harmonik/daemon.sock`. Agent subprocesses and CLI clients MUST communicate exclusively through this socket. Daemon MUST remove a stale socket file on startup before binding. After bind, daemon MUST `chmod(0600)` the socket and ensure its owner is the daemon's effective uid; socket authenticity is filesystem-permission-based per [handler-contract.md §4.10 HC-044]. Second daemon observing `EADDRINUSE` exits with ON §8 code 6 `socket-bind-failed` per PL-008a.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: pl-003a
    kind: req
    req: PL-003a
    title: "Socket wire format: JSON-RPC 2.0 over NDJSON"
    description: |
      Per PL-003a: daemon socket MUST carry JSON-RPC 2.0 request/response framed as newline-delimited JSON per [handler-contract.md §4.2 HC-007a] (one JSON object per `\n`-terminated line; max 1 MiB; over-cap aborts connection). CLI clients MUST issue one request per connection and close on response; agents MAY hold connection per HC §4.3. JSON-RPC method-name inventory (pinned per OQ-PL-005 RESOLVED): agent-facing (`claim-next`, `emit-outcome`, `dispatch-status`, Beads-CLI-skill proxy methods per [beads-integration.md §4.9 BI-027]); CLI-facing (`status`, `pause`, `resume`, `stop`, `upgrade`, `attach`, `enqueue`, `list`); daemon-internal (`get-agent-count` returning `{count: integer ≥ 0}` for ON-041 cross-daemon machine-ceiling drift reconciliation). Method payload schemas deferred; method-name set is the stable surface.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: pl-003b
    kind: req
    req: PL-003b
    title: "Pre-ready request rejection on unknown run_id"
    description: |
      Per PL-003b: between socket bind (PL-005 step 3a) and in-memory model build (PL-005 step 7), daemon MUST reject any `emit-outcome`, `claim-next`, or other agent-originated request whose `run_id` is unknown, with typed error `daemon_not_ready{reason="unknown_run_id"}`. CLI daemon-status requests are exempt (ready-detection probes per PL-009b). Clients MUST treat the typed error as a bounded-retry condition with exponential backoff per PL-009b. Closes the orphan-agent-reconnect-during-startup-window race in which an orphan agent's surviving socket connection lands on the new daemon's listener before the orphan sweep reaps it.
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: pl-004
    kind: req
    req: PL-004
    title: "Daemon-owned per-project file surface under `.harmonik/`"
    description: |
      Per PL-004: daemon's per-project file surface includes `.harmonik/daemon.pid` (PL-002), `.harmonik/daemon.sock` (PL-003), `.harmonik/daemon.instance-id` (PL-005 step 0; UUIDv7 correlation key), `.harmonik/daemon.upgrading` (PL-027(iv); ON-020a-owned content), `.harmonik/daemon.state` (ON-030a-owned content; PL-read at step 8a), `.harmonik/events/events.jsonl` + dead-letters + spill files (per EV §6.2), `.harmonik/event_id_hwm` (per EV §4.1), `.harmonik/beads-intents/` (per BI §4.10 BI-030), `.harmonik/reconciliation-locks/` (RC §4.1 RC-002a; swept by PL-006), and per-run `<workspace>/.harmonik/lease.lock` (per WM §4.3 WM-013a; WM-written but daemon hosts WM in-process per PL-020a). Daemon MUST NOT read or write harmonik state outside this surface.
    extra_labels:
      - "cite:wide-fanout"

  # ───────────────────────── §4.2 Startup sequence ─────────────────────────

  - mnem: pl-005
    kind: req
    req: PL-005
    title: "Startup order is deterministic (steps 0–9 + 3a + 8a)"
    description: |
      Per PL-005: daemon's startup MUST execute these steps in order, each completing before the next. (0) Composition-root bootstrap — instantiate event bus, control-point registry, handler registry, skill registry, policy registry per PL-020a; mint UUIDv7 `daemon_instance_id` and write to `.harmonik/daemon.instance-id` via WM-026 atomic discipline (temp+rename+fsync(parent_dir)); reuse across exec FORBIDDEN. (1) Acquire pidfile lock per PL-002, exit 5 on contention. (2) Emit `daemon_started`. (3) Orphan sweep per PL-006. (3a) Bind Unix socket at `.harmonik/daemon.sock` per PL-003; begin accepting connections. (4) Cat 0 pre-check per RC-012; on failure enter degraded per PL-010. (5) Walk git log for `Harmonik-Run-ID` trailers per EM §6.2; scan commits reachable from every task branch matching `run/<run_id>` (filesystem-based detection via `git for-each-ref refs/heads/run/`); branch naming is the authoritative in-flight-run index — no separate run registry. (6) Query Beads via `br ready` for dispatchable beads + audit-log/in-progress reads via BI-013/BI-016 for reconciliation input; each `br` invocation MUST carry request timeout T ≤ 5s per RC §8.1; on timeout the pre-check classifies as Cat 0 per PL-010. (7) Build in-memory Run model per EM §6.1. (8) Dispatch reconciliation per RC-008. (8a) Read `.harmonik/daemon.upgrading` (ON-020a) + `.harmonik/daemon.state` (ON-030a); upgrading marker triggers commit-hash gate (mismatch → exit 14); state marker initializes daemon into persisted suffix-state (paused/pausing/upgrade-prepare/stopped) rather than ready; corrupt markers treated as absent. (9) Transition to ready + emit `daemon_ready`, UNLESS step 8a selected a non-ready terminal target. Sequence is deterministic; no cognition.
    extra_labels:
      - "axis:idempotency-idempotent"
      - "cite:wide-fanout"

  - mnem: pl-006
    kind: req
    req: PL-006
    title: "Orphan sweep precedes reconciliation (6-bullet enumeration)"
    description: |
      Per PL-006: before Cat 0 pre-check (PL-005 step 4), daemon MUST enumerate and clean residual resources from prior daemon instances. Every candidate MUST carry a project-scoped provenance marker (PL-006a); candidates without a valid marker MUST NOT be touched. (a) Tmux sessions matching `harmonik-<project-hash>-` killed via `tmux kill-session`; poll for process exit at 100 ms cadence up to 2-second ceiling. (b) Worktree locks per WM §4.3 WM-013a / §4.8 WM-033 staleness criterion. (c) Subprocesses re-parented to init (PID 1) whose marker matches this project's hash — covers BOTH (i) handler subprocesses AND (ii) `br` (Beads CLI) subprocesses per BI-029; SIGTERM then SIGKILL after 5-second interval (HC-018). (d) Stale intent files in `.harmonik/beads-intents/` LEFT for RC Cat 3a detector at step 8 (sweep MUST NOT invoke detectors which are gated on Cat 0). (e) Stale `.harmonik/reconciliation-locks/*.lock` (RC-002a) probed via `flock(LOCK_EX|LOCK_NB)` + `kill(creator_pid, 0)`; stale removed via `unlink` + `fsync(parent_directory_fd)`; `EWOULDBLOCK` leaves in place. (f) Emit `daemon_orphan_sweep_completed` with all kill/clear counts.
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: pl-006a
    kind: req
    req: PL-006a
    title: "Project hash + provenance marker (env var + PGID)"
    description: |
      Per PL-006a: daemon MUST compute stable `project_hash = SHA-256(realpath(project_root))[:12]` (case-fold tracked under OQ-PL-008). Hash scopes (a) tmux session names (`harmonik-<project_hash>-<session_name>`) and (b) provenance marker on every spawned subprocess. Marker MUST be implemented BOTH ways: (i) env var `HARMONIK_PROJECT_HASH=<project_hash>` (readable via `/proc/<pid>/environ` on Linux); (ii) PGID set to deterministic per-project value. Daemon MUST `syscall.Setsid()` immediately at PL-005 step 0 (PGID = daemon-PID-at-start); PGID recorded in pidfile per PL-002b line 2. Every handler spawn MUST set `SysProcAttr{Setpgid: true, Pgid: <recorded_pgid>}` with one `EACCES` retry. Handlers internally calling `setsid` escape the marker (out of conformance per OQ-PL-011). Sweep matches on env var on Linux, PGID on darwin (OQ-PL-008).
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: pl-007
    kind: req
    req: PL-007
    title: "Orphan sweep is deterministic and complete before classification"
    description: |
      Per PL-007: orphan sweep MUST be deterministic given filesystem + process state AND the project-scoped provenance marker of PL-006a. After the sweep completes, no harmonik-owned process bearing this project's marker from a prior daemon is alive and no harmonik-owned worktree is locked by a prior-instance lease. The git walk (PL-005 step 5) and Beads query (step 6) operate against a quiescent project-scoped filesystem. The sweep MUST NOT match on binary path alone and MUST NOT kill a process lacking a valid project-scoped marker. Pairs with PL-INV-003 (orphan_sweep_complete_at flag asserted before any RC detector runs).

  - mnem: pl-008
    kind: req
    req: PL-008
    title: "Startup failure-mode catalog obligation (consumed from ON-003)"
    description: |
      Per PL-008: this spec DEPENDS on the normative startup failure-mode catalog produced by [operator-nfr.md §4.1 ON-003] spec-draft obligation. The Cat 0 pre-check (PL-005 step 4) consumes this catalog; the operator surface commands consume it for `harmonik status` reporting. Expected catalog entries (informative): git bad state, Beads SQLite locked, schema-version mismatch, stale-pidfile race, filesystem-unwritable, disk-full during checkpoint commit, ntm unavailable (per PL-021a). Authoritative list owned by ON-003.

  - mnem: pl-008a
    kind: req
    req: PL-008a
    title: "Exit-code consumption from ON §8"
    description: |
      Per PL-008a: daemon MUST emit exit codes from the authoritative ON §8 taxonomy. Codes consumed: 5 (`pidfile-locked` per PL-002), 6 (`socket-bind-failed` per PL-003), 7 (`git-bad-state`), 8 (`beads-unavailable`), 9 (`filesystem-unwritable`), 10 (`disk-full`), 14 (`upgrade-hash-mismatch` per PL-005 step 8a / ON-020a), 19 (`runtime-panic` per PL-018a), 22 (`ntm-unavailable` per PL-021a), 23 (`orchestrator-agent-unavailable` per PL-028 step 4). Codes 22+23 were PL-INTERIM in v0.4.0; absorbed into ON §8 in ON v0.4.0 — PL consumes by reference, no PL-side interim marker remains. On emission, daemon MUST also emit `daemon_startup_failed` with `{failed_at, exit_code, failure_mode}` BEFORE exit (where event bus has been initialized — PL-005 step 0 done). Failures BEFORE step 0 emit only the exit code to stderr.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  # ───────────────────────── §4.3 Ready-state transition ─────────────────────────

  - mnem: pl-009
    kind: req
    req: PL-009
    title: "Ready criteria + `daemon_ready` emission with monotonic companion"
    description: |
      Per PL-009: daemon MUST transition to `ready` only when ALL of the following hold: (a) orphan sweep (PL-006) complete; (b) Cat 0 pre-check passed (no infrastructure prerequisite failing per RC-012); (c) git-log walk + Beads query (PL-005 steps 5–6) complete; (d) in-memory model built (PL-005 step 7); (e) reconciliation dispatch (PL-005 step 8) complete for every in-flight run — either (i) synchronous RC-008 action-mapping succeeded and emitted `reconciliation_category_assigned` per RC-013, or (ii) the run was routed to an investigator workflow per PL-009a (investigator workflows MAY remain in-flight and MUST NOT block ready); (f) every in-flight run has received a category-assignment emission per RC-013. On transition, daemon MUST emit `daemon_ready` with `{ready_at, ready_at_ns_since_boot, investigator_run_ids[]}`. `ready_at` is RFC 3339 wall-clock (with ms); `ready_at_ns_since_boot` is the monotonic-clock companion field (CLOCK_MONOTONIC on Linux / mach_absolute_time on darwin, translated to ns) emitted alongside so restart RTO measurement per ON-031 / ON-033 is robust to wall-clock skew. Restart RTO is measured from SIGTERM (with its own monotonic companion) to `daemon_ready` emission. Boot-transition (post-reboot): monotonic comparison undefined → mark `rto_undefined`.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: pl-009a
    kind: req
    req: PL-009a
    title: "Auto-resolver failure during startup dispatch routes to Cat 3"
    description: |
      Per PL-009a: if a synchronous action-mapping auto-resolver (Cat 1, 3a, 3b, 3c, 4 per RC §8.12) fails or raises during PL-005 step 8, daemon MUST: (a) emit `reconciliation_category_assigned` with the original category per RC-013; (b) re-classify into Cat 3 (store disagreement, generic) per RC §8.4; (c) dispatch an investigator workflow per RC-008; (d) proceed toward ready with the investigator in-flight, contributing the run_id to `investigator_run_ids[]`. Daemon MUST NOT block ready on auto-resolver failure and MUST NOT leave an in-flight run unclassified at ready emission. Permanently-stuck investigators escalate via RC's normal Cat 6 path.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: pl-009b
    kind: req
    req: PL-009b
    title: "Ready-protocol surface for external callers (3 mechanisms)"
    description: |
      Per PL-009b: external processes (operator CLI, supervisors, `harmonik runner` per PL-028) MUST detect daemon readiness via, in order of preference: (a) socket probe — connect to `.harmonik/daemon.sock`, send JSON-RPC `status`, receive response with `status ∈ {ready, degraded, reconciling, draining}`; on `reconciling` retry with exponential backoff (initial 100 ms, max 2 s, capped at `T_ready_wait = 60 s` per OQ-PL-002); (b) systemd-style notify (Linux) — when launched under `Type=notify` (detectable via `$NOTIFY_SOCKET`), daemon MUST call `sd_notify("READY=1")` at the same instant as PL-009 emission; (c) ready-file fallback — daemon MAY write `.harmonik/daemon.ready` at PL-009 emission, removed on any transition out of ready. External callers MUST NOT assume ready from pidfile/socket presence alone; `ECONNREFUSED` means daemon has not yet called `listen()`.
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: pl-010
    kind: req
    req: PL-010
    title: "Degraded state on Cat 0 infrastructure failure (pre-ready only)"
    description: |
      Per PL-010: when Cat 0 pre-check (PL-005 step 4) fails, daemon MUST transition to `degraded` and remain there until prerequisites clear. In degraded, daemon MUST NOT classify or dispatch in-flight runs and MUST NOT transition to ready. Daemon MUST emit `infrastructure_unavailable` (naming the failed prerequisite) and SHOULD emit `daemon_degraded` for ON §4.9 health consumers. Daemon MUST periodically retry pre-check at configurable cadence (default 10s per OQ-PL-002). The §6.1 enum's `degraded` is PRE-`ready` Cat 0 only; post-`ready` degradation (RTO breach, health aggregation failures, silent-hang fan-out) emits `daemon_degraded` with `reason ∈ {rto_breach, reconstruction_notify, other}` but does NOT transition the §6.1 enum (OQ-PL-009). On SIGTERM while degraded, daemon proceeds to graceful shutdown per PL-011 (drain trivial — no classified runs).
    extra_labels:
      - "axis:idempotency-non-idempotent"

  # ───────────────────────── §4.4 Shutdown ─────────────────────────

  - mnem: pl-011
    kind: req
    req: PL-011
    title: "Graceful shutdown drains in-flight runs (9-step sequence)"
    description: |
      Per PL-011: on `harmonik stop --graceful`, SIGTERM, or SIGINT, daemon MUST execute drain sequence: (1) transition to `draining`; (2) stop pulling new beads from the queue; (3) classify in-flight runs (per `in_flight(run)` of ON §3) into one of three sub-states — (i) mid-agent-work (wait up to T_drain per ON-029 for watcher per HC-011 to observe `agent_completed`/`agent_failed`; on observation run reaches durable checkpoint per EM-017), (ii) just-checkpointed (no follow-up node dispatched yet; withhold dispatch; treat as quiescent), (iii) gate-pending (sub-state of `running` per EM §7.1; treat as quiescent; withhold dispatch on subsequent gate resolution); step-3-complete signal feeding step 4 is the aggregation rule = watcher-completion aggregation across (i)-class runs combined with the immediate quiescence of (ii)+(iii)-class runs; (4) wait for agent-subprocess termination bounded by drain timeout per ON-029, on expiry SIGKILL surviving subprocesses and proceed to step 5; (5) emit `daemon_shutdown` per PL-011a; (6) flush event bus (fsync per EV §4.4); (7) release worktree leases per WM §4.3 WM-013b; (8) release pidfile lock + remove pidfile on clean shutdown + remove socket file; (9) exit code 0 on clean drain, exit 1 if drain timeout escalated to forced termination at step 4. Daemon transitions through `draining` per the operator-control state machine; subsystem-level shutdown ordering owned by ON-027 (PL-011 names the daemon-level sequence).
    extra_labels:
      - "axis:idempotency-non-idempotent"
      - "cite:wide-fanout"

  - mnem: pl-011a
    kind: req
    req: PL-011a
    title: "Shutdown event emission with monotonic companion"
    description: |
      Per PL-011a: daemon MUST emit `daemon_shutdown` BEFORE the bus flush (PL-011 step 6). Payload: `{shutdown_at, shutdown_at_ns_since_boot, mode}`. Mode = `graceful` for PL-011; `immediate` for the interceptable PL-012 path (SIGKILL cannot emit). `shutdown_at` is RFC 3339 wall-clock; `shutdown_at_ns_since_boot` is the monotonic-clock companion (CLOCK_MONOTONIC on Linux / mach_absolute_time on darwin) for ON-033 RTO measurement. SIGKILL terminations have no `daemon_shutdown` emission and are marked `rto_undefined` per ON-033.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: pl-012
    kind: req
    req: PL-012
    title: "Immediate shutdown aborts in-flight runs"
    description: |
      Per PL-012: on `harmonik stop --immediate` (interceptable) or SIGKILL, daemon MUST skip drain steps (PL-011 steps 3–4). In-flight agent subprocesses are killed; in-flight state is recoverable via next startup's orphan sweep + reconciliation. On interceptable `--immediate`, daemon MUST attempt steps 5–9 (emit `daemon_shutdown{mode=immediate}`, flush, release, exit); if any step fails, daemon MUST proceed to exit with non-zero code. On SIGKILL, steps 5–9 are skipped by force; recovery follows PL-024.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: pl-013
    kind: req
    req: PL-013
    title: "Daemon does not exit on queue-empty"
    description: |
      Per PL-013: when all beads are closed or deferred and nothing is in-flight, daemon MUST sleep (suspend CPU) and wait for subsequent `harmonik enqueue` or external Beads-store changes (periodically re-queried at configurable cadence). Daemon MUST NOT exit on queue-empty. Daemon exit occurs only on explicit `harmonik stop`, on operator upgrade transition (`running` → `upgrading` per ON §4.3), or on crash (PL-024). Rationale: exiting on queue-empty would make pidfile-lock handoff load-bearing for every `enqueue`; the re-query cadence trades background idle CPU for no-lock-churn.

  # ───────────────────────── §4.5 Agent-subprocess management ─────────────────────────

  - mnem: pl-014
    kind: req
    req: PL-014
    title: "Agent subprocesses are children of the daemon (single cmd.Wait reaper)"
    description: |
      Per PL-014: daemon MUST spawn agent processes as children of the daemon (via ntm adapter or platform abstraction; see PL-020 + §4.7). Every spawn MUST carry the provenance marker of PL-006a. Child parentage is structural — allows OS to re-parent orphans to init on daemon crash, cleaned by next startup's orphan sweep. Subprocess supervision (watcher, cancellation, `cmd.Wait()` reap, crash detection) owned by HC §4.3 HC-011 + §4.6 HC-024; PL-014 scope is OS-level parentage + spawn-site provenance. Launch mechanics per HC-001. Every spawn MUST have exactly one Go goroutine that owns the `*exec.Cmd` and that goroutine MUST call `cmd.Wait()` exactly once. Failure produces zombies and is a PL-INV-005 conformance violation regardless of `kill(pid, 0)` reporting.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: pl-014a
    kind: req
    req: PL-014a
    title: "Per-daemon concurrency ceiling (rlimit-derived default)"
    description: |
      Per PL-014a: daemon MUST enforce a configurable ceiling on simultaneously-running agent subprocesses. Default = `min(RLIMIT_NOFILE_soft / FDS_PER_HANDLER, FALLBACK_CAP)` where `FDS_PER_HANDLER = 8` and `FALLBACK_CAP = 1024` (OQ-PL-010). Daemon MUST `getrlimit(RLIMIT_NOFILE)` at PL-005 step 0; if soft below `MIN_NOFILE = 4096`, daemon MUST attempt `setrlimit` to raise to `min(4096, hard)`, log warning on failure. Operator-configured ceiling per ON §4.3 takes precedence; derived value is safety default. Exceeding ceiling MUST emit `dispatch_deferred{reason="per_daemon_ceiling_exhausted"}` (NOT cross-daemon `machine_ceiling_exhausted` of ON-041).
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: pl-015
    kind: req
    req: PL-015
    title: "Agent ↔ daemon communication routes through the socket"
    description: |
      Per PL-015: agent subprocesses MUST communicate with daemon exclusively through `.harmonik/daemon.sock` (PL-003). The daemon-facing agent-command surface (including `claim-next`, `emit-outcome`, and Beads-CLI-skill-routed invocations) MUST route over this socket using the wire format of PL-003a. Concrete method definitions for agent-side commands owned by HC §4.2 (wire protocol) and BI §4.9 BI-027 (Beads-CLI skill). PL owns "these commands route over the socket"; the command-set normative inventory is tracked as OQ-PL-005 (RESOLVED: pinned in PL-003a).
    extra_labels:
      - "cite:wide-fanout"

  - mnem: pl-016
    kind: req
    req: PL-016
    title: "Agent-subprocess failure is observed by the daemon"
    description: |
      Per PL-016: agent-subprocess failure (crash, hang, policy violation) MUST be observed by the daemon's watcher goroutine per HC-011 and MUST produce typed events (`agent_failed` etc. per EV §8.3). The watcher is the exclusive owner of the `*exec.Cmd` reference for its session and the exclusive caller of `cmd.Wait()` for reap. Routing of the resulting event to retry / re-plan / terminal paths is owned by EM §4.10 EM-046b (RETRY outcome re-dispatch) and RC §4.2 (reconciliation-routed paths).
    extra_labels:
      - "cite:wide-fanout"
      - "axis:idempotency-non-idempotent"

  - mnem: pl-017
    kind: req
    req: PL-017
    title: "Silent-hang detection obligation (named, owned by HC §4.6)"
    description: |
      Per PL-017: this spec NAMES the silent-hang detection obligation owned by HC §4.6. A silent hang is an agent subprocess that remains alive but produces no output, no heartbeat, and no lifecycle signal for longer than a bounded interval. The handler-contract spec owns the detection rule, the wall-clock ceiling, and the cleanup path; PL requires that the daemon's watcher goroutine (PL-016) implement the HC detection rule and route silent-hang outcomes into reconciliation per RC §4.2.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  # ───────────────────────── §4.6 Daemon vs orchestrator-agent distinction ─────────────────────────

  - mnem: pl-018
    kind: req
    req: PL-018
    title: "Daemon is a deterministic Go binary with no LLM logic"
    description: |
      Per PL-018: daemon MUST be a deterministic Go binary. Daemon MUST NOT call any LLM, MUST NOT import any LLM SDK, and MUST NOT embed any cognition-bearing component per AR §4.2. All cognition in harmonik lives in agent subprocesses launched via handlers (HC-001) or in orchestrator-agent sessions interacting via the CLI (PL-019). A proposal to embed cognition in the daemon (e.g., "let the daemon decide which bead to claim next using an LLM") violates this requirement. Pairs with PL-INV-002 (`go-arch-lint` rule on `internal/daemon` import graph).

  - mnem: pl-018a
    kind: req
    req: PL-018a
    title: "Panic recovery barrier in the daemon main goroutine"
    description: |
      Per PL-018a: daemon MUST install a top-level `recover()` barrier in its main goroutine. Unrecovered panic MUST terminate daemon with ON §8 code 19 (`runtime-panic`) per PL-008a, emit `daemon_startup_failed` (if event bus initialized) or `daemon_shutdown{mode=immediate}` (if ready reached) on best-effort basis, and leave pidfile stale; recovery follows PL-024. Panics inside HC-watcher goroutines handled by HC-011a; panics inside other daemon goroutines (dispatcher, reconciler, subsystem loops) MUST be caught by per-goroutine `recover()` and escalate to top-level barrier only on repeated failure (threshold implementation-defined at MVH). Double-panic (panic inside top-level recover) MAY bypass the exit-code-19 path; recovery proceeds via PL-024 stale-pidfile detection + PL-025a pairing-tolerance.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: pl-019
    kind: req
    req: PL-019
    title: "Orchestrator-agent is a separate Claude Code session (post-MVH)"
    description: |
      Per PL-019: an orchestrator-agent MUST be a separate Claude Code session sitting on top of the daemon. It MUST interact with the daemon through the CLI (`harmonik enqueue`, `harmonik status`, priority triage, backlog grooming). It MUST NOT run as a thread or sub-module within the daemon process; it MUST be a separate OS process with its own PID. Orchestrator-agent is OPTIONAL in MVH — daemon is sole driver per [core-scope.md §5]; the orchestrator-agent layer is post-MVH. Cognition tag names the delegation path: role = orchestrator-agent; model-class = Claude Code (Sonnet or Opus per project config); input shape = CLI responses + Beads store via Beads-CLI skill.
    extra_labels:
      - "tag:cognition"

  - mnem: pl-020
    kind: req
    req: PL-020
    title: "Composition root is `internal/daemon`"
    description: |
      Per PL-020: daemon's code organization MUST treat the `internal/daemon` Go package as the composition root. Only `internal/daemon` is allowed to import across subsystem boundaries (per AR §4.4 subsystem-envelope rule and `go-arch-lint` enforcement declared in [core-scope.md §6]). Subsystems MUST NOT import each other directly except through the interfaces each subsystem exposes.

  - mnem: pl-020a
    kind: req
    req: PL-020a
    title: "Cross-subsystem registries reside in the composition root"
    description: |
      Per PL-020a: all cross-subsystem registries declared by foundation specs — including event bus (EV §4.3), control-point registry (CP §4.1), handler registry + skill registry (HC §4.1, §4.11), and policy registry — MUST be instantiated inside the composition root (`internal/daemon`) on startup per PL-005 step 0. No out-of-daemon registry is permitted for MVH per AR-INV-007. Post-MVH process-geometry changes that split registries across processes are tracked by AR §4.5 AR-019 and do NOT require a foundation amendment to PL.
    extra_labels:
      - "cite:wide-fanout"

  # ───────────────────────── §4.7 ntm adapter scope ─────────────────────────

  - mnem: pl-021
    kind: req
    req: PL-021
    title: "ntm adapter consumes process/tmux surface only"
    description: |
      Per PL-021: ntm adapter layer MUST consume only the following ntm capabilities: (a) agent process spawning in a tmux pane; (b) agent-profile knowledge (ready-state detection per agent type, rate-limit signals, clean exit sequences); (c) lifecycle events (process start, ready, rate-limited, stopped); (d) account rotation (for agent types that support it). All other ntm features (workflow semantics, SwarmPlan, checkpoint/recovery, Agent Mail) are explicitly out of scope per PL-022.

  - mnem: pl-021a
    kind: req
    req: PL-021a
    title: "ntm version pin and absence-detection (Cat 0 failure)"
    description: |
      Per PL-021a: daemon MUST version-pin `ntm` per the external-inputs protocol (parallel to ON §4.4 ON-017); supported versions MUST be declared in the release manifest. An `ntm` version outside the supported set MUST be detected during PL-005 step 4 Cat 0 pre-check and MUST produce ON §8 code 22 (`ntm-unavailable`) per PL-008a plus `infrastructure_unavailable{failed_prerequisite=ntm_unavailable}`. `ntm` not on PATH, tmux missing, or failing the version probe MUST classify identically as Cat 0 per RC §8.1. Daemon MUST NOT attempt to spawn handler subprocesses without a working ntm adapter; spawns MUST fail-fast with the ntm-unavailable exit code rather than silently degrading to non-tmux mode (locked decision #4 requires tmux inspectability).
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: pl-022
    kind: req
    req: PL-022
    title: "ntm adapter MUST NOT consume workflow-semantic features"
    description: |
      Per PL-022: ntm adapter MUST NOT import or consume: (a) ntm's Pipeline System (harmonik's workflow semantics live in DOT graphs, not ntm pipelines); (b) ntm's SwarmPlan format (harmonik uses DOT per locked decision #7, not SwarmPlan); (c) ntm's checkpoint/recovery (tmux-session-resume is NOT equivalent to harmonik's git-checkpoint-based workflow-state recovery — the two solve different problems); (d) ntm's file-reservation / Agent Mail features (harmonik uses Gas Town worktree+merge per locked decision #7; file reservations are explicitly rejected).

  - mnem: pl-023
    kind: req
    req: PL-023
    title: "Handler contract is the ntm boundary"
    description: |
      Per PL-023: the handler contract at HC §4.12 is where the ntm-vs-daemon boundary lives. Proposals that cross it by importing ntm pipeline types, SwarmPlan records, or Agent Mail primitives into the daemon MUST fail review. The ntm adapter is a thin layer bounded by the handler contract on the daemon side.

  # ───────────────────────── §4.8 Crash semantics ─────────────────────────

  - mnem: pl-024
    kind: req
    req: PL-024
    title: "Daemon crash leaves a stale pidfile"
    description: |
      Per PL-024: on unexpected daemon termination (panic, SIGKILL, OS crash), the pidfile (PL-002) is left stale. Next `harmonik daemon` invocation MUST detect a stale pidfile by checking that the recorded PID is no longer a live process (per PL-002a primitive selection), remove the stale pidfile, and proceed with startup per PL-005. On restart, PL-006 orphan-sweeps residual tmux sessions, locks, and re-parented subprocesses before reconciliation classifies in-flight runs. PID-reuse-on-reboot disambiguated per PL-002a by probing `/proc/<pid>/cmdline` on Linux + darwin equivalent; refusal-to-start-on-ambiguity tracked as OQ-PL-007.
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: pl-025
    kind: req
    req: PL-025
    title: "Crash during startup reconciliation re-runs from step 0"
    description: |
      Per PL-025: if daemon crashes during startup reconciliation (after PL-005 step 3 but before reaching ready), next restart MUST re-run PL-005 from step 0. Reconciliation is idempotent per RC §4.1 RC-002: re-running detection rules against the same git + Beads state produces the same classifications. Reconciliation workflows that were in-flight at crash time are re-classified (typically Cat 5 for the outer run and Cat 3b for the investigator's verdict-unexecuted case) per RC §4.2.
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: pl-025a
    kind: req
    req: PL-025a
    title: "Lifecycle-event pairing tolerance"
    description: |
      Per PL-025a: consumers of `daemon_started`, `daemon_ready`, `daemon_orphan_sweep_completed`, `daemon_degraded`, `daemon_shutdown` MUST tolerate unpaired events produced by a crash during the startup sequence. A `daemon_started` with no subsequent `daemon_ready`, `daemon_shutdown`, or `daemon_startup_failed` before the next `daemon_started` indicates a crash between PL-005 step 2 and one of those terminal emissions; the prior instance's lifecycle is treated as orphaned. The ON §4.8 RTO measurement (ON-031) MUST use this pairing rule when computing restart RTO from SIGTERM to `daemon_ready`. A crash-induced unpaired `daemon_orphan_sweep_completed` is similarly orphaned and MUST NOT be misread as completion of the current daemon's sweep.

  - mnem: pl-026
    kind: req
    req: PL-026
    title: "Agent-subprocess crash routes through handler contract"
    description: |
      Per PL-026: an agent-subprocess crash that occurs while the daemon is alive MUST be handled per HC §4.6 (error propagation across async boundaries). The daemon routes the resulting outcome into reconciliation per RC §4.2 only if the resulting run state is ambiguous; a cleanly-failed agent subprocess (explicit `FAIL` outcome, bounded exit code) produces a normal run-failure transition and does not trigger reconciliation.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  # ───────────────────────── §4.9 `harmonik upgrade` daemon-internal mechanics ─────────────────────────

  - mnem: pl-027
    kind: req
    req: PL-027
    title: "Upgrade contract obligation (daemon-internal mechanics; 5 sub-rules)"
    description: |
      Per PL-027: this spec owns daemon-internal mechanics of `harmonik upgrade`; operator-facing contract owned by ON §4.6 ON-020. Sub-rules: (i) **Exec-replacement** — new binary MUST replace old via `execve` preserving daemon PID; new process MUST re-acquire pidfile lock per PL-002a (advisory lock NOT transferred via exec on macOS flock). (ii) **Skip-path under exec** — when launched via exec-replacement (detectable by `HARMONIK_UPGRADE=1` env marker), new instance MUST skip PL-005 step 3 (orphan sweep — no orphans exist) but MUST execute steps 0, 1, 2, 4, 5–8, 9 and re-emit `daemon_ready`. (iii) **Socket continuity via fd-passing** — outgoing daemon clears `FD_CLOEXEC` on listener fd, passes via `HARMONIK_LISTENER_FD=<n>` env var alongside upgrade marker, MUST NOT close fd before exec; new binary calls `net.FileListener(os.NewFile(fd, ""))` to adopt, then re-sets `FD_CLOEXEC`. Adoption is gap-free; clients observe no `ECONNREFUSED`. (iv) **Intermediate state + marker write** — outgoing daemon MUST write `.harmonik/daemon.upgrading` per ON-020a via WM-026 atomic discipline (temp+rename+fsync(parent_dir)) BEFORE `execve`; marker MUST be present and durable before exec; marker removed on clean transition to ready per ON-020a. (v) **Upgrade event emissions** — daemon MUST emit `operator_upgrading` before exec and `operator_upgrade_completed` after new instance reaches ready; rejection paths emit `operator_upgrade_rejected`.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  # ───────────────────────── §4.10 Command surface (daemon side) ─────────────────────────

  - mnem: pl-028
    kind: req
    req: PL-028
    title: "Daemon command surface (8 entry points)"
    description: |
      Per PL-028: daemon MUST support: (a) `harmonik daemon` — start headless, blocks until signaled; flags `--config`, `--log-level`; OQ-PL-003 tracks bare-git-repo behavior. (b) `harmonik attach` — observability TUI over the socket; multiple simultaneous attaches MUST be supported with no foundation upper limit; detach MUST NOT kill daemon; arbitration deferred to ON §4.3 (OQ-ON-004). (c) `harmonik runner` — solo-dev convenience: (1) start daemon if absent; (2) wait for `daemon_ready` per PL-009b; (3) open tmux session under project naming convention with daemon log + per-handler panes (locked decision #4 inspectability); (4) on `--orchestrator-agent` flag, spawn Claude Code session per PL-019, exit ON §8 code 23 if Claude Code unavailable; on ntm unavailable exit per PL-021a (code 22). Distinct entry point with own exit-code surface; NOT a shell alias. (d) `harmonik enqueue` — JSON-RPC `enqueue` per BI §4.4. (e) `harmonik status` — report §6.1 DaemonStatus enum value; for `degraded` MUST report failing Cat 0 prerequisite per PL-010; semantic content beyond enum owned by ON §4.1 ON-002. (f) `harmonik pause` — semantics owned by ON §4.3 ON-008; PL obligates only command-dispatch + socket routing. (g) `harmonik stop [--graceful|--immediate]` — `--graceful` default; behavior per PL-011 / PL-012. (h) `harmonik upgrade` — daemon-internal mechanics per PL-027; operator-facing per ON §4.6 ON-020. Multi-daemon coordination flags delegated to ON §4.10 ON-041.

  # ───────────────────────── §5 invariants ─────────────────────────

  - mnem: pl-inv-001
    kind: invariant
    req: PL-INV-001
    title: "Sensor: one daemon per project (pidfile lock + content match)"
    description: |
      Per PL-INV-001: for each project directory at any instant, at most one daemon process MUST hold the pidfile lock at `.harmonik/daemon.pid`. Spans ON §4.3 (operator-control state machine requires singular daemon to track status), BI §4.10 BI-030 (intent log keyed against single-writer daemon), WM §4.3 WM-013a (worktree leases assume single leasing authority per project).
      Sensor: pidfile lock held by daemon's fd AND pidfile content parseable AND parsed PID = `getpid()` AND parsed PGID = `getpgrp()` AND parsed `daemon_instance_id` = in-memory `daemon_instance_id` minted at PL-005 step 0 (line-3 check applies for v0.4.1+ pidfiles; v0.4.0 two-line pidfiles fall back to PID/PGID predicate per PL-002b reader-tolerance).

  - mnem: pl-inv-002
    kind: invariant
    req: PL-INV-002
    title: "Sensor: daemon is deterministic (`go-arch-lint` + binary import-graph)"
    description: |
      Per PL-INV-002: daemon binary MUST contain no LLM invocations and no cognition-bearing components per AR §4.2. Spans AR §4.1 (four-axis classification assigns `llm-freedom=none` to daemon as a whole), AR-INV-007 (centralized-controller invariant), and every subsystem spec's Go-package declaration.
      Sensor: `go-arch-lint` rule on `internal/daemon` package imports asserting no LLM SDK (`github.com/anthropics/*`, `github.com/openai/*`, equivalents) appears in transitive closure; plus a binary-level import-graph scan (§10.2).

  - mnem: pl-inv-003
    kind: invariant
    req: PL-INV-003
    title: "Sensor: orphan sweep completes before reconciliation classification"
    description: |
      Per PL-INV-003: PL-006's orphan sweep MUST complete before any reconciliation detector (per RC §4.3) runs. Load-bearing for reconciliation correctness: detectors scope on runs (RC-INV-005), and a run with a live orphan subprocess or stale worktree lock cannot be classified correctly until those orphans are cleared.
      Sensor: daemon maintains in-memory flag `orphan_sweep_complete_at: Timestamp`; every PL-005 step 8 reconciliation-dispatch path MUST assert the flag is non-nil before invoking any detector. Assertion failure is a panic per PL-018a.

  - mnem: pl-inv-004
    kind: invariant
    req: PL-INV-004
    title: "Sensor: socket-path exclusivity"
    description: |
      Per PL-INV-004: for each project directory at any instant, at most one bound Unix socket at `.harmonik/daemon.sock` MUST be serving daemon requests. Pairs with PL-INV-001 and extends it to the socket surface: two daemons could in principle race to bind the socket if pidfile-lock discipline were violated; this invariant forbids the observable outcome.
      Sensor: the daemon that holds the pidfile lock (PL-002) is exclusive owner of the bound socket fd. A second daemon observing `EADDRINUSE` on bind MUST exit with ON §8 code 6 (`socket-bind-failed`) per PL-008a; the exit path is the sensor.

  - mnem: pl-inv-005
    kind: invariant
    req: PL-INV-005
    title: "Sensor: agent subprocess parentage is daemon-originated"
    description: |
      Per PL-INV-005: every live handler subprocess spawned during normal operation MUST have the daemon (by PID) as its initial parent; post-crash re-parenting to init (PID 1) is the only legal parentage deviation, cleaned by next daemon's orphan sweep (PL-006). Load-bearing for the orphan sweep's detection rule (PL-006a provenance marker assumes the subprocess was spawned by a daemon of this project, not by a user shell).
      Sensor: three-mechanism verification — (a) **static lint** over the `internal/daemon` package + ntm adapter ensuring every `*exec.Cmd`-creating call site sets `SysProcAttr{Setpgid: true, Pgid: <recorded_pgid>}` AND injects `HARMONIK_PROJECT_HASH=<project_hash>` into `Cmd.Env` per PL-006a (compile-time check, no spawn site can omit the marker); (b) **scenario-level fixture** in pl-test.agent-supervision-fixture spawns a handler subprocess and asserts `/proc/<pid>/environ` (Linux) AND `getpgid(pid)` (darwin) report the expected marker; subprocess without the marker fails the fixture; (c) **reviewer scan** at `harmonik upgrade` finalize / cross-spec review checks for handler wrappers that internally call `setsid` (the OQ-PL-011 escape hatch — disclosed handler-side conformance break). PL-006 sweep MUST NOT reap a subprocess lacking the marker (zombie failure mode of PL-014's `cmd.Wait()` discipline counts as a separate PL-INV-005 violation regardless of `kill(pid, 0)` reporting).

  # ───────────────────────── §6 schema beads (1) ─────────────────────────
  # Note: §6.1 DaemonStatus is the only PL-owned schema. §6.2 co-owned event
  # payloads belong to EV per §2.11(d.2). §6.3 declares no on-disk schema.

  - mnem: pl-schema.daemon-status
    kind: schema
    schema_kind: enum
    title: "Define `DaemonStatus` ENUM (§6.1)"
    description: |
      Implement the 7-value ENUM consumed by the daemon-status event ([event-model.md §8.7.2]) and by `harmonik status`: `starting` (pidfile locked; orphan sweep not yet complete); `reconciling` (Cat 0 passed; reconciliation dispatch in progress); `degraded` (Cat 0 prerequisite failing; classification halted; pre-ready only per PL-010); `ready` (PL-009 criteria met; normal dispatch active); `paused` (operator-initiated pause; in-flight runs drained per ON §4.3); `draining` (graceful-shutdown sequence active per PL-011); `stopped` (terminal; pidfile released per ON §4.3). PL owns the `starting → reconciling → ready` prefix and pre-`ready` `degraded` side state; the full operator-control state machine (paused/draining/stopped + suffix) is owned by ON §4.3. Consumers MUST tolerate unknown statuses by falling through to default display per ON §4.5 ON-018 N-1 compatibility. Post-`ready` degradation (RTO breach, health aggregation failures, silent-hang fan-out) emits `daemon_degraded` but does NOT correspond to a transition in this enum (OQ-PL-009).

  # ───────────────────────── Test-infra beads (10) ─────────────────────────

  - mnem: pl-test.pidfile-and-socket-fixture
    kind: test-infra
    title: "Pidfile + socket twin-driven fixture (PL-001..PL-003b + PL-INV-001 + PL-INV-004)"
    description: |
      Per §10.2 (PL-001, PL-002, PL-002a, PL-002b, PL-003, PL-003a, PL-003b, PL-INV-001, PL-INV-004): twin-driven test attempts to start a second daemon against the same project and asserts exit code `5` (pidfile-locked); SIGKILLs the first daemon and asserts second daemon's stale-pidfile detection via `flock` + `kill(pid, 0)` logic (PL-024). Pidfile content asserts three-line format (PID/PGID/UUIDv7), reader-tolerance for one-line and two-line backwards-compat formats. Binding test asserts socket mode `0600`, socket-path exclusivity (second daemon → `EADDRINUSE` → code 6), and NDJSON framing correctness against a JSON-RPC client. Pre-ready rejection test asserts `daemon_not_ready{reason="unknown_run_id"}` typed error during the pre-ready window.

  - mnem: pl-test.startup-orphan-sweep-harness
    kind: test-infra
    title: "Startup + orphan sweep scenario harness (PL-005, PL-006, PL-006a, PL-007, PL-008a, PL-INV-003, PL-INV-005)"
    description: |
      Per §10.2 (PL-005, PL-006, PL-006a, PL-007, PL-INV-003, PL-INV-005): scenario test seeds tmux sessions, stale worktree locks, re-parented handler subprocesses AND re-parented `br` subprocesses (with and without provenance marker), stale `.harmonik/reconciliation-locks/*.lock` files (with and without `Harmonik-Verdict-Executed: true` per RC-002b), and stale intent files; starts daemon and asserts orphan-sweep event payload counts (including `br_subprocesses_killed` and `reconciliation_locks_removed`); asserts subprocesses lacking the marker are NOT killed; asserts locks under active acquisition (concurrent `flock(LOCK_EX)` from fixture) are NOT removed; asserts `orphan_sweep_complete_at` flag is set before any reconciliation detector runs. PL-008a: unit test asserts every consumed exit code (5–10, 14, 19, 22, 23) maps to a distinct failure and `daemon_startup_failed` is emitted on each (where event bus initialized).

  - mnem: pl-test.ready-state-fixture
    kind: test-infra
    title: "Ready-state + degraded scenario fixture (PL-009, PL-009a, PL-009b, PL-010)"
    description: |
      Per §10.2 (PL-009, PL-009a, PL-010): scenario tests covering (a) ready transition only when criteria are met; (b) degraded persistence until Cat 0 clears; (c) auto-resolver failure routing to Cat 3 investigator workflows without blocking ready. PL-009b: ready-protocol surface tests cover socket-probe with exponential backoff, systemd `sd_notify` (Linux), and `.harmonik/daemon.ready` fallback file. Asserts `ready_at_ns_since_boot` monotonic-companion field is present and sourced from CLOCK_MONOTONIC / mach_absolute_time per ON-033.

  - mnem: pl-test.shutdown-drain-fixture
    kind: test-infra
    title: "Shutdown + drain scenario fixture (PL-011, PL-011a, PL-012, PL-013)"
    description: |
      Per §10.2 (PL-011, PL-011a, PL-012): scenario tests for graceful drain — asserts in-flight runs reach checkpoint before suspend; classifies in-flight runs into (i) mid-agent-work, (ii) just-checkpointed, (iii) gate-pending; asserts step-3-complete signal is the watcher-aggregation across (i)-class combined with (ii)+(iii) immediate quiescence; asserts `daemon_shutdown{mode=graceful}` emitted before bus flush with `shutdown_at_ns_since_boot` companion. Immediate abort: asserts subprocess kill + `daemon_shutdown{mode=immediate}` on interceptable path + next-startup recovery on SIGKILL. PL-013: asserts daemon does not exit on queue-empty.

  - mnem: pl-test.agent-supervision-fixture
    kind: test-infra
    title: "Agent supervision + spawn discipline fixture (PL-014, PL-014a, PL-015, PL-016, PL-017)"
    description: |
      Per §10.2 (PL-014, PL-014a, PL-015, PL-016, PL-017): tests spawn discipline — every spawn carries provenance marker per PL-006a; every spawn has exactly one goroutine owning `*exec.Cmd` calling `cmd.Wait()` exactly once (zombie failure detected as PL-INV-005 violation regardless of `kill(pid, 0)` reporting). PL-014a: rlimit-derived ceiling derived from `RLIMIT_NOFILE_soft / FDS_PER_HANDLER` capped at `FALLBACK_CAP=1024`; `setrlimit` raises soft to `min(4096, hard)`; exceeding ceiling emits `dispatch_deferred{reason="per_daemon_ceiling_exhausted"}`. Watcher / silent-hang detection routes through HC §4.6 implementation; PL test asserts the routing wiring is in place.

  - mnem: pl-test.composition-root-lint
    kind: test-infra
    title: "Composition-root + panic-barrier lint (PL-018, PL-018a, PL-020, PL-020a, PL-INV-002)"
    description: |
      Per §10.2 (PL-018, PL-018a, PL-020, PL-020a, PL-INV-002): build-time lint (e.g., `go-arch-lint` per [core-scope.md §6]) asserts `internal/daemon` imports no LLM SDK (`github.com/anthropics/*`, `github.com/openai/*`, equivalents in transitive closure), plus binary-level import-graph scan. Wiring test instantiates event bus, control-point registry, handler registry, skill registry inside composition root on startup. Panic-barrier test installs a panic in a goroutine and asserts top-level `recover()` barrier terminates daemon with ON §8 code 19 (`runtime-panic`). `go-arch-lint` declaration that `internal/daemon` is the only subsystem-crossing importer.

  - mnem: pl-test.ntm-adapter-fixture
    kind: test-infra
    title: "ntm adapter + version-pin fixture (PL-021, PL-021a, PL-022, PL-023)"
    description: |
      Per §10.2 (PL-021, PL-021a, PL-022, PL-023): lint rule asserts `internal/adapter/ntm` imports only the allowed ntm surface (process/tmux); importing ntm pipeline or SwarmPlan packages is a build failure. Absence-detection test runs the daemon on a PATH without `ntm` and asserts ON §8 code 22 (`ntm-unavailable`) plus `infrastructure_unavailable{failed_prerequisite=ntm_unavailable}`. Version-pin test seeds an ntm version outside the supported set and asserts identical Cat 0 classification.

  - mnem: pl-test.crash-recovery-harness
    kind: test-infra
    title: "Crash recovery + reconciliation re-run harness (PL-024, PL-025, PL-025a, PL-026)"
    description: |
      Per §10.2 (PL-024, PL-025, PL-026): chaos-style scenario tests SIGKILL the daemon mid-reconciliation; assert next startup re-runs PL-005 from step 0 deterministically and produces identical classifications. Asserts stale-pidfile detection via `flock` failure + `kill(pid, 0)` non-live response. PL-025a: pairing-tolerance test seeds an unpaired `daemon_started` (no subsequent ready/shutdown) and asserts ON-031 RTO measurement uses the pairing rule. PL-026: agent-subprocess crash test asserts cleanly-failed subprocess produces normal run-failure transition (no reconciliation), ambiguous run state routes through reconciliation per RC §4.2.

  - mnem: pl-test.upgrade-scenario-harness
    kind: test-infra
    title: "Upgrade exec-replacement scenario harness (PL-027)"
    description: |
      Per §10.2 (PL-027): exec-replace daemon binary and assert (i) pidfile lock is re-acquired by new instance; (ii) orphan sweep is skipped (HARMONIK_UPGRADE=1 detected); (iii) listener fd is adopted gap-free via `HARMONIK_LISTENER_FD` per fd-passing protocol — no client `ECONNREFUSED` observable across exec; (iv) `.harmonik/daemon.upgrading` marker is present + durable on disk before `execve` (temp+rename+fsync(parent_dir) per WM-026 atomic discipline) and removed on clean transition to ready; commit-hash mismatch fails with ON §8 code 14 (`upgrade-hash-mismatch`); (v) `operator_upgrading` and `operator_upgrade_completed` emission bracket the exec.

  - mnem: pl-test.cli-surface-fixture
    kind: test-infra
    title: "CLI command surface fixture (PL-028)"
    description: |
      Per §10.2 (PL-028): CLI-surface test dispatches each declared command (`daemon`, `attach`, `runner`, `enqueue`, `status`, `pause`, `stop`, `upgrade`); asserts JSON-RPC method wiring per PL-003a, flag parsing, and exit-code behavior. `harmonik runner` distinct-entry-point test: asserts the four ordered steps (start, wait-ready, open tmux, optional orchestrator-agent spawn); asserts ON §8 code 23 (`orchestrator-agent-unavailable`) on Claude Code missing; asserts ON §8 code 22 (`ntm-unavailable`) on ntm missing. `harmonik attach` test: multiple simultaneous attaches, detach does not kill daemon.

# Edges. `from` = citing bead; `to` = prerequisite/blocker bead.
# discipline §2.5 convention: "A blocks B" → loader emits `br dep add B A -t blocks`
# (B depends on A). YAML `from`/`to` matches the (citing, prereq) tuples.
#
# Mnemonic prefix selects resolution map:
#   pl-* → intra-spec (this spec's mnem-map, generated at load)
#   ar-* / em-* / hc-* / cp-* / wm-* / bi-* / ev-* → cross-spec
#   forward:* → forward-deferred (logged only, NOT loaded into beads); used for
#     rc, on targets per F-pilot-EM-2 / Option B precedent (specs in depends-on
#     but not yet pilot-loaded — RC; OR specs intentionally NOT in depends-on
#     where the named-obligation pattern still demands a hard-dep edge — ON,
