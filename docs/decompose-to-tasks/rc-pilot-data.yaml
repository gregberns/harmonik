spec:
  prefix: "rc"
  title: "Reconciliation spec — implementation"
  spec_path: specs/reconciliation/spec.md
  spec_version: "0.4.0"
  pilot_version: "0.1.0"

# Auto-applied to every non-epic bead in this file.
default_labels:
  - "spec:reconciliation"
  - "tag:mechanism"

# Cross-spec mnem-map paths (CSV from prior pilot loads).
# All 9 specs in RC's depends-on are LOADED — no forward-deferred
# placeholders needed. RC is the LAST pilot in the corpus.
cross_specs:
  ar: docs/decompose-to-tasks/mnem-maps/ar-mnem-map.csv
  em: docs/decompose-to-tasks/mnem-maps/em-mnem-map.csv
  ev: docs/decompose-to-tasks/mnem-maps/ev-mnem-map.csv
  hc: docs/decompose-to-tasks/mnem-maps/hc-mnem-map.csv
  cp: docs/decompose-to-tasks/mnem-maps/cp-mnem-map.csv
  bi: docs/decompose-to-tasks/mnem-maps/bi-mnem-map.csv
  wm: docs/decompose-to-tasks/mnem-maps/wm-mnem-map.csv
  pl: docs/decompose-to-tasks/mnem-maps/pl-mnem-map.csv
  "on": docs/decompose-to-tasks/mnem-maps/on-mnem-map.csv

epic:
  mnem: "rc"
  title: "Reconciliation spec — implementation"
  description: |
    Implements specs/reconciliation/spec.md v0.4.0 + specs/reconciliation/schemas.md v0.4.0 (43 first-class §4 req beads from 43 active §4 entries after 0 §2.3 coalesces and 0 §2.1a collapses, 2 invariants — RC-INV-001 reconciliation-as-workflow uniqueness + RC-INV-004 evidence-corroboration guarantee; RC-INV-002 + RC-INV-003 + RC-INV-005 retired in v0.3 never reusable, 15 §6 schemas split across spec.md + schemas.md per §2.11(a) multi-file rule — 10 RECORDs + 5 ENUMs incl. Harmonik-Verdict-Executed trailer per schemas.md §6.4 RC-owned and WorkflowClass extension per schemas.md §6.5, 12-bead §8 reconciliation-category-taxonomy per §2.11(c) canonical large-§8-taxonomy rule — 1 umbrella rc-error.taxonomy + 11 per-category beads cat-0/1/2/3/3a/3b/3c/4/5/6a/6b SHAPE-not-COUNT distinct from BI/WM/ON sentinel single-bead form per F-pilot-RC-4, 0 multi-step splits — RC-018 budget-exhaustion 5-step sequence and RC-025a verdict-executor 7-step sequence both stay as single beads via F8b cohesive-function-body tiebreaker per F-pilot-RC-5 matching PL/EM-016 precedent, 7 test-infra beads from §10.2 obligations). depends-on: [execution-model, event-model, handler-contract, control-points, beads-integration, workspace-model, process-lifecycle, operator-nfr, architecture]. ALL 9 cross-spec targets pilot-loaded — RC is the LAST pilot in the corpus and emits ZERO forward-deferred placeholders. Highest cross-spec edge density in the corpus by design.
  labels:
    - "kind:spec-parent"

beads:
  # kinds: req | invariant | schema | error-taxonomy | test-infra

  # ───────────────────────── §4.1 Reconciliation-as-workflow ─────────────────────────

  - mnem: rc-001
    kind: req
    req: RC-001
    title: "Reconciliation runs as a harmonik workflow"
    description: |
      Per RC-001: reconciliation MUST run as a normal harmonik workflow — DOT-defined per [execution-model.md §4.1], dispatched deterministically by the daemon, and event-logged per [event-model.md §4.1] and the per-event subsections under [event-model.md §8]. There MUST NOT be a separate reconciliation subsystem. Each investigator-required category (Cat 2, Cat 3 generic, Cat 6a per §8) has its own reconciliation workflow in the S01-shipped library per RC-004. Sets the foundational claim that the spec is consumed throughout — reconciliation runs alongside ordinary workflows under the same orchestrator, event bus, and execution-model semantics.
    extra_labels:
      - "cite:wide-fanout"

  - mnem: rc-002
    kind: req
    req: RC-002
    title: "Reconciliation workflows emit exactly one checkpoint commit"
    description: |
      Per RC-002: a reconciliation workflow MUST emit exactly one checkpoint commit — the **verdict commit** — on the investigator-run's task branch. The verdict commit MUST carry the `reconciliation_verdict_emitted` event's payload (per [schemas.md §6.1]) plus any evidence the investigator produced under `.harmonik/reconciliation/<investigator_run_id>/`. Intermediate state transitions within the reconciliation workflow MUST NOT be checkpointed. Explicit exception to [execution-model.md §4.5 EM-023]; keyed on workflow-library metadata tag `workflow_class = reconciliation` (declared in [schemas.md §6.5] as RC's extension to the Workflow record owned by [execution-model.md §4.1]; OQ-RC-002 tracks EM acceptance).
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: rc-003
    kind: req
    req: RC-003
    title: "Bounded recursion follows from the verdict-only commit rule"
    description: |
      Per RC-003: a daemon crash during reconciliation MUST leave no mid-investigation durable state. On restart, the outer run whose reconciliation was interrupted MUST be re-classified from its original category against unchanged git + Beads state, and a fresh reconciliation workflow MUST be dispatched. Reconciliation-workflow nodes MUST NOT be classified under §8 Cat 1 or Cat 2; the recursion-bounding rule of RC-002 ensures no in-flight investigator state exists for a detector to classify.

  - mnem: rc-002a
    kind: req
    req: RC-002a
    title: "At most one reconciliation workflow per target run (flock)"
    description: |
      Per RC-002a: for any given `target_run_id`, at most ONE reconciliation workflow MUST be in-flight at a time. Daemon MUST hold a per-run reconciliation lock at `.harmonik/reconciliation-locks/<target_run_id>.lock`, acquired via `flock(LOCK_EX|LOCK_NB)` per the fd-lifetime advisory-lock primitive of [process-lifecycle.md §4.1 PL-002a]. Lock acquired before the reconciliation workflow's first emission (RC-013 category-assigned); released ONLY after one of: verdict-executed commit lands (RC-025); budget exhaustion (RC-018); malformed verdict (RC-023); investigator-process crash (HC-011 watcher); operator pause (ON-027 entry). On daemon startup, orphan-sweep ([process-lifecycle.md §4.2 PL-006]) enumerates locks and removes stale (PID gone). Two concurrent investigators producing verdicts is structural violation routed through RC-023 with reason `multiple-verdicts`. Second dispatch on `EWOULDBLOCK` emits `reconciliation_dispatch_deduplicated` (cross-spec coordination request to EV §8.6) and skips without re-classification.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: rc-002b
    kind: req
    req: RC-002b
    title: "Lock acquisition and verdict-executed-commit are NOT atomic"
    description: |
      Per RC-002b: lock acquisition (RC-002a) and verdict-executed-commit emission (RC-025 + [schemas.md §6.4]) are two physically distinct write operations and CANNOT be made atomic. On daemon startup, a stale lock file at `.harmonik/reconciliation-locks/<target_run_id>.lock` whose target run's investigator task branch carries a `Harmonik-Verdict-Executed: true` commit MUST be deleted (lock outlived its useful purpose). Stale lock without verdict-executed commit MUST route the target run through Cat 3b per §8.5. Per §2.2 F8c constraint-adjacent pattern, this is a constraint requirement adjacent to RC-002a + RC-025.

  - mnem: rc-003a
    kind: req
    req: RC-003a
    title: "Category orthogonality via priority-ordered first-match"
    description: |
      Per RC-003a: detection categories are NOT mutually exclusive on evidence; a single in-flight run may satisfy multiple §8 categories. Detectors MUST apply priority order and emit the FIRST category whose rule fires: `Cat 0 → Cat 6b → Cat 6a → Cat 5 → Cat 3c → Cat 3b → Cat 3a → Cat 3 → Cat 2 → Cat 4 → Cat 1`. Rationale: infrastructure/integrity evidence (Cat 0/6b/6a) dominates; clean-restart (Cat 5) dominates orphans; specific Cat 3 sub-cases dominate generic; Cat 2 dominates Cat 4 (investigator subsumes auto-resume for non-idempotent); Cat 1 is terminal (cheapest). Resolves Cat 3 vs Cat 6a workspace-missing tension, Cat 3c vs Cat 3b verdict-unexecuted-on-merged-run tension.
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: rc-003b
    kind: req
    req: RC-003b
    title: "Crashed reconciliation-workflow branch classification (Cat 5)"
    description: |
      Per RC-003b: a reconciliation workflow whose task branch exists but whose investigator subprocess died mid-run (no verdict commit yet emitted) MUST be classified as Cat 5 (clean re-dispatch) on subsequent reconciliation cadence ticks, NOT Cat 6a (multiple task branches). Discriminator is the `Harmonik-Workflow-Class: reconciliation` trailer per RC-002 (cross-spec coordination request to EM trailer registry; tracked OQ-RC-002). RC-003a priority order applies; this rule scopes the Cat 5 vs Cat 6a tiebreak for the reconciliation-workflow case.

  - mnem: rc-004
    kind: req
    req: RC-004
    title: "Reconciliation workflow library is S01-owned"
    description: |
      Per RC-004: the reconciliation workflow library — concrete DOT workflows + YAML policies for investigator-required categories (Cat 2, Cat 3 generic, Cat 6a per §8) — MUST be owned by S01 (Orchestrator Core) and ship as part of S01. S01 MUST ship: (a) DOT workflow per investigator-required category; (b) YAML policies naming the wall-clock budget (RC-017) + skill-injection set (Beads-CLI + git-inspection skills minimum per [control-points.md §4.11], [handler-contract.md §4.11]); (c) investigator-agent prompt templates.

  - mnem: rc-005
    kind: req
    req: RC-005
    title: "Detectors and verdict-execution are NOT in the workflow library"
    description: |
      Per RC-005: §4.3 detectors MUST live in the daemon's Go code (mechanism-tagged functions), NOT in the S01 workflow library. §4.5 verdict-execution mechanics (action dispatch, verdict-executed commit emission, idempotency-key adapter calls) MUST also live in the daemon's Go code. The S01 library owns investigator REASONING only.

  - mnem: rc-006
    kind: req
    req: RC-006
    title: "Upgrade discipline — daemon code and library ship together"
    description: |
      Per RC-006: a new reconciliation category (added via amendment protocol per [architecture.md §4.6]) MUST ship a daemon-code change (detector + action-map entry per §8 taxonomy) AND a workflow-library addition in S01 (for investigator-required categories) in the same harmonik release. Split releases are forbidden.

  # ───────────────────────── §4.2 Action-mapping dispatch ─────────────────────────

  - mnem: rc-007
    kind: req
    req: RC-007
    title: "Action-mapping is the dispatch contract; taxonomy is detection"
    description: |
      Per RC-007: §8 category taxonomy classifies *what went wrong*; action-mapping table in §8.12 (semantics) + [schemas.md §6.3] (mechanical dispatch) specifies *what the daemon does by default*. Default action is normative; deviation (e.g., policy override routing Cat 1 through investigator) MUST be declared in the reconciliation workflow's YAML with rationale. Dual-table ownership: §8.12 prose authoritative on semantics; [schemas.md §6.3] authoritative on mechanical dispatch; divergence is a lint failure.

  - mnem: rc-008
    kind: req
    req: RC-008
    title: "Auto-resolver categories MUST have a deterministic resolver"
    description: |
      Per RC-008: every category whose default action in §8.12 is an auto-resolver (Cat 0 wait-and-retry, Cat 1 re-spawn, Cat 3a adapter re-issue, Cat 3b verdict re-execution, Cat 3c direct close-write, Cat 4 retry/gate re-arm, Cat 5 no-op, Cat 6b operator escalation) MUST have a deterministic implementation in the daemon's Go code. Investigator-required categories (Cat 2, Cat 3 generic, Cat 6a) MUST have a playbook per RC-015/RC-016. Note: RC-INV-001 cite in body is supporting per F-pilot-AR-10 — removing the invariant leaves the auto-resolver enumeration testable.

  - mnem: rc-009
    kind: req
    req: RC-009
    title: "Taxonomy shape is settled (11-category lock)"
    description: |
      Per RC-009: the 11-category detection taxonomy plus §8.12 action-mapping is the shape, resolved 2026-04-24 per user decision. Authoring agents MUST NOT re-open the 3-action-vs-11-category framing. Any future amendment MUST follow the protocol of [architecture.md §4.6].

  # ───────────────────────── §4.3 Detectors ─────────────────────────

  - mnem: rc-010
    kind: req
    req: RC-010
    title: "Detectors operate on runs, not beads"
    description: |
      Per RC-010: detectors MUST classify each in-flight run independently. A bead with multiple runs over its lifetime (per [execution-model.md §4.3 EM-014]) MUST have each run classified separately. Detectors MUST filter checkpoints by `Harmonik-Run-ID` trailer, NOT by matching on `Harmonik-Bead-ID`. An orphaned task branch from a prior run whose bead has since been re-claimed MUST classify as Cat 5 for the old run.

  - mnem: rc-011
    kind: req
    req: RC-011
    title: "Ordering uses git DAG parentage and UUID v7, not wall clock"
    description: |
      Per RC-011: detectors MUST order checkpoints within a run's task branch by **git DAG parentage** (parent-pointer chain) and events by **UUID v7 `event_id`** per [event-model.md §4.1]. Wall-clock timestamps (`timestamp_wall`, git commit `author_date`/`committer_date`) MUST NOT drive classification. Most-recent checkpoint identified as the tip of the run's task branch (commit with no child in run's branch-subgraph), NOT the commit with the latest wall-clock timestamp.

  - mnem: rc-012
    kind: req
    req: RC-012
    title: "Cat 0 pre-check runs before any other detector"
    description: |
      Per RC-012: before any §8 category detector executes, daemon MUST verify infrastructure prerequisites per §8.1: `br --version` returns within timeout T (default 5s) AND reports a version compatible with the pin per [beads-integration.md §4.8]; a trial `br list --limit 1` or equivalent returns without error; `git rev-parse HEAD` succeeds; `.harmonik/` is writable. Any prerequisite failure MUST halt classification, emit `infrastructure_unavailable` per [event-model.md §8] naming the specific prerequisite, transition to `degraded` status per [process-lifecycle.md §4.2], and retry at configurable cadence. No in-flight run is classified until Cat 0 clears.
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: rc-012a
    kind: req
    req: RC-012a
    title: "Post-`ready` Cat 0 does not transition daemon state"
    description: |
      Per RC-012a: a Cat 0 prerequisite failure observed AFTER daemon has reached `ready` (per [process-lifecycle.md §4.3 PL-009]) MUST emit `daemon_degraded{reason=infrastructure_unavailable}` per [event-model.md §8.7.5] and surface the failing prerequisite via [operator-nfr.md §4.9 ON-037] health probe, but MUST NOT transition the §6.1 daemon-status enum from `ready` to `degraded`. Daemon-level `degraded` enum entry is reserved for pre-`ready` Cat 0 failures per PL-010. Reentrant `degraded` would tangle operator-control with reconciliation per the PL-010 NOTE.

  - mnem: rc-013
    kind: req
    req: RC-013
    title: "Detector emits `reconciliation_category_assigned`"
    description: |
      Per RC-013: after classifying an in-flight run into a §8 category, detector MUST emit `reconciliation_category_assigned` per [event-model.md §8] carrying run_id, assigned category, detection-rule name. Emission MUST precede dispatch of any reconciliation workflow or auto-resolver. Consumers MUST tolerate duplicate emissions (e.g., from crash-restart re-dispatch); dedup key is `(target_run_id, category, snapshot_token.git_head_hash)`.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: rc-014
    kind: req
    req: RC-014
    title: "JSONL divergence-evidence scope is bounded"
    description: |
      Per RC-014: detectors and investigators MAY read JSONL only for: detecting checkpoint commit referenced in `checkpoint_written` event missing from git (Cat 6b); detecting JSONL corrupt past byte offset (Cat 6b); detecting `transition_event` exists but transition-record sibling file absent (Cat 3 per [execution-model.md §4.4 EM-018]); Cat 2 liveness probe via controlled indexed query (NOT live-follow tail); supplying observational context to investigator. FORBIDDEN: using JSONL as source of `run_id`/`state_id`/`transition_id` for in-flight runs (those derive from git per [execution-model.md §4.7]); using JSONL to decide which bead is in-flight (Beads via `br` is authoritative per [beads-integration.md §4.7]); reconstructing `state` or `transition` from JSONL payloads. On detected divergence, detector emits `store_divergence_detected` with `corroboration ∈ {git-corroborated, beads-corroborated}` per EV-023a; un-corroborable observations route to `divergence_inconclusive` per [event-model.md §8.6.10] (Cat 6a/6b per RC-003a).
    extra_labels:
      - "cite:wide-fanout"

  - mnem: rc-019a
    kind: req
    req: RC-019a
    title: "Evidence-corroboration contract for store-divergence events"
    description: |
      Per RC-019a: every `store_divergence_detected` emission MUST adhere to EV-023a per [event-model.md §4.5]: detector MUST classify the candidate divergence into the `corroboration` enum value (`git-corroborated | beads-corroborated`) per [event-model.md §8.6.8] payload. Single-source observations whose corroboration cannot be established MUST emit `divergence_inconclusive` per [event-model.md §8.6.10] instead, NOT `store_divergence_detected`. Cat 6b (post-emission corroboration impossible) is reachable when neither git nor Beads is readable; Cat 6b emissions are exempt from corroboration via the dedicated escalation path of §8.11.

  - mnem: rc-020a
    kind: req
    req: RC-020a
    title: "Detector cadence (startup / on-demand / hourly scheduled)"
    description: |
      Per RC-020a: detectors MUST run at three dispatch points: (a) **Daemon startup** — full scan of in-flight runs after orphan sweep ([process-lifecycle.md §4.2 PL-005]) and before transitioning to `ready`; (b) **On-demand operator command** — `harmonik reconcile [--run <run_id>]` triggers scoped detector run (grammar OQ-RC-005); (c) **Scheduled cadence** — background scan at configurable interval; MVH default **hourly**, configurable via operator YAML per [operator-nfr.md §4.3] (post-MVH tuning OQ-RC-004). Detectors MUST be idempotent across dispatch points: re-running on same `(target_run_id, snapshot)` MUST produce same category assignment. Concurrent detector runs for same `target_run_id` serialized by RC-002a registry lock.
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: rc-020b
    kind: req
    req: RC-020b
    title: "Detector panic recovery (per-detector recover() barrier)"
    description: |
      Per RC-020b: a detector that panics during evaluation per RC-003a's first-match priority order MUST be caught by a per-detector `recover()` barrier (per [process-lifecycle.md §4.6 PL-018a]'s per-goroutine recover obligation extended to detector functions). On panic, detector is suspended for the daemon's lifetime and priority-order evaluation falls through to the next detector. A diagnostic event `reconciliation_detector_panic{detector_class, error_class}` (cross-spec coordination request to EV) MUST emit before fall-through.

  # ───────────────────────── §4.4 Investigator-agent contract ─────────────────────────

  - mnem: rc-015
    kind: req
    req: RC-015
    title: "Investigator inputs are bound by snapshot token (logical view)"
    description: |
      Per RC-015: investigator subprocess receives a standard LaunchSpec per [handler-contract.md §6.1] (`agent_type=claude-code, role=investigator`). `LaunchSpec.snapshot_token` field (declared `String|None` in HC-006) MUST carry the JSON-serialized SnapshotToken record per [schemas.md §6.1] (`{git_head_hash, beads_audit_entry_id, captured_at_timestamp}`). Investigator does NOT receive a pre-assembled `InvestigatorInput` payload; the InvestigatorInput shape per [schemas.md §6.1] is a documented LOGICAL VIEW the investigator constructs at runtime by querying its Beads-CLI skill (BI-027/BI-028 for BeadRecord), git-inspection skill (per RC-016 playbook for checkpoint commit + transition-record sibling), workspace-inspection skill, bounded JSONL divergence-evidence reader (RC-014). The snapshot token IS the bounding discipline. Reads beyond `git_head_hash` or `beads_audit_entry_id` MUST be classified out-of-scope per RC-014 forbidden-uses.
    extra_labels:
      - "tag:cognition"
      - "axis:llm-freedom-delegated"
      - "axis:io-determinism-non-deterministic"
      - "axis:idempotency-non-idempotent"

  - mnem: rc-015a
    kind: req
    req: RC-015a
    title: "Investigator is an HC handler (canonical agent_type/role pair)"
    description: |
      Per RC-015a: investigator subprocess is a handler-contract handler per [handler-contract.md §4.1]. Launch follows standard handler-launch sequence — dispatcher constructs LaunchSpec per HC-006, calls launch primitive, watches via HC-011 for outcome emission. `agent_type=claude-code` and `role=investigator` are canonical pair (see also CP-039). Reconciliation-specific behavior beyond standard launch is captured in investigator playbook (RC-016).

  - mnem: rc-016
    kind: req
    req: RC-016
    title: "Investigator playbook per category (S01 YAML obligation)"
    description: |
      Per RC-016: for each category with an investigator (§8.3 Cat 2, §8.4 Cat 3 generic, §8.11 Cat 6a), the S01-shipped YAML policy MUST define a **playbook** — a specific ordered sequence of checks producing evidence for the verdict. Playbooks MUST name the investigator's expected evidence outputs (captured in the reconciliation commit) and the verdict-selection rubric.
    extra_labels:
      - "tag:cognition"
      - "axis:llm-freedom-bounded"
      - "axis:io-determinism-best-effort"
      - "axis:replay-safety-unsafe"
      - "axis:idempotency-non-idempotent"

  - mnem: rc-017
    kind: req
    req: RC-017
    title: "Every reconciliation workflow declares a wall-clock budget"
    description: |
      Per RC-017: every reconciliation workflow per RC-001 MUST declare a wall-clock budget — hard ceiling, measured from `run_started` to terminal event, beyond which daemon forcibly terminates. Declared as YAML policy field `wall_clock_seconds` (positive integer, required) attached to reconciliation workflow's DOT via `budget_ref` per [control-points.md §4.5]. In absence of explicit budget, S01 packaging (RC-004) MUST supply per-category default: Cat 2 default 600s; Cat 3 generic default 300s; Cat 6a default 900s.

  - mnem: rc-018
    kind: req
    req: RC-018
    title: "Budget exhaustion terminates with fallback verdict (5-step sequence kept as one bead per F8b)"
    description: |
      Per RC-018: on wall-clock budget exhaustion, daemon MUST: emit `reconciliation_budget_exhausted` (payload `BudgetExhaustedPayload` per [schemas.md §6.1]; WHEN/WHY here, WHAT in [event-model.md §8]); issue **default verdict of `escalate-to-human`** on outer (target) run, indistinguishable from investigator-emitted `escalate-to-human` in operator-facing surface; kill investigator subprocess per [handler-contract.md §4.6] cleanup rules; NOT write a reconciliation commit. Step ordering: (1) terminate investigator subprocess (SIGTERM, then SIGKILL after [handler-contract.md §4.3 HC-018] interval); (2) wait for watcher-observation per HC-011; (3) emit `budget_exhausted` (class F per [event-model.md §8.4.3]); (4) emit fallback `escalate-to-human` verdict (class F per RC-021); (5) verdict-executor (RC-025a) consumes fallback as if investigator-emitted. Steps (3) and (4) are NOT atomic but each is fsync-boundary; on crash between them, next daemon startup detects budget-exhausted event with no subsequent verdict commit and routes through Cat 3b retry cap (RC-026a). Per F8b cohesive-function-body tiebreaker (F-pilot-RC-5), keep as ONE bead — all 5 steps share goroutine state in the budget-exhaustion handler; do NOT mint step beads. Because reconciliation workflows are not checkpointed mid-investigation (RC-002), budget exhaustion MUST NOT leave an in-flight reconciliation state for re-classification.
    extra_labels:
      - "axis:idempotency-non-idempotent"
      - "cite:wide-fanout"

  - mnem: rc-019
    kind: req
    req: RC-019
    title: "Investigator captures WIP before emitting `reopen-bead`"
    description: |
      Per RC-019: before emitting a `reopen-bead` verdict, investigator MUST capture any recoverable WIP from outer run's worktree into the reconciliation commit. Concretely: (a) `git status --porcelain` and enumerate untracked files; (b) capture diff plus file listing; (c) include the capture in reconciliation commit's body and/or as annotated files under `.harmonik/reconciliation/<investigator_run_id>/wip-capture/`. Mandatory for `reopen-bead` verdicts; OPTIONAL for other verdicts (which keep the worktree and retain WIP by default).
    extra_labels:
      - "tag:cognition"
      - "axis:llm-freedom-bounded"
      - "axis:io-determinism-best-effort"
      - "axis:replay-safety-unsafe"
      - "axis:idempotency-non-idempotent"

  # ───────────────────────── §4.5 Verdict vocabulary and execution ─────────────────────────

  - mnem: rc-020
    kind: req
    req: RC-020
    title: "Verdict vocabulary is the seven-value enum"
    description: |
      Per RC-020: a verdict event's `verdict` field MUST be exactly one of the seven enum values listed in [schemas.md §6.1 Verdict]: `resume-here`, `resume-with-context`, `reset-to-checkpoint`, `reopen-bead`, `accept-close-with-note`, `no-op-accept`, `escalate-to-human`. Every verdict MUST have defined mechanical semantics (see [schemas.md §6.2] verdict-execution table; [spec.md §8.12] is authoritative on prose semantics; [schemas.md §6.3] is authoritative on mechanical dispatch). Any other value is a malformed verdict and MUST be handled per RC-023. `no-op-accept` is the verdict for "investigator confirms current state is legitimate; no action required" — differs from `accept-close-with-note` in that the bead is NOT closed.

  - mnem: rc-021
    kind: req
    req: RC-021
    title: "Exactly one verdict event per reconciliation workflow"
    description: |
      Per RC-021: a reconciliation workflow MUST emit exactly one `reconciliation_verdict_emitted` event over its lifetime. Emission of the first verdict event MUST mark the workflow terminal; any subsequent verdict event from the same workflow is a structural violation and MUST be handled per RC-023 with malformation reason `multiple-verdicts`.

  - mnem: rc-022
    kind: req
    req: RC-022
    title: "Verdict commit lands on investigator's task branch"
    description: |
      Per RC-022: verdict event's emission MUST be atomic with the investigator's verdict commit — a single `git commit` on the investigator's task branch carrying the verdict event's payload (per [schemas.md §6.1]) and any evidence files under `.harmonik/reconciliation/<investigator_run_id>/`. No intermediate checkpoints are written per RC-002. Resolution of `resume-here` / `resume-with-context` dispatch targets (which node to re-spawn on the outer run) MUST cite the orchestrator's current-node resolution contract in [execution-model.md §7.1] and, for worktree interactions on `reset-to-checkpoint`, [workspace-model.md §4.4] (worktree reset) and [workspace-model.md §4.6] (merge).
    extra_labels:
      - "axis:idempotency-non-idempotent"
      - "cite:wide-fanout"

  - mnem: rc-022a
    kind: req
    req: RC-022a
    title: "Verdict emission via outcome envelope (HC-008 outcome_emitted)"
    description: |
      Per RC-022a: investigator subprocess emits its verdict by writing a structured outcome via standard handler-contract outcome path (HC-008 `outcome_emitted`). Outcome's `outcome_kind` MUST be `reconciliation_verdict`; outcome payload MUST be the `VerdictEvent` record per [schemas.md §6.1]. Handler-contract watcher (HC-011) consumes the outcome event and surfaces VerdictEvent to daemon's reconciliation-verdict-executor (RC-025). Investigator subprocess does NOT directly write the verdict commit; daemon's verdict-executor MUST construct and commit the verdict-and-verdict-executed commit pair on investigator's task branch. Cross-spec coordination request to EM (OQ-RC-010): extend `Outcome` record in [execution-model.md §6.1] (or add new variant) to carry the verdict envelope.

  - mnem: rc-023
    kind: req
    req: RC-023
    title: "Malformed-verdict handling produces a fallback escalation"
    description: |
      Per RC-023: on any malformation condition (`unknown-verdict-value`, `missing-required-field`, `extra-fields`, `wrong-type`, `multiple-verdicts`, `verdict-after-terminal` per MalformationReason enum [schemas.md §6.1]), daemon MUST: emit `reconciliation_verdict_malformed` (payload `MalformedVerdictPayload` per [schemas.md §6.1]); issue **fallback verdict of `escalate-to-human`** on the target (outer) run; terminate the reconciliation workflow (kill investigator subprocess); NOT attempt to interpret the malformed payload. Trusting LLM-generated text to conform to a schema is a ZFC violation per [architecture.md §4.2]; this path converts cognitive failure into deterministic escalation.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: rc-024
    kind: req
    req: RC-024
    title: "Verdict staleness check precedes execution"
    description: |
      Per RC-024: before executing a verdict per RC-025, daemon MUST re-capture current `(git_head_hash', beads_audit_entry_id')` and compare against snapshot token captured at investigator-dispatch time (RC-015). Verdict is **stale** if either: target run's checkpoint trail has gained a new commit since the snapshot, OR target run's bead has changed status in the Beads audit log since the snapshot. On staleness: emit `reconciliation_verdict_stale` (WHEN/WHY here; payload schema `StaleVerdictPayload` in [schemas.md §6.1]; WHAT contract owned by [event-model.md §8]); NOT execute the verdict; re-dispatch a fresh reconciliation workflow against the new state. Changes to sibling beads or daemon's JSONL event log MUST NOT trigger staleness.

  - mnem: rc-025
    kind: req
    req: RC-025
    title: "Verdict execution is durable and idempotent"
    description: |
      Per RC-025: when reconciliation workflow emits a verdict event (per RC-020) and staleness check (RC-024) passes, daemon MUST: perform the verdict's mechanical action per the verdict-execution table ([schemas.md §6.2]); emit `reconciliation_verdict_executed` (payload `VerdictExecutedPayload` per [schemas.md §6.1]); append a second commit to investigator's task branch carrying the trailer `Harmonik-Verdict-Executed: true` (payload-free presence-only marker; trailer shape declared in [schemas.md §6.4] as RC-owned since the EM v0.2.0 trailer rollback). Each verdict's mechanical action MUST be idempotent: `reopen-bead` invokes BI adapter's reopen path per [beads-integration.md §4.4 BI-010] (BI-010a status-mapping table for verdict→op binding) with adapter's BI-031 status-check-before-reissue handling idempotency; `resume-here`/`resume-with-context`/`reset-to-checkpoint` idempotent at dispatch layer; `accept-close-with-note` idempotent on re-run; `no-op-accept` no mechanical action; `escalate-to-human` deduplicated by `target_run_id`.
    extra_labels:
      - "axis:idempotency-non-idempotent"
      - "cite:wide-fanout"

  - mnem: rc-025a
    kind: req
    req: RC-025a
    title: "Daemon-side verdict-executor commits the verdict pair (7-step sequence kept as one bead per F8b)"
    description: |
      Per RC-025a: the daemon-side verdict-executor (a deterministic Go subroutine, NOT a workflow node) consumes the VerdictEvent from RC-022a's outcome envelope and: (1) validates the verdict per RC-020/RC-023; on validation failure, routes through fallback per RC-023; (2) re-captures snapshot per RC-024 staleness check; on stale, routes through Cat 3b re-execution per §8.5; (3) constructs and commits `reconciliation_verdict_emitted` commit (verdict body + Harmonik-Verdict-ID trailer) on investigator's task branch; (4) mechanically applies the verdict's action per the table in [schemas.md §6.2]; (5) constructs and commits `reconciliation_verdict_executed` commit with `Harmonik-Verdict-Executed: true` trailer per [schemas.md §6.4] as a descendant of the verdict-emitted commit; (6) emits `reconciliation_verdict_emitted` and `reconciliation_verdict_executed` events; (7) releases the RC-002a lock per RC-002b. Verdict-executor MUST be panic-safe (per [process-lifecycle.md §4.6 PL-018a]); on panic mid-step, next daemon startup re-classifies via Cat 3b (verdict-emitted-but-unexecuted) per §8.5 and verdict-executor re-runs idempotently. Per F8b cohesive-function-body tiebreaker (F-pilot-RC-5), keep as ONE bead — all 7 steps live in the verdict-executor's single function body sharing goroutine state (snapshot, verdict envelope, target-run-id) accumulated through prior steps. Do NOT mint step beads — contrast ON-027's 8 drain steps that delegate to 8 distinct subsystems.
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: rc-026
    kind: req
    req: RC-026
    title: "Verdict-execution discovery on restart (Cat 3b classification)"
    description: |
      Per RC-026: startup detector of [process-lifecycle.md §4.2 PL-005] MUST treat a reconciliation workflow as resolved ONLY if both the verdict commit AND the verdict-executed commit (per RC-025) are present on the investigator's branch. A reconciliation workflow with a verdict commit but no verdict-executed commit MUST be classified as §8.5 Cat 3b with the dedicated auto-resolver re-attempting the verdict's mechanical action under a fresh staleness check (RC-024). Daemon startup sequence MUST dispatch reconciliation-workflow classification pass BEFORE any ordinary workflow dispatches — reconciliation detectors run before daemon transitions to `ready`; ordinary dispatch is gated behind detection completion. Fail-open reconciliation escalation tracked OQ-RC-003.

  - mnem: rc-026a
    kind: req
    req: RC-026a
    title: "Cat 3b re-execution retry cap (default N=5; cap → Cat 6b)"
    description: |
      Per RC-026a: a reconciliation Cat 3b verdict-execution that fails on a fresh staleness check (RC-024) MUST be retried with a durable attempt counter, recorded in `.harmonik/reconciliation-attempts/<target_run_id>.json` (atomic temp+rename+fsync per [workspace-model.md §4.7 WM-026]). Retry cap defaults to N=5; on cap exceeded, the run escalates to Cat 6b (operator escalation) per §8.11. Each retry MUST emit `reconciliation_verdict_execution_retry{target_run_id, attempt}` (cross-spec coordination request to EV).

  - mnem: rc-027
    kind: req
    req: RC-027
    title: "Operator verdict-override surface (confirm-verdict / veto-verdict)"
    description: |
      Per RC-027: a per-reconciliation-workflow policy option MUST allow operators to pause the daemon's verdict-execution step until operator confirmation or veto via `harmonik confirm-verdict <run_id>` / `harmonik veto-verdict <run_id> [--promote-to escalate-to-human]`. Default: execution proceeds without operator confirmation. Operators opt in by policy. Applies to all investigator-dispatched categories (Cat 2, Cat 3 generic, Cat 6a per §8.12). Final grammar / authorization model owned by operator-CLI spec per [operator-nfr.md §4.10] (OQ-RC-005).

  # ───────────────────────── §4.6 Re-run vs intra-run ─────────────────────────

  - mnem: rc-028
    kind: req
    req: RC-028
    title: "`reopen-bead` verdict triggers a new run on subsequent claim"
    description: |
      Per RC-028: a `reopen-bead` verdict MUST clear the in-flight tracking for the target bead. A subsequent claim of the bead MUST produce a new run with a fresh worktree and a fresh branch per [workspace-model.md §4.9 WM-034]. The new run MUST receive a fresh `run_id`; continuation of the prior `run_id` after a `reopen-bead` verdict is forbidden.

  - mnem: rc-029
    kind: req
    req: RC-029
    title: "Intra-run rollbacks keep the worktree and run_id"
    description: |
      Per RC-029: a `reset-to-checkpoint` verdict is an intra-run rollback. The worktree and `run_id` MUST be preserved; the run reverts to the named checkpoint and re-runs from there per [execution-model.md §4.10 EM-044] (transition_kind + rollback_to_state_id representation).

  - mnem: rc-030
    kind: req
    req: RC-030
    title: "Reconciliation does NOT drive intra-run loops"
    description: |
      Per RC-030: intra-run loops (workflow edges routing back to an earlier node) are NOT produced by reconciliation. Those loops are ordinary workflow-graph traversal handled by edge conditions and Guard/Gate control-points per [control-points.md §4.2, §4.4]. Reconciliation handles only restart and store-divergence cases.

  # ───────────────────────── §4.7 Testing obligation ─────────────────────────

  - mnem: rc-031
    kind: req
    req: RC-031
    title: "Crash-recovery-tested (every detector + verdict-execution path)"
    description: |
      Per RC-031: every detector under §4.3 / §8, every verdict-execution path under §4.5, and every staleness-check path under RC-024 MUST be exercised by at least one crash-recovery scenario test before landing. Crash-recovery test layer described in `docs/methodology/TESTING.md`; this obligation migrates to a `[testing.md §<layer>]` cross-reference within one revision cycle after `testing.md` is finalized (OQ-RC-006).

  # ───────────────────────── §5 invariants (2 active; 3 retired) ─────────────────────────

  - mnem: rc-inv-001
    kind: invariant
    req: RC-INV-001
    title: "Sensor: reconciliation-as-workflow uniqueness across daemon lifecycle"
    description: |
      Per RC-INV-001: across every daemon lifetime, every reconciliation dispatch — including budget-exhausted fallbacks, malformed-verdict fallbacks, Cat 3b re-executions, Cat 3c auto-verdicts — MUST run as a DOT-tagged workflow with `workflow_class = reconciliation` AND MUST emit at most one `reconciliation_verdict_emitted` event per dispatch (RC-021). At no point during daemon's lifetime may reconciliation "ride on top of" ordinary workflow state (i.e., a non-reconciliation workflow node MUST NOT invoke verdict-execution mechanics of RC-025). Cuts across RC-001, RC-002, RC-002a, RC-021, RC-025; closes the "could an agent in a normal workflow issue a verdict" ambiguity.
      Sensor: (a) Daemon MUST tag the Workflow record in its registry with `workflow_class`; startup audit log samples emitted workflows and asserts every `reconciliation_verdict_*` event traces back to a Workflow whose `workflow_class = reconciliation`. (b) JSONL query at audit time filters `reconciliation_verdict_emitted` events and joins against Workflow registry; any event whose source workflow's class is NOT `reconciliation` fails the audit. (c) Per-daemon-lifecycle audit log sample: one tag check per N verdicts (default N=10) at runtime, full scan at shutdown. Body explicit ID cite: `[execution-model.md §5 EM-INV-005]` ("git wins on completion") fires sensor→sensor edge `rc-inv-001 → em-inv-005` per F-refs-EV-6 v0.8 sensor→sensor explicit-ID-cite extension.

  - mnem: rc-inv-004
    kind: invariant
    req: RC-INV-004
    title: "Sensor: evidence-corroboration guarantee across detector runs"
    description: |
      Per RC-INV-004: every `store_divergence_detected` emission traced through any detector dispatch (startup, on-demand, scheduled per RC-020a) MUST carry a non-`inconclusive` `corroboration` value per EV-023a. Cuts across detector dispatch points and the upstream EV contract: a single-source observation whose corroboration cannot be established MUST emit `divergence_inconclusive` instead. Bounds false-positive investigator dispatches; reconciliation-side projection of [event-model.md §8.6.8] EV-023a.
      Sensor: detector emission layer MUST validate `corroboration ∈ {git-corroborated, beads-corroborated}` before allowing the event to be written to JSONL; an `inconclusive` corroboration MUST route to `divergence_inconclusive` instead. Audit-log sample at daemon startup checks every `store_divergence_detected` in the last N events carries a non-`inconclusive` corroboration.

  # ───────────────────────── §6 Schemas (15 beads across spec.md + schemas.md) ─────────────────────────
  # Per §2.11(a), schema beads from the sibling schemas.md use the same
  # `rc-schema.<type-kebab>` naming. spec.md §6 itself is an INDEX
  # (defers to schemas.md); schemas.md §6.1 declares 13 records/enums;
  # §6.4 declares the Harmonik-Verdict-Executed trailer; §6.5 declares
  # the WorkflowClass extension. Total: 15 schema beads.

  - mnem: rc-schema.snapshot-token
    kind: schema
    schema_kind: record
    title: "Define `SnapshotToken` record (schemas.md §6.1)"
    description: |
      Per [schemas.md §6.1 SnapshotToken]: 3-field record bounding the investigator's view of state — `git_head_hash` (SHA of project HEAD or reference investigator reads from), `beads_audit_entry_id` (ID of most recent Beads audit-log entry at capture time), `captured_at_timestamp` (RFC 3339 wall-clock; advisory display only per [event-model.md §4.3]). Captured at investigator-dispatch time per RC-015; consumed by RC-024 staleness check (re-capture and compare); JSON-serialized form carried by `LaunchSpec.snapshot_token` per RC-015.
    extra_labels:
      - "kind:schema"

  - mnem: rc-schema.investigator-input
    kind: schema
    schema_kind: record
    title: "Define `InvestigatorInput` record (schemas.md §6.1) — LOGICAL VIEW"
    description: |
      Per [schemas.md §6.1 InvestigatorInput]: documented LOGICAL VIEW the investigator self-assembles at runtime by querying its skills bounded by `snapshot_token` per RC-015. Fields: snapshot_token, target_run_id, target_workflow_id, target_workflow_version, target_bead_id, bead_record (BeadRecord as-of beads_audit_entry_id), last_checkpoint, last_transition (per [execution-model.md §6.1]), jsonl_tail (events since last checkpoint; observational only per RC-014), workspace_state, session_log_ref (CASS handle per [workspace-model.md §4.7]), category, playbook_ref (RC-016), budget_wall_clock_seconds (RC-017). NOT a daemon-assembled record — investigator queries Beads-CLI, git-inspection, workspace-inspection, bounded JSONL reader; the daemon does NOT pre-assemble an InvestigatorInput.json file.
    extra_labels:
      - "kind:schema"

  - mnem: rc-schema.workspace-state
    kind: schema
    schema_kind: record
    title: "Define `WorkspaceState` record (schemas.md §6.1)"
    description: |
      Per [schemas.md §6.1 WorkspaceState]: 5-field record describing investigator-observable workspace state — `path` (absolute path to run's worktree), `path_exists` (filesystem probe result), `branch_tip_hash` (current task-branch tip; null if worktree missing), `wip_present` (true if `git status --porcelain` is non-empty or untracked files exist), `git_in_progress_op` (none|rebase|merge|cherry-pick|bisect; Cat 6a trigger when not none).
    extra_labels:
      - "kind:schema"

  - mnem: rc-schema.git-in-progress-op
    kind: schema
    schema_kind: enum
    title: "Define `GitInProgressOp` ENUM (schemas.md §6.1)"
    description: |
      Per [schemas.md §6.1 GitInProgressOp]: 5-value enum — `none`, `rebase`, `merge`, `cherry-pick`, `bisect`. Used in WorkspaceState; non-`none` values are Cat 6a triggers per §8.11 detector rule.
    extra_labels:
      - "kind:enum"

  - mnem: rc-schema.verdict-event
    kind: schema
    schema_kind: record
    title: "Define `VerdictEvent` record (schemas.md §6.1)"
    description: |
      Per [schemas.md §6.1 VerdictEvent]: payload of `reconciliation_verdict_emitted` event. 8 fields — `verdict` (one of seven Verdict enum values), `investigator_run_id` (run_id of reconciliation workflow), `target_run_id` (run_id of outer run being reconciled), `evidence_ref` (git commit hash of reconciliation commit carrying evidence), `context` (required iff verdict=resume-with-context; MUST be empty otherwise), `checkpoint_ref` (transition_id; required iff verdict=reset-to-checkpoint; null otherwise), `snapshot_token` (bound investigator view; consumed by staleness check RC-024), `schema_version` (N-1 readable per [spec.md §6.4]).
    extra_labels:
      - "kind:schema"

  - mnem: rc-schema.verdict
    kind: schema
    schema_kind: enum
    title: "Define `Verdict` ENUM (schemas.md §6.1) — 7-value vocabulary"
    description: |
      Per [schemas.md §6.1 Verdict]: 7-value enum — `resume-here` (re-dispatch current node, no context change), `resume-with-context` (re-dispatch with investigator-supplied context injected), `reset-to-checkpoint` (intra-run rollback to named checkpoint; keeps worktree + run_id), `reopen-bead` (mark bead `open`; subsequent claim produces new run with fresh worktree), `accept-close-with-note` (close legitimate; annotate audit gap), `no-op-accept` (current state legitimate; no mechanical action; run continues), `escalate-to-human` (investigator cannot resolve; pause affected run, emit operator-observable event). Consumed by RC-020 (vocabulary lock), RC-025 (mechanical execution table per [schemas.md §6.2]).
    extra_labels:
      - "kind:enum"

  - mnem: rc-schema.reconciliation-category
    kind: schema
    schema_kind: enum
    title: "Define `ReconciliationCategory` ENUM (schemas.md §6.1) — 11-value taxonomy"
    description: |
      Per [schemas.md §6.1 ReconciliationCategory]: 11-value enum — `cat-0` (infrastructure unavailable), `cat-1` (idempotent rerun), `cat-2` (non-idempotent in-flight), `cat-3` (store disagreement generic), `cat-3a` (torn Beads write), `cat-3b` (verdict-unexecuted), `cat-3c` (inverse premature-close), `cat-4` (recoverable known state), `cat-5` (clean restart), `cat-6a` (integrity violation, LLM-triageable), `cat-6b` (integrity violation, mechanically unrecoverable). The vocabulary backing the 11 §8 taxonomy beads (rc-error.cat-N); consumed by every detector and dispatch contract.
    extra_labels:
      - "kind:enum"

  - mnem: rc-schema.malformation-reason
    kind: schema
    schema_kind: enum
    title: "Define `MalformationReason` ENUM (schemas.md §6.1)"
    description: |
      Per [schemas.md §6.1 MalformationReason]: 6-value enum classifying RC-023 malformed-verdict triggers — `unknown-verdict-value`, `missing-required-field` (e.g., context when verdict=resume-with-context), `extra-fields`, `wrong-type`, `multiple-verdicts` (workflow emitted >1 verdict event), `verdict-after-terminal` (verdict event emitted after workflow's terminal event). Consumed by RC-023 fallback path; carried in MalformedVerdictPayload.
    extra_labels:
      - "kind:enum"

  - mnem: rc-schema.budget-exhausted-payload
    kind: schema
    schema_kind: record
    title: "Define `BudgetExhaustedPayload` record (schemas.md §6.1)"
    description: |
      Per [schemas.md §6.1 BudgetExhaustedPayload]: payload of `reconciliation_budget_exhausted` event (RC-018). 4 fields — `run_id` (reconciliation workflow's run_id), `workflow_id`, `budget_seconds` (declared wall-clock budget), `elapsed_seconds` (actual elapsed when terminated).
    extra_labels:
      - "kind:schema"

  - mnem: rc-schema.stale-verdict-payload
    kind: schema
    schema_kind: record
    title: "Define `StaleVerdictPayload` record (schemas.md §6.1)"
    description: |
      Per [schemas.md §6.1 StaleVerdictPayload]: payload of `reconciliation_verdict_stale` event (RC-024). 4 fields — `snapshot_token` (captured at dispatch time), `current_git_head_hash` (re-captured HEAD at execution time), `current_beads_audit_id` (re-captured Beads audit entry id), `divergence_reason` (StaleDivergenceReason enum).
    extra_labels:
      - "kind:schema"

  - mnem: rc-schema.stale-divergence-reason
    kind: schema
    schema_kind: enum
    title: "Define `StaleDivergenceReason` ENUM (schemas.md §6.1)"
    description: |
      Per [schemas.md §6.1 StaleDivergenceReason]: 2-value enum — `git-branch-advanced` (target run's task branch has new commit since snapshot), `beads-audit-advanced` (target bead's Beads audit entries have advanced since snapshot). Consumed by StaleVerdictPayload (RC-024).
    extra_labels:
      - "kind:enum"

  - mnem: rc-schema.malformed-verdict-payload
    kind: schema
    schema_kind: record
    title: "Define `MalformedVerdictPayload` record (schemas.md §6.1)"
    description: |
      Per [schemas.md §6.1 MalformedVerdictPayload]: payload of `reconciliation_verdict_malformed` event (RC-023). 4 fields — `investigator_run_id`, `target_run_id`, `malformation_reason` (MalformationReason enum), `raw_verdict_excerpt` (string, truncated raw payload for diagnosis).
    extra_labels:
      - "kind:schema"

  - mnem: rc-schema.verdict-executed-payload
    kind: schema
    schema_kind: record
    title: "Define `VerdictExecutedPayload` record (schemas.md §6.1)"
    description: |
      Per [schemas.md §6.1 VerdictExecutedPayload]: payload of `reconciliation_verdict_executed` event (RC-025). 5 fields — `investigator_run_id`, `target_run_id`, `verdict` (Verdict enum), `executed_at_timestamp` (RFC 3339 wall-clock; advisory display only), `action_summary` (short prose describing mechanical action taken).
    extra_labels:
      - "kind:schema"

  - mnem: rc-schema.verdict-executed-trailer
    kind: schema
    schema_kind: record
    title: "Define `Harmonik-Verdict-Executed` git trailer (schemas.md §6.4) — RC-owned"
    description: |
      Per [schemas.md §6.4]: RC owns the shape of the `Harmonik-Verdict-Executed` commit trailer as of spec v0.3.0 (reclaimed from execution-model.md after EM v0.2.0 removed the trailer from its §6 trailer registry). Trailer shape — key `Harmonik-Verdict-Executed` (exact key string, case-sensitive per git trailer grammar); value `true` (fixed literal; any other value is malformed per RC-023); presence_semantics `marker-only` (presence marks execution; no payload). Placement: trailer MUST appear on a commit that is descendant of the verdict commit on the same investigator task branch; MUST NOT appear on the verdict commit itself. Emission contract: emitted exactly once per reconciliation workflow whose verdict is executed; if verdict re-executed under Cat 3b auto-resolution (RC-026), a new verdict-executed commit is appended (prior NOT rewritten). Cross-spec coordination: EM §6 trailer registry MUST note via revision history that this trailer is owned here; any EM trailer-lint tool MUST treat it as RC-owned extension.
    extra_labels:
      - "kind:schema"

  - mnem: rc-schema.workflow-class-extension
    kind: schema
    schema_kind: enum
    title: "Define `WorkflowClass` Workflow-record extension (schemas.md §6.5) — RC-owned"
    description: |
      Per [schemas.md §6.5]: RC extends the Workflow record owned by [execution-model.md §4.1] with a subsystem-local tag — `workflow_class : WorkflowClass` (optional tag, absent means "ordinary"). WorkflowClass enum: `reconciliation` (the workflow implements an RC-category investigator or auto-resolver dispatch; scoped to S01-shipped DOT per RC-004). Semantics: a Workflow whose `workflow_class = reconciliation` is subject to RC-002 (exactly-one-checkpoint commit per workflow), RC-002a (at most one per target_run_id), RC-INV-001 (uniqueness audit sensor). Workflows without `workflow_class` set are ordinary; reconciliation requirements do not apply. Ownership: extension is RC-owned; acceptance into EM's canonical Workflow record tracked in OQ-RC-002. If EM accepts, RC-002 and RC-INV-001 will re-point at [execution-model.md §4.1]; until then, schemas.md §6.5 is the canonical declaration. Future workflow classes (improvement-loop, operator-cli-handler) reserved for future use.
    extra_labels:
      - "kind:enum"

  # ───────────────────────── §8 reconciliation-category taxonomy (12 beads: 1 umbrella + 11 categories) ─────────────────────────
  # Per F-pilot-RC-4 + §2.11(c) canonical large-§8-taxonomy rule:
  # RC's 11 categories ARE the discipline's worked example for "one bead
  # per §8.x entry" (SHAPE-not-COUNT distinct from BI/WM/ON sentinel
  # single-bead form). Per-category beads parented to the umbrella
  # `rc-error.taxonomy` per §2.10 second-level grouping permission. Per
  # discipline v0.9 §2.11(c.2), edges run `<consumer> → rc-error.taxonomy`
  # OR `<consumer> → rc-error.cat-N` (when a specific category named).
  # The umbrella does NOT block-on §4 reqs.

  - mnem: rc-error.taxonomy
    kind: error-taxonomy
    title: "Reconciliation-category taxonomy umbrella (§8.1–§8.11a + §8.12 dispatch)"
    description: |
      Implement the §8 reconciliation-category taxonomy umbrella + §8.12 action-mapping dispatch table. The taxonomy contains 11 detection categories (Cat 0/1/2/3/3a/3b/3c/4/5/6a/6b — see per-category beads `rc-error.cat-N`) with priority-ordered first-match resolution per RC-003a (Cat 0 → 6b → 6a → 5 → 3c → 3b → 3a → 3 → 2 → 4 → 1). Action-mapping dispatch: §8.12 prose authoritative on semantics; [schemas.md §6.3] tabular schema authoritative on mechanical dispatch; divergence is a lint failure. The umbrella owns the cross-category invariants (priority order, dual-table sync, amendment-protocol gate per RC-009). Per discipline v0.9 §2.11(c.2), this bead is a vocabulary OWNER for the ReconciliationCategory enum; consumer §4 reqs that cite a category by ID block-on this umbrella OR the specific per-category bead. The taxonomy bead's own predecessors are limited to schema-shaped beads it consumes (rc-schema.reconciliation-category enum bead) — taxonomy does NOT block-on §4 reqs. 11 per-category beads parented per §2.10.
    extra_labels:
      - "kind:taxonomy"

  - mnem: rc-error.cat-0
    kind: error-taxonomy
    title: "Cat 0 — Infrastructure unavailable (§8.1)"
    description: |
      Per §8.1: detection rule — `br --version` fails within T=5s; or Beads SQLite locked by non-harmonik; or git index locked; or `.harmonik/` unwritable; or filesystem full. Pre-check is mandatory per RC-012. Default response: halt classification at detector layer; daemon transitions to `degraded` status (pre-`ready` state) and waits for infrastructure resolution. Escalation: operator clears prerequisite (restart `br`, unlock git, free disk, fix permissions); daemon retries at configurable cadence. Emitted event: `infrastructure_unavailable` naming the specific prerequisite. Investigator: No. Auto-resolver: Yes (wait-and-retry). Co-owned with [process-lifecycle.md §4.2 PL-010] (degraded-state transition).
    extra_labels:
      - "kind:taxonomy"

  - mnem: rc-error.cat-1
    kind: error-taxonomy
    title: "Cat 1 — Idempotent rerun (§8.2)"
    description: |
      Per §8.2: detection rule — last checkpoint's node has `idempotency_class = idempotent` per [execution-model.md §4.2 EM-009]. Default response: auto-resume by re-spawning interrupted node. Escalation: none at this layer; subsequent failure classified under [execution-model.md §8] failure taxonomy. Emitted event: `reconciliation_category_assigned` (category=1); dispatch produces `node_dispatch_requested` per handler contract. Investigator: No. Auto-resolver: Yes (re-spawn). Examples: reviewer agent mid-run, researcher agent, mechanism-tagged non-agentic nodes (lint, test, typecheck). Reconciliation-workflow nodes never classified here per RC-002 (not checkpointed mid-investigation).
    extra_labels:
      - "kind:taxonomy"

  - mnem: rc-error.cat-2
    kind: error-taxonomy
    title: "Cat 2 — Non-idempotent in-flight (§8.3)"
    description: |
      Per §8.3: detection rule — DOT node with `idempotency_class ∈ {non-idempotent, recoverable-non-idempotent}` per [execution-model.md §4.2 EM-009]; AND bead `in_progress`; AND no `run_completed` or `run_failed` event since the checkpoint (per [event-model.md §8] per-event subsections). Cat 2 detection MUST use a controlled, indexed query against the bounded JSONL divergence-evidence reader (RC-014), NOT a live-follow tail. Default response: dispatch a Cat 2 investigator workflow with the per-category playbook (RC-016). Escalation: investigator verdict — typically `resume-with-context`/`reset-to-checkpoint`/`reopen-bead` (RC-020); budget-exhausted dispatches default-escalate (RC-018). Emitted event: `reconciliation_category_assigned` (category=2); investigator emits `reconciliation_verdict_emitted`. Investigator: Yes. Auto-resolver: No.
    extra_labels:
      - "kind:taxonomy"

  - mnem: rc-error.cat-3
    kind: error-taxonomy
    title: "Cat 3 — Store disagreement, generic (§8.4)"
    description: |
      Per §8.4: detection rule — git/Beads/JSONL tell inconsistent stories about the same run, and no Cat 3 sub-category (3a/3b/3c) matches. Examples: duplicate `transition_id` across commits in same run; bead `in_progress` but worktree missing without run-terminal marker. Default response: dispatch Cat 3 generic investigator workflow with git-wins orientation per RC-INV-001. Escalation: investigator verdict — typically `accept-close-with-note`/`reopen-bead`/`no-op-accept`. Emitted event: `store_divergence_detected` + `reconciliation_category_assigned` (category=3). Investigator: Yes. Auto-resolver: No (escalates through investigator).
    extra_labels:
      - "kind:taxonomy"

  - mnem: rc-error.cat-3a
    kind: error-taxonomy
    title: "Cat 3a — Torn Beads write (§8.4a)"
    description: |
      Per §8.4a: detection rule — adapter intent file present at `.harmonik/beads-intents/<idempotency_key>.json` per [beads-integration.md §4.10 BI-029] AND corresponding bead's current Beads coarse-status (read via `br show` per BI-031) is neither pre-state nor post-state of intended transition. Adapter's status-check-before-reissue (BI-031b) classifies as divergence; Cat 3a auto-resolver routes through same adapter. Default response: auto-resolve via adapter's BI-031 protocol — status-check classifies (status_match → no-op, pre-state → reissue, schema_mismatch → BrSchemaMismatch); status neither pre nor post → route to investigator dispatch. Escalation: if audit log ambiguous or adapter raises BrSchemaMismatch, escalate to Cat 3 generic. Emitted event: `store_divergence_detected{class=torn-beads-write}` + `reconciliation_category_assigned` (category=3a). Investigator: No (common case). Auto-resolver: Yes.
    extra_labels:
      - "kind:taxonomy"

  - mnem: rc-error.cat-3b
    kind: error-taxonomy
    title: "Cat 3b — Verdict-unexecuted (§8.5)"
    description: |
      Per §8.5: detection rule — investigator-run's task branch contains a `reconciliation_verdict_emitted` commit AND no subsequent `Harmonik-Verdict-Executed: true` commit on the same branch (per RC-025, [schemas.md §6.4]). Default response: auto-resolve via RC-026 re-execution — daemon performs staleness check (RC-024); if stale, re-dispatches fresh reconciliation; if not stale, executes verdict per RC-025 and writes verdict-executed commit. No new investigator spawned. Escalation: if re-execution itself fails (e.g., `br` errors), route to Cat 3 generic. Retry cap N=5 per RC-026a; cap exceeded → Cat 6b. Emitted event: `reconciliation_category_assigned` (category=3b). Investigator: No. Auto-resolver: Yes.
    extra_labels:
      - "kind:taxonomy"

  - mnem: rc-error.cat-3c
    kind: error-taxonomy
    title: "Cat 3c — Inverse premature-close (§8.6)"
    description: |
      Per §8.6: detection rule — merge commit on target branch (main or integration per [workspace-model.md §4.7]) tagged with `Harmonik-Run-ID R` for run R whose workflow reached success terminal state; bead for R still `in_progress` in Beads; no subsequent in-flight checkpoints for R. Default response: auto-verdict `accept-close-with-note` with mechanical close-write (routed through idempotency-keyed adapter per [beads-integration.md §4.10]). No investigator spawned. Escalation: if mechanical close-write fails persistently, escalate to Cat 3 generic. Emitted event: `reconciliation_category_assigned` (category=3c); downstream `reconciliation_verdict_executed`. Investigator: No. Auto-resolver: Yes. Rationale: git is authoritative for completion (RC-INV-001); divergence is deterministically resolvable in Beads's direction without LLM reasoning.
    extra_labels:
      - "kind:taxonomy"

  - mnem: rc-error.cat-4
    kind: error-taxonomy
    title: "Cat 4 — Recoverable known state (§8.7)"
    description: |
      Per §8.7: detection rule — agent was in well-defined retry/backoff state at crash time (e.g., rate-limited pending retry timer, waiting for human gate). Default response: auto-resume with pending action — re-spawn with prior retry/backoff timer, or re-present gate to relevant actor. Escalation: if retry attempt cap reached, reclassify per [execution-model.md §8] failure taxonomy. Emitted event: `reconciliation_category_assigned` (category=4). Investigator: No. Auto-resolver: Yes.
    extra_labels:
      - "kind:taxonomy"

  - mnem: rc-error.cat-5
    kind: error-taxonomy
    title: "Cat 5 — Clean restart (§8.8)"
    description: |
      Per §8.8: detection rule — nothing in-flight for this run. Includes orphaned branches from prior runs of beads that have since been re-claimed (per RC-010), AND crashed reconciliation-workflow branches (no verdict commit yet emitted) discriminated by `Harmonik-Workflow-Class: reconciliation` trailer per RC-003b. Default response: normal startup; proceed to `ready` per [process-lifecycle.md §4.2]. No-op. Escalation: none. Emitted event: `reconciliation_category_assigned` (category=5). Investigator: No. Auto-resolver: Yes (no-op).
    extra_labels:
      - "kind:taxonomy"

  - mnem: rc-error.cat-6a
    kind: error-taxonomy
    title: "Cat 6a — Integrity violation, LLM-triageable (§8.11)"
    description: |
      Per §8.11: detection rule — structurally wrong data whose cause an investigator can reason about and whose resolution might be operator-actionable. Detectors: workspace path referenced by in-flight bead does not exist on disk AND sibling's transition-record file is absent (RC-003a priority places this here for workspace-missing + sibling-absent); trailer-vs-sibling-file mismatch on checkpoint commit (e.g., `Harmonik-Transition-ID` trailer present but sibling file missing per [execution-model.md §4.4 EM-018]); worktree has in-progress git operation (rebase, merge, cherry-pick, bisect) that is not the work product being tracked (`.git/rebase-merge`, `.git/rebase-apply`, `.git/MERGE_HEAD`, `.git/CHERRY_PICK_HEAD`, `.git/BISECT_LOG` checks); bead `in_progress` with two+ task branches each advertising `Harmonik-Run-ID` without `Harmonik-Verdict-Executed` (reopen-bead landed, Beads audit entry missing). Default response: dispatch Cat 6a investigator workflow. Default verdict: `escalate-to-human` (RC-020); investigator MAY downgrade to repair path. Escalation: operator intervention via escalation event. Emitted event: `store_divergence_detected` + `reconciliation_category_assigned` (category=6a); downstream `reconciliation_verdict_emitted` (typically escalate-to-human). Investigator: Yes. Auto-resolver: No.
    extra_labels:
      - "kind:taxonomy"

  - mnem: rc-error.cat-6b
    kind: error-taxonomy
    title: "Cat 6b — Integrity violation, mechanically unrecoverable (§8.11a)"
    description: |
      Per §8.11a: detection rule — structurally wrong data with no recovery path an LLM could meaningfully affect. Detectors: JSONL is corrupt/unparseable past byte offset (divergence-evidence reader RC-014 cannot make determination); checkpoint commit hash referenced in JSONL missing from git's object database; git object database itself corrupted (`git fsck` fails). Default response: auto-escalate to operator without investigator spawn. Emit `operator_escalation_required` with Cat 6b reason and target-run context. No reconciliation workflow dispatched. Escalation: operator intervention — restore from backup, rebuild worktree, repair git object database. Emitted event: `reconciliation_category_assigned` (category=6b) + `operator_escalation_required`. Investigator: No (spawning to "explain why git is corrupt" burns tokens on operator-only problem). Auto-resolver: N/A (operator intervention). Cat 6b emissions are exempt from corroboration via dedicated escalation path per RC-019a.
    extra_labels:
      - "kind:taxonomy"

  # ───────────────────────── Test-infra beads (7) ─────────────────────────

  - mnem: rc-test.workflow-classification-fixture
    kind: test-infra
    title: "Reconciliation-as-workflow + uniqueness fixture (RC-001..RC-006, RC-002a/002b/003a/003b, RC-INV-001)"
    description: |
      Per §10.2 (RC-001..RC-006): structural tests verifying reconciliation workflows carry the `workflow_class = reconciliation` tag; integration tests verifying S01 packaging ships required DOT + YAML per RC-004. RC-002a concurrent-reconciliation: dispatch two reconciliation workflows against same `target_run_id`; verify `flock(LOCK_EX|LOCK_NB)` on `.harmonik/reconciliation-locks/<target_run_id>.lock` causes second dispatch to emit `reconciliation_dispatch_deduplicated` and skip. Stale-lock recovery test: kill daemon mid-investigation, restart, verify orphan-sweep cleans lock via PL-006 and next reconciliation cadence proceeds. RC-002b non-atomic recovery: stale-lock-with-verdict-executed test (lock file at path while investigator branch carries `Harmonik-Verdict-Executed: true`; verify lock deleted on next startup, run NOT reclassified). RC-003a priority ordering: unit tests exercising each pair of overlapping detection rules (workspace-missing crossover Cat 3 vs Cat 6a; merged-run crossover Cat 3c vs Cat 3b; rate-limited-non-idempotent crossover Cat 2 vs Cat 4) verifying declared first-match priority. RC-INV-001 sensor: integration test spawning reconciliation workflows + ordinary workflows concurrently; audit-log scan verifying every `reconciliation_verdict_*` event traces to `workflow_class = reconciliation` Workflow.

  - mnem: rc-test.detector-harness
    kind: test-infra
    title: "Detector harness + cadence + corroboration (RC-010..RC-014, RC-019a, RC-020a, RC-020b)"
    description: |
      Per §10.2 (RC-010..RC-014): crash-recovery scenario tests (RC-031) exercising each detector in §8; negative tests verifying detectors do not misclassify across run_ids (RC-010); tests verifying JSONL forbidden-uses (RC-014). RC-019a evidence corroboration: negative tests asserting detector emits `divergence_inconclusive` (NOT `store_divergence_detected`) when neither git nor Beads can corroborate; positive tests verify `corroboration` enum value matches the corroborating store. RC-020a detector cadence: timer-mocked tests verifying scheduled-cadence dispatch at hourly default; idempotency tests on re-running detectors over same snapshot. RC-020b detector panic recovery: per-detector `recover()` barrier injection test asserts panicking detector is suspended for daemon's lifetime, priority-order falls through to next, `reconciliation_detector_panic` emitted before fall-through. RC-INV-004 sensor: audit test on corpus of seeded divergence events verifying `corroboration ∈ {git-corroborated, beads-corroborated}` on every `store_divergence_detected`; single-source observations route to `divergence_inconclusive`.

  - mnem: rc-test.investigator-harness
    kind: test-infra
    title: "Investigator-agent contract harness (RC-015..RC-019, RC-015a)"
    description: |
      Per §10.2 (RC-015..RC-019): end-to-end tests with twin handler — verify snapshot-token plumbing through LaunchSpec.snapshot_token; investigator self-assembles InvestigatorInput via Beads-CLI / git-inspection / workspace-inspection / bounded JSONL skills (RC-015 logical-view contract); HC-handler launch sequence per RC-015a verified via twin handler. Wall-clock budget enforcement (RC-018): SIGTERM/SIGKILL ordering verified; budget-exhausted event emitted before fallback verdict; crash between events routes through Cat 3b retry cap. WIP-capture on `reopen-bead` (RC-019): verify `git status --porcelain` enumeration + diff capture written under `.harmonik/reconciliation/<investigator_run_id>/wip-capture/`.

  - mnem: rc-test.verdict-execution-harness
    kind: test-infra
    title: "Verdict + execution harness (RC-020..RC-027, RC-022a, RC-025a, RC-026a)"
    description: |
      Per §10.2 (RC-020..RC-027): schema-validation tests for every verdict enum value and every malformation reason (RC-023); staleness-detection tests (RC-024) — re-capture and compare snapshot; verdict-execution idempotency tests (RC-025) — every verdict's mechanical action testable on re-run with no observable difference; restart-discovery tests for Cat 3b (RC-026) — verdict commit without verdict-executed commit re-classifies as Cat 3b. RC-022a outcome-envelope routing: verify investigator emits via HC-008 `outcome_emitted` with `outcome_kind=reconciliation_verdict`; daemon-side verdict-executor authors verdict-and-verdict-executed commit pair on investigator's task branch (investigator does NOT directly write commit). RC-025a 7-step verdict-executor: panic-injection at each step verifies next-startup re-classifies via Cat 3b and re-runs idempotently. RC-026a retry cap: verify durable counter at `.harmonik/reconciliation-attempts/<target_run_id>.json` increments on each retry; cap N=5 exceeded → escalates to Cat 6b; each retry emits `reconciliation_verdict_execution_retry`.

  - mnem: rc-test.re-run-vs-intra-run-harness
    kind: test-infra
    title: "Re-run vs intra-run scenario harness (RC-028..RC-030)"
    description: |
      Per §10.2 (RC-028..RC-030): scenario tests verifying `reopen-bead` produces a new `run_id` with fresh worktree + fresh task branch per [workspace-model.md §4.9 WM-034]; `reset-to-checkpoint` preserves `run_id` and worktree per [execution-model.md §4.10 EM-044]; reconciliation does not produce intra-run loops (those are ordinary workflow-graph traversal handled by Guard/Gate per CP §4.2/§4.4).

  - mnem: rc-test.crash-recovery-suite
    kind: test-infra
    title: "Crash-recovery suite (RC-031 — every detector + verdict-execution path)"
    description: |
      Per §10.2 (RC-031): every detector under §4.3 / §8 and every verdict-execution path under §4.5 + every staleness-check path under RC-024 MUST be exercised by at least one crash-recovery scenario test before landing. Crash-injection points: (a) between RC-013 emission and downstream dispatch; (b) between RC-018 budget-exhausted-event and fallback-verdict emissions; (c) between RC-022 verdict-emitted commit and RC-025 verdict-executed commit (Cat 3b territory); (d) between RC-024 staleness re-capture and RC-025 mechanical action; (e) inside RC-025a's 7-step verdict-executor; (f) inside RC-018's 5-step budget-exhaustion handler. Each crash point's recovery routes through the documented restart-classification (Cat 5 for clean re-dispatch, Cat 3b for verdict-unexecuted, Cat 6a/6b for integrity violations). Crash-recovery test layer per `docs/methodology/TESTING.md`; migrates to `[testing.md §<layer>]` cross-reference within one revision cycle after testing.md finalized (OQ-RC-006).

  - mnem: rc-test.taxonomy-conformance
    kind: test-infra
    title: "Taxonomy + action-mapping conformance (RC-007..RC-009 + §8.12 ↔ schemas.md §6.3 sync)"
    description: |
      Per §10.2 (RC-007..RC-009): unit tests covering the §8.12 action table for each of the 11 categories — verify default action, investigator-spawned column, typical-verdict column, auto-resolver column match across the 11 §8 entries. Lint test verifying §8.12 (semantics) and [schemas.md §6.3] (mechanical dispatch) match — divergence is a lint failure per dual-table ownership rule. Per-category fixture for Cat 0/1/2/3/3a/3b/3c/4/5/6a/6b: detection-rule input → expected category assignment + expected event emission + expected dispatch action. Amendment-protocol gate (RC-009): test asserts authoring-time check rejects re-opening of 11-category framing without invoking [architecture.md §4.6] amendment protocol.

