# §2.11(c) §8 taxonomy decision (canonical large-§8-taxonomy case):
#   RC's §8 contains 11 detection-category subsections (§8.1 Cat 0; §8.2
#   Cat 1; §8.3 Cat 2; §8.4 Cat 3; §8.4a Cat 3a; §8.5 Cat 3b; §8.6 Cat 3c;
#   §8.7 Cat 4; §8.8 Cat 5; §8.11 Cat 6a; §8.11a Cat 6b — note the §8.9/
#   §8.10 holes are intentional from earlier numbering). Each category
#   has independent (a) detection rule (deterministic Go function in the
#   daemon), (b) default response (auto-resolver vs investigator-dispatch
#   vs auto-escalate), (c) escalation path, (d) emitted event, (e)
#   investigator/auto-resolver columns. SHAPE-not-COUNT test per
#   F-pilot-WM-2: each category IS independent code/work, NOT sentinel
#   values of a single vocabulary (contrast BI's 5 BrError values; ON's
#   24 exit codes — those are sentinel sets, single-bead form). RC's
#   categories are the canonical case for the "one bead per category"
#   discipline rule (§2.11(c)). Decision: 1 umbrella `rc-error.taxonomy`
#   + 11 per-category beads (`rc-error.cat-0`, `rc-error.cat-1`,
#   `rc-error.cat-2`, `rc-error.cat-3`, `rc-error.cat-3a`,
#   `rc-error.cat-3b`, `rc-error.cat-3c`, `rc-error.cat-4`,
#   `rc-error.cat-5`, `rc-error.cat-6a`, `rc-error.cat-6b`). The
#   per-category beads are children of the umbrella per §2.10 second-level
#   grouping permission. Per discipline v0.9 §2.11(c.2), the umbrella
#   bead is the vocabulary OWNER for the ReconciliationCategory enum;
#   consumer §4 reqs that cite a category by ID (e.g., "Cat 0", "Cat 3a")
#   `block-on rc-error.taxonomy` — same posture as BI/WM/ON
#   error-taxonomy beads.
#
# §2.11(c.2) intra-RC consumer→rc-error.taxonomy edges (~consumer→umbrella;
#   per-category-bead edges from cited category go to the SPECIFIC
#   per-category bead, not the umbrella):
#     RC-007 (taxonomy is detection contract; action-mapping dispatch)
#       → rc-error.taxonomy (umbrella)
#     RC-008 (auto-resolver categories MUST have deterministic resolver;
#       enumerates Cat 0/1/3a/3b/3c/4/5/6b)
#       → rc-error.taxonomy + rc-error.cat-0/1/3a/3b/3c/4/5/6b
#     RC-009 (taxonomy shape is settled; cites 11-category framing)
#       → rc-error.taxonomy
#     RC-012 (Cat 0 pre-check) → rc-error.cat-0
#     RC-013 (detector emits reconciliation_category_assigned) → rc-error.taxonomy
#     RC-014 (Cat 6a/6b classification on JSONL forbidden uses) → rc-error.cat-6a + rc-error.cat-6b
#     RC-018 (budget exhausted defaults escalate-to-human; Cat 3b retry cap routing) → rc-error.cat-3b
#     RC-022a + RC-025 + RC-025a (verdict execution table covers all categories)
#       → rc-error.taxonomy
#     RC-026 (Cat 3b discovery on restart) → rc-error.cat-3b
#     RC-026a (Cat 3b retry cap; cap exceeded → Cat 6b) → rc-error.cat-3b + rc-error.cat-6b
#     RC-003a (priority-ordered first-match across all categories)
#       → rc-error.taxonomy
#     RC-003b (crashed reconciliation branches → Cat 5, NOT Cat 6a)
#       → rc-error.cat-5 + rc-error.cat-6a
#     RC-INV-001 (workflow_class uniqueness; sensor across all categories)
#       → rc-error.taxonomy
#     RC-INV-004 (corroboration on store_divergence_detected; Cat 6b
#       exempt) → rc-error.cat-6b
#   = 16 unique consumer→taxonomy edges (some consumers edge to multiple
#   per-category beads). Edge direction strictly consumer→umbrella or
#   consumer→per-category bead per §2.11(c.2); the umbrella's own
#   predecessors are limited to schema-shaped beads (rc-schema.reconciliation-
#   category enum) and the umbrella does NOT block-on §4 reqs.
