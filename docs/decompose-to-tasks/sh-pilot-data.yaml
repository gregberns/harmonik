  mnem: sh
  title: "Scenario Harness spec — implementation"
  description: |
    Implements specs/scenario-harness.md v0.2.0 (36 §4 reqs SH-001..SH-034 + SH-015a + SH-016a; 5 invariants SH-INV-001..SH-INV-005; 11 §6.1 RECORDs (ScenarioFile, AgentOverride, FixtureSetup, GitSeedOp, FileSeed, EventExpectation, WorkspacePredicate, OutcomeExpectation, ScenarioResult, AssertionResult, SuiteResult); 8 §8 error classes folded into single sh-error.taxonomy umbrella per §2.6 single-table form. 0 §2.3 coalesces, 0 §2.2 multi-step splits. depends-on: [architecture, handler-contract, event-model, workspace-model, execution-model, operator-nfr, process-lifecycle]; all 7 targets loaded.
