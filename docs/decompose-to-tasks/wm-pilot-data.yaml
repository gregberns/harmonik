spec:
  prefix: wm
  title: "Workspace Model spec — implementation"
  spec_path: specs/workspace-model.md
  spec_version: "0.4.2"
  pilot_version: "0.1.0"

# Auto-applied to every non-epic bead in this file.
default_labels:
  - "spec:workspace-model"
  - "tag:mechanism"

epic:
  mnem: wm
  title: "Workspace Model spec — implementation"
  description: |
    Implements specs/workspace-model.md v0.4.2 (54 first-class §4 req beads from 54 active §4 reqs after 0 §2.3 coalesces and 0 §2.1a collapses, 4 invariants (WM-INV-004 retired), 5 §6 schemas, 1 §8 error-taxonomy bead (single-table form per §2.6, 12 sentinels), 0 multi-step splits (multiple F8b candidates collapsed to sub-bullets), 7 test-infra beads). depends-on: [architecture, execution-model, handler-contract, control-points, reconciliation, operator-nfr, process-lifecycle, beads-integration]; event-model intentionally NOT in depends-on (consume-produce pair resolved directionally). RC, ON, PL, BI cross-spec edges forward-deferred per F-pilot-EM-2 / Option B precedent (logged as forward:<prefix>-NNN). EV inline cites are F-pilot-EV-3 informational findings (NOT forward-deferred edges) — they will materialize when EV's reciprocal pilot edges per §2.11(d) co-owned events.
  labels:
    - "kind:spec-parent"

beads:
  # kinds: req | invariant | schema | error-taxonomy | test-infra

  # ───────────────────────── §4.a Subsystem envelope ─────────────────────────

  - mnem: wm-env-001
    kind: req
    req: WM-ENV-001
    title: "Subsystem envelope declaration (S06)"
    description: |
      Per WM-ENV-001: declare the workspace-manager subsystem envelope per [architecture.md §4.0 AR-053]: (a) events produced (workspace_created, workspace_leased, workspace_merge_status, workspace_discarded, merge_conflict_escalation); (b) events consumed (session_log_location, operator_pausing/paused/stopping/stopped/resuming, reconciliation_verdict_executed, workspace_interrupted observed-but-not-emitted); (c) types introduced (Workspace, WorkspaceState, InterruptState, SessionMetadataSidecar, LeaseLockFile, WorkspaceRef consumed); (d) handlers implemented (none); (e) state owned (Workspace record, LeaseLockFile, session-log directories + sidecars; Run consumed); (f) control points provided (none); (g) NFRs inherited (ON-018, ON-027); (h) boundary classification per operation table; (i) environment pin (git ≥ 2.34 per WM-ENV-002).

  - mnem: wm-env-002
    kind: req
    req: WM-ENV-002
    title: "Minimum git version pin (≥ 2.34) detected at startup"
    description: |
      Per WM-ENV-002: workspace manager requires git ≥ 2.34. Three mechanical dependencies: `git merge --strategy=ort` default since 2.34 (WM-019); `git for-each-ref --format '%(trailers:key=X,valueonly=true)'` requires 2.34 trailers format token; `git worktree repair` stabilized in 2.34. Daemon MUST detect at startup by parsing `git --version` and MUST refuse to start if below 2.34 (typed `GitVersionTooOld` error per §8). Detection at startup (not per-operation) so failure surfaces ONCE at daemon-start. Cross-subsystem version coordination with PL tracked at OQ-WM-015.
    extra_labels:
      - "axis:idempotency-idempotent"

  # ───────────────────────── §4.1 Worktree primitive ─────────────────────────

  - mnem: wm-001
    kind: req
    req: WM-001
    title: "Workspace type and required fields"
    description: |
      Per WM-001: a `Workspace` MUST carry workspace_id (stable across restarts), run_id, repository (absolute path to LOCAL clone), parent_commit, branch_name, path, state, interrupt_state, metadata (closed map: created_at + operator_fingerprint), implementer_handler_ref (optional; null when task branch has no agentic commits), schema_version, optional bead_id (opaque correlation field). The `metadata` map is closed at MVH (additional keys forbidden).

  - mnem: wm-002
    kind: req
    req: WM-002
    title: "Worktree path convention `<repo>/.harmonik/worktrees/<run_id>/`"
    description: |
      Per WM-002: every workspace MUST be created at canonical path `<repo>/.harmonik/worktrees/<run_id>/`. The daemon operates on a local clone only; workspaces MUST NOT be materialized against a bare remote URL. Worktree root operator-configurable per [control-points.md §4.7 CP-037] (precedence-layer reload at next operator pause); per-run subdirectory `<run_id>/` is fixed. `run_id` MUST match `[A-Za-z0-9-]+` (UUIDv7 satisfies this).
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: wm-003
    kind: req
    req: WM-003
    title: "Worktree creation uses `git worktree add -b <branch> <path> <parent_commit>`"
    description: |
      Per WM-003: workspace manager MUST create a worktree + fresh task branch atomically via `git worktree add -b <branch> <path> <parent_commit>` against the backing repo. The `-b` form is REQUIRED (the task branch does not yet exist). Explicit `<parent_commit>` start-point is REQUIRED to pin the branch base deterministically; omitting it would default to HEAD and race with operator activity in the main worktree. No provisioning layer (adze, devbox, container) at MVH; plain subfolder. Git minimum-version pin per WM-ENV-002.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: wm-003a
    kind: req
    req: WM-003a
    title: "Discovery classifies partially-crashed worktree states"
    description: |
      Per WM-003a: a directory under `<repo>/.harmonik/worktrees/<run_id>/` registered by `git worktree list --porcelain` but with NO lease-lock AND NO sessions dir is classified `bare-worktree-no-lease` and routed to reconciliation Cat 3 per [reconciliation/spec.md §8]. A registered worktree with sidecar present but NO lease-lock is classified `sidecar-without-lease` (same Cat 3 route). Both arise from SIGKILL/power-loss between `git worktree add` and the lease-lock fsync gate of WM-016. Cat 3 routing gives reconciliation right to propose `reopen-bead` or `accept-close-with-note`.

  - mnem: wm-004
    kind: req
    req: WM-004
    title: "Workspace ID derivable from run_id (`workspace_id = \"ws-\" + run_id`)"
    description: |
      Per WM-004: `workspace_id` MUST be generated by deterministic construction `workspace_id = "ws-" + run_id` so daemon restart finds the same workspace_id without consulting a separate store. State reconstruction uses git + Beads per [execution-model.md §4.7]. `workspace_id` MUST be treated as opaque by event consumers — downstream MUST NOT parse the prefix or embedded run_id; the correlation field for joins is `run_id`, carried explicitly in every event payload per [event-model.md §8.5].

  # ───────────────────────── §4.2 Branch naming ─────────────────────────

  - mnem: wm-005
    kind: req
    req: WM-005
    title: "Task branch named `run/<run_id>`"
    description: |
      Per WM-005: every run's task branch MUST be named `run/<run_id>`. Created off the current integration branch (WM-006) at worktree-create time. Checkpoint commits per [execution-model.md §4.5 EM-023] land on this branch only.

  - mnem: wm-005a
    kind: req
    req: WM-005a
    title: "Sub-workflow expansion does not create additional task branches"
    description: |
      Per WM-005a: sub-workflow expansion per [execution-model.md §4.8 EM-034] does NOT create additional task branches or workspaces. All checkpoint commits produced by an expanded sub-workflow's nodes MUST land on the parent run's task branch per EM-023 + EM-035. Workspace is leased by the parent run; nested execution occupies the same worktree. A sub-workflow attempting to materialize its own workspace is a foundation-amendment-requiring change.

  - mnem: wm-006
    kind: req
    req: WM-006
    title: "Integration branch naming convention (default + parent-bead-derived)"
    description: |
      Per WM-006: default integration branch MUST be named `harmonik/integration`. When a run has parent-bead context per [beads-integration.md §4.5 BI-014], task branch MUST target a derived branch named `harmonik/integration/<parent_bead_id_refsafe>` per WM-006a. Substitution template operator-configurable per OQ-WM-002; default is verbatim bead-ID substitution. When no parent-bead context, merge target determined by WM-008.

  - mnem: wm-006a
    kind: req
    req: WM-006a
    title: "Ref-safe bead-ID substitution via `git check-ref-format`"
    description: |
      Per WM-006a: workspace manager MUST delegate ref-name validation to `git check-ref-format(1)` rather than independent character-class enumeration. Procedure: invoke `git check-ref-format refs/heads/<proposed>`; non-zero exit → apply canonical fallback (hex-encode bytes NOT in `[a-zA-Z0-9/_-]` as `%HH` uppercase; collapse `//` runs; reject bare `@`/empty/single-`.` or second-pass-failing names) and re-validate. `git check-ref-format` is the single source of truth for ref-name validity at each check; workspace manager MUST NOT cache or encode git's accepted set independently. Bead IDs whose transformed form would be empty / case-collide / still-fail-after-fallback rejected at workspace-create time with `RefNameInvalid` per §8.
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: wm-007
    kind: req
    req: WM-007
    title: "Three-level branching model (task → integration → main)"
    description: |
      Per WM-007: system MUST use three-level branching: (a) node commits land on task branch per WM-005 + EM-023; (b) task branch squash-merges onto integration branch at run-terminal-success per §4.5; (c) integration branch merges to main under developer or operator policy. Harmonik's contract ends at "integration branch holds one commit per task." Merge style from integration to main is NOT dictated; `workspace_merge_status` fires ONLY for the task-branch → integration-branch merge.

  - mnem: wm-008
    kind: req
    req: WM-008
    title: "Small-scope collapse: operator-policy-gated merge target for parentless runs"
    description: |
      Per WM-008: when a run has no parent-bead per [beads-integration.md §4.5 BI-014], task branch's merge target MUST be determined by operator policy per [operator-nfr.md §4.3] with two allowed values: `integration` (squash-merge to harmonik/integration; default) or `main` (squash-merge directly to main; small-scope-collapse shape). Absent operator override, default MUST be `integration`. Decision is deterministic on configured policy value; no cognition. Policy knob's precedence layer + reload semantics tracked in OQ-WM-002.

  - mnem: wm-009
    kind: req
    req: WM-009
    title: "Branch naming is stable across a harmonik minor version"
    description: |
      Per WM-009: task-branch and integration-branch naming conventions MUST be stable across a harmonik minor version per [operator-nfr.md §4.5 ON-018]. A breaking change to branch naming requires a migration release.

  # ───────────────────────── §4.3 Lease model ─────────────────────────

  - mnem: wm-010
    kind: req
    req: WM-010
    title: "Lease is held by the run, not by individual agents"
    description: |
      Per WM-010: a workspace MUST be leased by exactly one Run for the run's full lifetime — interval starts on `workspace_leased` emission (WM-016) and ends on terminal workspace event (`workspace_merge_status status=merged` or `workspace_discarded`) per WM-013b. Multiple agents (planner, researcher, builder, reviewer, merge agent) MUST occupy the same worktree sequentially across their nodes. An agent MUST NOT hold exclusive ownership for the duration of its session; the centralized-controller principle ([architecture.md §4.9]) requires the run — not the agent — to be the lease holder.

  - mnem: wm-011
    kind: req
    req: WM-011
    title: "One active agent at a time inside a workspace"
    description: |
      Per WM-011: at any instant AT MOST ONE agent process MAY be actively writing to the worktree. Agents run sequentially as the run traverses its workflow graph; parallel nodes within one run MUST NOT share a worktree. Parallel nodes across different runs occupy separate worktrees per WM-002. Enforcement delegated to the orchestrator (S01); workspace manager's storage-level contribution is the lease-lock file (WM-013a). The lease-lock content identifies the owning run but does not by itself arbitrate per-agent concurrency.

  - mnem: wm-012
    kind: req
    req: WM-012
    title: "One run per bead at a time"
    description: |
      Per WM-012: at any instant AT MOST ONE run MAY be in flight for a given bead. A second run for the same bead is permitted ONLY after the first has reached a terminal state (completed, failed, or canceled) per [execution-model.md §4.3]. Re-claim semantics defined in §4.9.

  - mnem: wm-013
    kind: req
    req: WM-013
    title: "Workspace ID discoverable from run_id without a separate index"
    description: |
      Per WM-013: given a `run_id`, workspace manager MUST resolve workspace record (path, branch, state) by deterministic construction per WM-002 + WM-004 plus a filesystem check per WM-013c. No separate run-to-workspace index MAY be required as the authoritative lookup path.

  - mnem: wm-013a
    kind: req
    req: WM-013a
    title: "Lease-lock file canonical path, JSON content, atomic-write + fsync birth"
    description: |
      Per WM-013a: lease-lock file at canonical path `${workspace_path}/.harmonik/lease.lock` (per §6.2). Lock-file existence represents the lease; absence represents released. JSON content MUST carry `run_id` (UUID, required), `pid` (integer, required), `created_at` (RFC 3339, required), `ttl_sec` (integer, required; advisory). Workspace manager MUST write atomically (write-to-temp + rename) and MUST fsync before emitting `workspace_leased` (WM-016). Birth timing: immediately preceding `workspace_leased` emission; emission ordering of WM-016 unchanged. On every `workspace_created` emission the workspace manager MUST NOT yet have written a lease-lock file — the lock is tied to lease acquisition, not to workspace existence. Cross-spec coordination: HC-044a + PL-006 currently disagree; OQ-WM-005 elevated to BLOCKING-CROSS-SPEC; WM's path + JSON content authoritative.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: wm-013b
    kind: req
    req: WM-013b
    title: "Lease release on terminal transitions; per-terminal-path durability gates"
    description: |
      Per WM-013b: workspace manager MUST release the lease (remove lease-lock file) on every terminal workspace transition (entering `merged` or `discarded`). Per-terminal-path release gate (sub-bullets — F8b shared epilogue, single bead per F-pilot-WM-3):
      • Merged path. Release AFTER `workspace_merge_status status=merged` flushed to durable events journal per [event-model.md §4.4 EV-015] (class F).
      • Failed-run path. Release AFTER `run_failed` flushed (EV §8.1.3, class F). NOT `workspace_discarded` (class O, may be lost on power loss).
      • Post-escalation path. Release AFTER appending `lease_released` JSONL line to `${workspace_path}/.harmonik/events/workspace-<workspace_id>.jsonl` and fsyncing (workspace-local durability marker; reconciliation consumes).
      • Operator-forced discard (verdict-driven). Release AFTER `reconciliation_verdict_executed` flushed AND workspace-local marker written + fsynced.
      Across all paths the workspace-local `lease_released` marker MUST precede lock-file unlink (idempotent replay if crash mid-release). Workspace-local events file owned by this spec (§6.2). Marker is durable signal; not the global EV journal. Release itself is idempotent.
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: wm-013c
    kind: req
    req: WM-013c
    title: "Lease discovery on startup (filesystem walk + lock-content read)"
    description: |
      Per WM-013c: workspace manager startup MUST discover live workspaces by (a) enumerating subdirectories of `<repo>/.harmonik/worktrees/` matching the run_id regex; (b) calling `git worktree list --porcelain` against `<repo>` to confirm registered status; (c) reading the lease-lock file per WM-013a (if present) to recover run_id/pid/created_at; (d) stat-ing `${path}/.harmonik/sessions/` to detect whether any session was started. A directory failing (b) is an orphan worktree subject to PL-006. A directory passing (b) with a live lease-lock file whose recorded pid is NOT the current daemon is subject to the orphan-sweep rule of WM-033 (stale → sweep; live non-orphan → fail-fast coordination with HC-044a).
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: wm-013d
    kind: req
    req: WM-013d
    title: "Released-workspace path re-use is forbidden"
    description: |
      Per WM-013d: a released workspace's canonical path (WM-002) MUST NOT be re-leased by a subsequent run. New runs receive new canonical paths via new run_ids per WM-034. Prior run's worktree directory and branch MAY persist on disk per WM-031; re-use of the path for a different run_id is forbidden — the canonical-path invariant (WM-INV-005) would be violated.

  - mnem: wm-013e
    kind: req
    req: WM-013e
    title: "`.gitignore` hygiene for harmonik control-plane paths (write-or-fail)"
    description: |
      Per WM-013e: workspace manager MUST ensure backing-repo root `.gitignore` excludes harmonik control-plane paths. Required entries (relative to repo root, order preserved): `.harmonik/lease.lock`, `.harmonik/sessions/`, `.harmonik/worktrees/`, `.harmonik/events/`. The `.harmonik/sessions/` inclusion is scoped to root-level (sessions live INSIDE worktrees); per-worktree `.harmonik/sessions/` are NOT excluded by this entry (gitignore interpretation rooted at main worktree; checkpoint commits inside task worktrees see their own session dirs as in-tree per WM-030). At daemon startup workspace manager MUST check root `.gitignore` for these entries; if missing, daemon MUST add them AND stage + commit on dedicated branch `harmonik/gitignore-init` BEFORE creating any worktree. If daemon lacks write permission, startup MUST fail-fast with `GitignoreWriteForbidden` per §8. Operator-side override tracked in OQ-WM-014.
    extra_labels:
      - "axis:idempotency-idempotent"

  # ───────────────────────── §4.4 Lifecycle states + events ─────────────────────────

  - mnem: wm-014
    kind: req
    req: WM-014
    title: "Workspace state machine"
    description: |
      Per WM-014: a Workspace MUST traverse the lifecycle states `created → ready → leased → (optionally merge-pending → optionally conflict-resolving) → (merged | discarded)`. Lifecycle state is orthogonal to interrupt_state (§4.10); orthogonality applies only to in-flight states per WM-037a. See §7.1 for the transition table. The `setup` state from WM v0.2 has been retired in v0.3.0; retired enum value MUST NOT be reintroduced.

  - mnem: wm-015
    kind: req
    req: WM-015
    title: "Workspace lifecycle event emission obligations (WHEN)"
    description: |
      Per WM-015: workspace manager MUST emit the events at the §7.1 transitions. Event type names AND payload schemas are authoritative in [event-model.md §8.5] per EV-025; this spec is normative ONLY for WHEN each event fires:
      • workspace_created — emit on entry to `created`.
      • workspace_leased — emit on entry to `leased` AFTER WM-016 ordering gates.
      • workspace_merge_status — single paired-phase event per [event-model.md §8.9(h)]: emit ONCE with `status=pending` on entry to `merge-pending` and ONCE with `status=merged` on entry to `merged`.
      • workspace_discarded — emit on entry to `discarded`.
      • merge_conflict_escalation — emit when implementer-resolution path is exhausted per WM-023.
      `workspace_interrupted` is emitted by reconciliation detector (NOT by WM); see WM-039. Prior-version inline payload enumerations (WM-017 / WM-023 / WM-039) are retired per §12; wire format read from EV alone.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: wm-016
    kind: req
    req: WM-016
    title: "`workspace_leased` emitted after sidecar + lease-lock fsync (4-step ordering)"
    description: |
      Per WM-016: workspace manager MUST complete in order BEFORE emitting `workspace_leased` (sub-bullets — F8b shared launch_session function body, single bead per F-pilot-WM-3):
      • (a) `git worktree add` succeeded (WM-003).
      • (b) Task branch (WM-005) exists.
      • (c) First-session log directory + harmonik.meta.json sidecar per §4.7 written + fsynced.
      • (d) Lease-lock file per WM-013a written + fsynced.
      Only after (a)–(d) does `workspace_leased` emit. Workspace's lifecycle state MUST transition to `leased` BEFORE emission so consumers observing the event see a consistent record. Per-workspace emission tied to FIRST session's sidecar; subsequent sessions (WM-025) write their own sidecars per WM-026 and do NOT re-transition or re-emit.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  # WM-017 retired (v0.3.0). Payload-field declarations violated EV-025; correlation-field obligations now discoverable from [event-model.md §8.5]. ID NOT reusable. No bead minted.

  # ───────────────────────── §4.5 Merge back to integration ─────────────────────────

  - mnem: wm-018
    kind: req
    req: WM-018
    title: "Merge-back is performed by a node in the same worktree (same lease)"
    description: |
      Per WM-018: merge-back operation (merging task branch onto integration branch) MUST be performed by a workflow node executing INSIDE the run's already-leased worktree. The merge is NOT a new workspace; it is another node in the same run consuming the same lease per WM-010. A design that creates a new workspace for the merge step is forbidden.

  - mnem: wm-018a
    kind: req
    req: WM-018a
    title: "Merge-back node dispatch contract (non-agentic OR agentic)"
    description: |
      Per WM-018a: every workflow producing a merge-back MUST declare the merge step as one of two node shapes: (a) **non-agentic merge node** — orchestrator-dispatched directly; orchestrator executes `git merge --squash` + commit per WM-019, no handler subprocess; (b) **agentic merge node** — dispatched through [handler-contract.md §4.1] whose handler executes the same git operations plus pre-merge validation per its LaunchSpec. Choice is workflow-author concern. In both shapes the merge node's dispatch occurs INSIDE the existing lease per WM-018; node's Outcome carries the terminal merge outcome and drives §7.1 transition from `merge-pending` to `merged` or `conflict-resolving`. Conflict detection is mechanical: non-zero exit from `git merge --squash` OR conflict markers in `git status --porcelain` → conflict entry per WM-020.

  - mnem: wm-019
    kind: req
    req: WM-019
    title: "Squash-merge with `--strategy=ort`; one-commit-per-task; trailers + author/committer split"
    description: |
      Per WM-019: merge-back MUST produce exactly one commit on integration branch per completed task. Implemented as `git merge --squash --strategy=ort <task_branch>` followed by `git commit` (or porcelain-equivalent preserving identical tree-and-trailer semantics). `--strategy=ort` pin REQUIRED (default since git 2.34 per WM-ENV-002; explicit specification prevents older or differently-configured site falling back to `recursive`).
      **Commit message synthesis.** Synthesized by the merge node (non-agentic OR agentic per WM-018a). Body MUST include summary of task-branch's checkpoint commit set — at minimum first-line subject of each checkpoint, concatenated in commit order — so the squashed commit remains human-readable. Trailers MUST carry `Harmonik-Run-ID: <run_id>` and (when bead-tied) `Harmonik-Bead-ID: <bead_id>` per [execution-model.md §4.4 EM-017]. Re-synthesized from run's invariant identifiers (equivalent to last-checkpoint trailers per WM-INV-003).
      **Author/committer split.** Author = LaunchSpec identity of merge-node's implementer (agentic variant — `implementer_handler_ref.identifier`) OR daemon identity (non-agentic variant). Committer = daemon identity in BOTH variants (`Harmonik Daemon <no-reply@harmonik.local>` or operator-configured override per [operator-nfr.md §4.3]).
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: wm-019a
    kind: req
    req: WM-019a
    title: "Merge executes outside main worktree (`--ignore-other-worktrees` OR scratch worktree)"
    description: |
      Per WM-019a: merge operation (WM-019) MUST NOT execute `git checkout` against integration branch in a worktree concurrently used by operator activity. Two accepted mechanisms:
      • (a) `--ignore-other-worktrees` flag — merge node MAY run `git checkout --ignore-other-worktrees <integration_branch>` against merge-staging area. Tells git to proceed even if another worktree has the branch checked out.
      • (b) **Scratch merge-worktree (PREFERRED)** — merge node creates dedicated short-lived worktree at `<repo>/.harmonik/worktrees/merge-<merge_id>/` (UUIDv7 minted for the merge), executes the merge inside, removes worktree after commit. Lifecycle (sub-bullets — F8b cohesive merge function body, single bead per F-pilot-WM-3): worktree add `-b merge-<merge_id> <merge_path> <integration_tip>` → `git merge --squash --strategy=ort <task_branch>` → resolve conflicts per WM-024 if present → `git commit` with trailers per WM-019 → push integration tip → `git worktree remove --force` + `git worktree prune` → delete transient `merge-<merge_id>` branch. Scratch worktree is unleased; no lease-lock; not subject to §4.3 lifecycle; never classified as orphan by WM-003a. `merge_id` distinct from any run_id.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: wm-020
    kind: req
    req: WM-020
    title: "Squash-merge is non-fast-forward by construction"
    description: |
      Per WM-020: a squash-merge is non-fast-forward by its nature: `git merge --squash` produces a single new commit on integration branch whose tree equals the merged result but whose parent is the integration-branch tip (not the task-branch tip). Integration-branch tip therefore ADVANCES to a new commit containing squashed content; task-branch tip is UNCHANGED and is NOT an ancestor of the new integration-branch tip. The phrasing "not fast-forward-only" used in prior WM drafts is retired — under squash a fast-forward is not representable. Conflict markers in the index are real and MUST be resolved per §4.6 before the merge commit is created. Detection mechanical per WM-018a (non-zero exit OR conflict markers in `git status --porcelain`).

  - mnem: wm-021
    kind: req
    req: WM-021
    title: "Merge outcome emits workspace_merge_status with status=merged"
    description: |
      Per WM-021: on successful merge, workspace manager MUST emit `workspace_merge_status` with `status=merged` per [event-model.md §8.5.3]; payload schema (including `merge_commit_hash`, `source_branch`, `target_branch`) declared there. State MUST transition to `merged` per §7.1. On entry to `merge-pending` (prior to merge execution), workspace manager MUST emit `workspace_merge_status` with `status=pending` — same event type per paired-phase rule of [event-model.md §8.9(h)]. Two separate `workspace_merge_pending` and `workspace_merged` event types are NOT registered; references in WM v0.2 retired per §12.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  # ───────────────────────── §4.6 Conflict resolution ─────────────────────────

  - mnem: wm-022
    kind: req
    req: WM-022
    title: "Original-implementer identification: sidecar walk (NOT trailer walk)"
    description: |
      Per WM-022: "original implementer" for a merge-back MUST be identified mechanically from `implementer_handler_ref` (§6.1). Field MUST be set by workspace manager at merge-pending entry (§7.1) to the `handler_ref` derived from the most-recent agentic session sidecar.
      **Identification mechanism (sidecar walk).** Workspace manager MUST enumerate `${workspace_path}/.harmonik/sessions/*/harmonik.meta.json` (sidecars written by WM-026) and order by sidecar's `launched_at` (RFC 3339) in REVERSE chronological order. For each, inspect `agent_type` (conformance-class identifier per [architecture.md §4.7 AR-024] + [handler-contract.md §6.1]); the FIRST sidecar whose `agent_type` belongs to the agentic handler classes (mechanical / generator / merge-node classes are non-agentic) supplies `implementer_handler_ref` and the LaunchSpec template. Sidecar is authoritative because WM-026 guarantees write-and-fsync before handler launch — durable prerequisite for any commit that may have landed.
      **No git-trailer walk.** This rule does NOT walk git commit trailers. Trailers in EM-017 carry run_id/state_id/transition_id/schema_version/bead_id — none identify the emitting agent's conformance class. Earlier drafts cited a fabricated `Harmonik-Actor-Role` trailer; no such trailer exists; retired at v0.4.0. Enriching EM trailer set with `Harmonik-Agent-Type` tracked at OQ-WM-012.
      **Null fallback.** If sidecar walk finds no agentic session, `implementer_handler_ref` MUST be set to null and WM-022a governs the escalation path.
      Resolution agent MUST be a fresh handler session launched from `implementer_handler_ref` per WM-024. No dedicated "merge-agent" role in MVH. "Original" refers to HANDLER-CLASS LINEAGE, not process-identity.
    extra_labels:
      - "tag:cognition"
      - "axis:llm-freedom-bounded"
      - "axis:io-determinism-best-effort"
      - "axis:replay-safety-unsafe"
      - "axis:idempotency-non-idempotent"

  - mnem: wm-022a
    kind: req
    req: WM-022a
    title: "All-mechanical task branches escalate directly (skip re-dispatch)"
    description: |
      Per WM-022a: if `implementer_handler_ref` is null at merge-pending entry (task branch contains only non-agentic commits — mechanical refactors, generated-code landings, or merge-node commits), workspace manager MUST skip WM-024 re-dispatch and emit `merge_conflict_escalation` directly per WM-023 on conflict detection. The system MUST NOT silently remap the implementer role to an unrelated handler class. Human resolution is the MVH fallback for all-mechanical conflict paths.

  - mnem: wm-023
    kind: req
    req: WM-023
    title: "Unresolvable conflicts escalate via merge_conflict_escalation"
    description: |
      Per WM-023: if re-dispatched implementer per WM-024 cannot resolve within handler-contract budget per [handler-contract.md §6.1], or returns any terminal outcome other than a successful merge commit, workspace manager MUST emit `merge_conflict_escalation` per [event-model.md §8.5.6] (EV owns the payload schema including workspace_id, run_id, conflict_paths[], escalated_at). The run MUST transition to `conflict-resolving` per §7.1 on initial conflict detection (NOT again on escalation — single-entry transition). Escalation marks resolution path as exhausted; workspace transitions to `discarded` per §7.1 after escalation event emitted.
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: wm-024
    kind: req
    req: WM-024
    title: "Conflict-resolver dispatch (mechanism) + 3-attempt cap (op-tunable [1,10])"
    description: |
      Per WM-024: mechanism of dispatching implementer agent back into worktree to resolve conflict is deterministic (mechanism-tagged; this spec owns it). Agent's reasoning during resolution is delegated to implementer's handler per [handler-contract.md §4.1] (cognition-tagged; owned there). Mechanical delegation path:
      • Role: handler class resolved from `workspace.implementer_handler_ref` per WM-022.
      • Model-class: `agent_type` from session sidecar that produced latest agentic commit.
      • Input shape: fresh LaunchSpec with `workspace_path` pointing at existing worktree, `required_skills` including conflict-resolution skill (skill name pending OQ-WM-007), input payload of (task branch tip, integration branch tip, conflict-markered paths, transition history per [execution-model.md §4.7]).
      • Budget: fresh per handler-contract LaunchSpec default; prior session's unused budget NOT inherited.
      • Re-dispatch attempt cap: DEFAULT THREE (3) per merge-pending cycle. Each attempt spawns fresh LaunchSpec; outcome recorded in workspace-local events JSONL per WM-013b. After three non-successful attempts, WM-022a/WM-023 routes verdict to `escalate-to-human` per [reconciliation/spec.md §4.5 RC-020]. Cap operator-configurable per [operator-nfr.md §4.3] in [1, 10]; out-of-range overrides rejected at daemon startup.
      If recorded handler class has been retired between initial commit time and merge-time re-dispatch (post-MVH concern), workspace manager MUST treat as unresolvable-conflict path and route to WM-023 escalation without silent handler-class remap.

  # ───────────────────────── §4.7 Session-log directory + metadata sidecar ─────────────────────────

  - mnem: wm-025
    kind: req
    req: WM-025
    title: "Session-log directory at `${workspace_path}/.harmonik/sessions/${session_id}/`"
    description: |
      Per WM-025: for every agent session launched against a workspace, a session-log directory MUST exist at `${workspace_path}/.harmonik/sessions/${session_id}/`. Directory is the join point for handler-written session logs (S04) and CASS-read metadata (S08). Workspace manager OWNS directory creation; handlers OWN log-file contents; handler's `session_log_location` progress-stream emission per [handler-contract.md §4.2 HC-010] announces this pre-existing path to the watcher. `session_id` is per-session UUID minted by workspace manager at session start; generation rule in [handler-contract.md §4.2]. Distinct sessions never collide because session_id is unique per launch.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: wm-026
    kind: req
    req: WM-026
    title: "Metadata sidecar `harmonik.meta.json` (atomic write: tmp+fsync+rename+parent-fsync)"
    description: |
      Per WM-026: workspace manager MUST write metadata sidecar at `${workspace_path}/.harmonik/sessions/${session_id}/harmonik.meta.json` BEFORE handler launches. Required fields: run_id, node_id, agent_type (conformance-class identifier per [architecture.md §4.7 AR-024]), workflow_id, launched_at (RFC 3339), schema_version, bead_id (present iff bead-tied per [execution-model.md §4.3 EM-014]). Sidecar is authoritative join key for CASS indexing AND authoritative source for agent-type at merge-time implementer identification (WM-022). For runs inside expanded sub-workflows per [execution-model.md §4.8 EM-034a], sidecar's `node_id` MUST carry namespaced `<parent_node_id>/<sub_node_id>` form.
      **Atomicity discipline.** Same as lease-lock per WM-013a (sub-bullets — F8b cohesive write_json_atomic_fsync helper, single bead per F-pilot-WM-3): (i) write JSON to sibling temp file `harmonik.meta.json.tmp-<pid>`; (ii) fsync temp file; (iii) `rename(2)` temp → canonical name (POSIX rename atomic); (iv) fsync parent directory `${workspace_path}/.harmonik/sessions/${session_id}/` to durably record rename. Step (iv) REQUIRED — power loss after (iii) without parent-dir fsync can lose rename on some filesystems. WM-016's four-step ordering requires both sidecar AND lease-lock durable on disk before `workspace_leased`; parent-dir fsync MUST complete before `workspace_leased` for the first session's sidecar.
      Interrupted write (process death between (i)-(iii)) leaves `.tmp-<pid>` file and no canonical sidecar. Startup sweep MUST tolerate orphan `.tmp-<pid>` files by removing them; missing sidecar with present lease-lock classified per WM-013c; missing lease-lock with present sidecar is `sidecar-without-lease` evidence type per WM-003a.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: wm-027
    kind: req
    req: WM-027
    title: "Sidecar metadata stamping precedes workspace_leased for the first session"
    description: |
      Per WM-027: workspace manager MUST write the first session's metadata sidecar BEFORE emitting `workspace_leased` per WM-016. This ordering ensures any consumer of `workspace_leased` observing handler launch can join metadata without racing the sidecar write. For subsequent sessions within a workspace (WM-010 allows many sessions per workspace), sidecar write precedes handler launch but does NOT re-emit `workspace_leased`; proceeds as stand-alone sidecar-write covered by WM-026.

  - mnem: wm-028
    kind: req
    req: WM-028
    title: "bead_id propagates into session metadata when present"
    description: |
      Per WM-028: when run is bead-tied, sidecar's `bead_id` field MUST carry the same `bead_id` value the checkpoint trailer carries per [execution-model.md §4.4 EM-017] and [beads-integration.md §4.6 BI-017, BI-018] — trailer name (`Harmonik-Bead-ID`) and schema owned by execution-model and beads-integration respectively. This spec asserts only the VALUE correlation. `bead_id` MUST be absent (or explicit null) when run has no bead tie. CASS uses this metadata to join session logs to Beads task ledger.

  - mnem: wm-029
    kind: req
    req: WM-029
    title: "Session-log directory consumed read-only by S08"
    description: |
      Per WM-029: session-log directory (including metadata sidecar and handler-written logs) MUST be treated as read-only from memory-layer subsystem's perspective. S08 indexes contents into CASS without mutating any file under `${workspace_path}/.harmonik/sessions/`. MVH does not declare a mechanical sensor; read-only contract enforced by reviewer discipline until memory-layer spec (deferred) names operator-auditable permission or audit hook. See OQ-WM-003.

  - mnem: wm-030
    kind: req
    req: WM-030
    title: "Post-merge session-log retention default (preserve-in-merged-branch)"
    description: |
      Per WM-030: on successful merge (`workspace_merge_status status=merged`), workspace manager MUST preserve sessions directory inside merged branch (i.e., session logs remain in integration-branch commit tree) by default. Operator-configured alternative MAY move directory to post-merge archive path post-MVH; MVH default is preserve-in-merged-branch for audit retention. MVH default requires project `.gitignore` MUST NOT exclude `.harmonik/sessions/`; gitignored sessions silently break the preserve-in-merged-branch contract. Violations are operator-observable misconfiguration per [operator-nfr.md §4.9].

  # ───────────────────────── §4.8 Failed-run worktree persistence ─────────────────────────

  - mnem: wm-031
    kind: req
    req: WM-031
    title: "Failed-run worktrees persist until operator cleanup"
    description: |
      Per WM-031: a worktree whose run reached terminal failure (`failed` or `canceled` per [execution-model.md §7.1]) MUST persist on disk with branch intact. Workspace manager MUST NOT auto-delete failed-run worktrees beyond startup orphan sweep (WM-033). Failed-run worktrees retained for audit and post-mortem. Lease-lock files released per WM-013b; worktree directory and branch remain. MVH imposes no retention window; operators facing disk pressure handle via operator-initiated cleanup workflows per [operator-nfr.md §4.9]; automatic retention-window default tracked in OQ-WM-008.

  - mnem: wm-032
    kind: req
    req: WM-032
    title: "Failed-run workspace state is `discarded`; interrupt_state composes orthogonally"
    description: |
      Per WM-032: on terminal failure, workspace state MUST transition to `discarded` per §7.1. A workspace's `interrupt_state` (§4.10) MAY be non-`none` at the moment of terminal failure (e.g., operator-stopped run reaches `discarded`); per WM-037a, terminal transition MUST clear any non-`none` interrupt_state back to `none` — terminal states are absorbing and do not carry interrupt signals. Branch MUST NOT be deleted; branch reference in run's bead history per [reconciliation/schemas.md §6.2] preserves auditability.

  - mnem: wm-033
    kind: req
    req: WM-033
    title: "Startup orphan sweep removes stale lease-lock files (content-first staleness; mtime tiebreaker)"
    description: |
      Per WM-033: on daemon startup, orphan sweep (per [process-lifecycle.md §4.2 PL-006]) MUST remove stale lease-lock files from worktrees whose owning daemon is no longer running. Sweep MUST NOT delete worktree directories or branches. Full worktree cleanup is operator-initiated.
      **Staleness — content-first, mtime tiebreaker.** Determined PRIMARILY from JSON content (WM-013a): `pid` and `created_at` combined with liveness-probe per [handler-contract.md §4.10 HC-044a] (recorded PID not live OR PID recycled to non-harmonik-daemon argv) establish staleness. Filesystem `mtime` MAY be used ONLY as tie-breaker when content-based probe is ambiguous (PID live but argv identifies different harmonik-daemon generation). Content parses cleanly + PID live + identifies current generation → NOT stale regardless of mtime. PID dead → stale regardless of mtime. v0.3.0 mtime-only dependence narrowed.
      **Post-sweep `git worktree prune`.** After removing stale locks AND after WM-003a orphan-directory routing (WM-003a routes to reconciliation Cat 3; routing does NOT itself remove git metadata), sweep MUST invoke `git worktree prune` against `<repo>` to drop stale `.git/worktrees/<name>/` metadata entries. Prune is safe: skips entries with operator-issued `git worktree lock`; harmonik never issues `git worktree lock` itself (worktree-lock disjoint per glossary I5). Operator lock respected.
      **Cross-spec coordination.** OQ-WM-005 elevated to BLOCKING-CROSS-SPEC; WM's path + JSON content authoritative. WM does NOT write a second legacy-compatible lock file.
    extra_labels:
      - "axis:idempotency-idempotent"

  # ───────────────────────── §4.9 Re-run rule ─────────────────────────

  - mnem: wm-034
    kind: req
    req: WM-034
    title: "reopen-bead → fresh run_id + fresh worktree + fresh task branch"
    description: |
      Per WM-034: when investigator agent issues `reopen-bead` verdict per [reconciliation/spec.md §4.5 RC-020] and [reconciliation/schemas.md §6.1 Verdict], subsequent claim of reopened bead MUST produce a new run with FRESH `run_id` distinct from every prior run_id ever dispatched against the bead. Fresh run_id becomes lease key for FRESH worktree at canonical path `<repo>/.harmonik/worktrees/<new_run_id>/` and FRESH task branch `run/<new_run_id>` per WM-005. Prior run's run_id, worktree, and branch persist on disk per WM-031 (lease-lock released per WM-013b). This rule closes tension between path canonicality (WM-002) and failed-run persistence (WM-031): distinct runs land at distinct paths because run_ids differ. Minting of fresh run_id is execution-model's responsibility; this spec asserts only that workspace manager MUST observe a new run_id on entry and MUST reject any attempt to reuse a prior run_id at workspace-create time.
    extra_labels:
      - "axis:idempotency-non-idempotent"

  - mnem: wm-035
    kind: req
    req: WM-035
    title: "Intra-run rollback verdicts keep the same worktree + task branch"
    description: |
      Per WM-035: intra-run rollback verdicts — `resume-here`, `resume-with-context`, `reset-to-checkpoint` per [reconciliation/spec.md §4.5 RC-020] — MUST keep the same worktree and same task branch. Run's `run_id` unchanged; state reverts to the named checkpoint via git operations inside existing worktree per [execution-model.md §4.10 EM-044]. The `rollback_to_state_id` field on the transition record (EM-044) is the mechanical driver of the rollback.

  - mnem: wm-036
    kind: req
    req: WM-036
    title: "Re-run vs intra-run classification deterministic on 7-value verdict enum"
    description: |
      Per WM-036: decision between "fresh worktree" (WM-034) and "keep worktree" (WM-035) MUST be deterministic on verdict enum value declared in [reconciliation/schemas.md §6.1 Verdict]. No cognition participates. Authoritative classification against the seven-value verdict enum (per RC-020 as amended in RC v0.3.0):
      • `reopen-bead` — fresh worktree + fresh task branch + fresh run_id (WM-034).
      • `resume-here` — keep worktree + keep task branch (WM-035).
      • `resume-with-context` — keep worktree + keep task branch (WM-035).
      • `reset-to-checkpoint` — keep worktree + keep task branch; state reverts via EM-044.
      • `accept-close-with-note` — no re-run; workspace remains in current terminal state.
      • `no-op-accept` (v0.4.2 row) — no workspace action; record verdict; clear any non-`none` interrupt_state per WM-040 if reconciliation had marked the workspace interrupted; outer run continues per [reconciliation/spec.md §8.12].
      • `escalate-to-human` — no re-run; workspace remains in current terminal state; operator escalation per [operator-nfr.md §4.3].
      Prior WM v0.2 `abandon` verdict text retired per §12. Any verdict value not in the table is malformed per [reconciliation/spec.md §4.5 RC-023] and MUST NOT be routed; classifier returns classification-error to caller and emits no workspace action. Bilateral attribute proposal (`worktree_disposition` on Verdict) tracked at OQ-WM-009. The `no-op-accept` row resolves OQ-RC-011.
      **Interrupt-state side-effect (v0.4.2 row).** On `no-op-accept`, the orchestrator MUST also clear the per-run InterruptState sidecar per WM-040 if the workspace had been previously marked interrupted by reconciliation, ensuring no stale interrupt persists for the same `(run_id, node_id)` after the verdict-disposition completes. This composes with the no-workspace-action posture: the verdict is recorded and any non-`none` `interrupt_state` is cleared back to `none` via the WM-040 mechanical clearance path; the outer run continues per [reconciliation/spec.md §8.12].

  # ───────────────────────── §4.10 Interrupt-state representation ─────────────────────────

  - mnem: wm-037
    kind: req
    req: WM-037
    title: "interrupt_state orthogonal to lifecycle for in-flight states (5-value enum)"
    description: |
      Per WM-037: workspace record MUST carry `interrupt_state` field orthogonal to lifecycle state of §4.4 FOR THE IN-FLIGHT STATES (`created`, `ready`, `leased`, `merge-pending`, `conflict-resolving`). Values: `none` (default; no interruption), `operator-paused` (operator pause interrupted lease), `operator-stopped-graceful` (graceful stop in progress), `operator-stopped-immediate` (immediate stop; handler subprocess may have been killed), `daemon-crash-suspected` (pre-reconciliation placeholder for run whose lease was not cleanly released). Lifecycle state (e.g., `leased`) and interrupt_state (e.g., `operator-paused`) compose independently within the in-flight set. Enum values locally owned by this spec but map onto operator-control vocabulary per [operator-nfr.md §4.3 ON-011] and reconciliation Cat 6 detector carve-out per [reconciliation/spec.md §8.11]. This spec does NOT redefine those vocabularies; projects them onto a workspace-local field for dispatch convenience.

  - mnem: wm-037a
    kind: req
    req: WM-037a
    title: "Terminal lifecycle states carry no interrupt signal"
    description: |
      Per WM-037a: terminal lifecycle states `merged` and `discarded` MUST carry `interrupt_state = none`. A transition into terminal state MUST clear any non-`none` interrupt state as part of the transition. Any interrupt signal received against a workspace already in terminal state MUST be rejected silently by workspace manager (`InterruptOnTerminalWorkspace` per §8) and logged as operator-observability event per [operator-nfr.md §4.9]; workspace state MUST NOT transition and `workspace_interrupted` (emitted by reconciliation per WM-039) MUST NOT fire against a terminal workspace. Bounds the orthogonality claim of WM-037 to the in-flight state set; eliminates the "interrupt a merged workspace" semantic anomaly.

  - mnem: wm-038
    kind: req
    req: WM-038
    title: "interrupt_state set by operator + reconciliation pathways; WM is sole writer"
    description: |
      Per WM-038: transitions of `interrupt_state` driven by (a) operator control subsystem per [operator-nfr.md §4.3 ON-013] emitting operator-control events that the workspace manager observes and applies; (b) reconciliation per [reconciliation/spec.md §4.5] emitting verdicts that the workspace manager applies. Workspace manager MUST be the SOLE writer of `interrupt_state` field on the Workspace record. Workspace manager MUST NOT mutate `interrupt_state` except in response to (a) observed operator-control event or (b) observed reconciliation verdict execution. No other subsystem may mutate the field; cross-subsystem requests to change interrupt_state MUST route through the event bus.

  - mnem: wm-038a
    kind: req
    req: WM-038a
    title: "Workspace-local marker for operator/verdict-driven interrupt_state mutations"
    description: |
      Per WM-038a: when workspace manager mutates `interrupt_state` in response to operator-control event (pause, stop, upgrade) OR reconciliation verdict (crash-recovery disposition), there is currently NO durable wire-event signaling the mutation: [event-model.md §8.5.5] names reconciliation detector as sole emitter of `workspace_interrupted` and scopes to Cat 6 crash detection. Operator-driven and verdict-driven transitions therefore risk being invisible to downstream consumers until the next full reconciliation pass.
      To close locally (without waiting for EV's emitter broadening per OQ-WM-016), workspace manager MUST on every `interrupt_state` mutation (`none → non-none` OR `non-none → non-none`) append a single workspace-scoped JSONL line to `${workspace_path}/.harmonik/events/workspace-<workspace_id>.jsonl` and fsync. Marker shape: `{"event":"interrupt_state_changed", "workspace_id":..., "run_id":..., "prior_interrupt_state":..., "new_interrupt_state":..., "cause":<operator-event-type | verdict-kind>, "cause_event_id":<optional>, "changed_at":<rfc3339>}`. Marker is authoritative durable record consumed by reconciliation's sweep pass per [reconciliation/spec.md §4.3]. WM MAY additionally emit async bus event as in-process hint; marker is the durability signal.
    extra_labels:
      - "axis:idempotency-idempotent"

  - mnem: wm-039
    kind: req
    req: WM-039
    title: "WM observes interrupt transitions but does NOT emit workspace_interrupted"
    description: |
      Per WM-039: on any transition of `interrupt_state` from `none` to non-`none`, workspace manager MUST update record atomically with causing input (operator-control event or reconciliation verdict) such that new state is durable and observable by reconciliation detector. The `workspace_interrupted` event per [event-model.md §8.5.5] is emitted by reconciliation detector, NOT by workspace manager; payload schema (workspace_id, run_id, detected_at, category) is EV-owned. Workspace manager MUST NOT emit `workspace_interrupted`. This rule reflects split of emission authority: workspace manager owns the interrupt_state FIELD (mutation per WM-038); reconciliation detector owns the wire EVENT (emission per EV §8.5.5). Prior WM v0.2 text declaring WM as emitter retired per §12. OQ-WM-006 tracks unresolved coordination with EV.

  - mnem: wm-040
    kind: req
    req: WM-040
    title: "interrupt_state reset to `none` requires reconciliation OR operator resume"
    description: |
      Per WM-040: clearing `interrupt_state` back to `none` MUST be driven by either (a) `operator_resuming` event per [event-model.md §8.7] and [operator-nfr.md §4.3 ON-013] for operator-initiated interrupts, or (b) reconciliation verdict per [reconciliation/spec.md §4.5] for daemon-crash or lost-lease interrupts. Workspace manager MUST NOT silently clear the field. Sensor: any mutation of `interrupt_state` to `none` not preceded by a matching causing event is a violation, detected by reconciliation detector's transition-audit pass per [reconciliation/spec.md §4.3 RC-010].

  # ───────────────────────── §5 invariants ─────────────────────────

  - mnem: wm-inv-001
    kind: invariant
    req: WM-INV-001
    title: "Sensor: lease-by-run is honored corpus-wide"
    description: |
      Per WM-INV-001: every subsystem observing a workspace MUST treat workspace's run_id as exclusive lease holder for run's full lifetime per WM-010. No subsystem MAY mechanism a per-agent lease acquisition. Constrains orchestrator (S01; dispatch), agent runner (S04; handler-launch preconditions), workspace manager (S06; storage), reconciliation (lost-lease detection), memory layer (S08; session-metadata consumption). Workspace-layer realization of centralized-controller principle per [architecture.md §4.9 AR-INV-007].
      Sensor: reconciliation's startup lost-lease detector per [reconciliation/spec.md §8.11 Cat 6] correlates each live lease-lock file against Beads' record of owning run_id and against daemon's live-run registry; any workspace with lease-lock whose run_id does not appear as in-flight run (or whose lease-lock is missing while run is in-flight) is a violation evidence route.

  - mnem: wm-inv-002
    kind: invariant
    req: WM-INV-002
    title: "Sensor: one in-flight run per bead"
    description: |
      Per WM-INV-002: for every bead, every subsystem routing on run activity MUST assume at-most-one in-flight run. Multi-run-per-bead allowed across time only after prior run has reached terminal state per [execution-model.md §4.3 EM-014]. Reconciliation's post-crash detectors MUST reject observations of multiple in-flight runs for one bead as inconsistency evidence per [reconciliation/spec.md §8.11 Cat 6a]. Beads-integration's terminal-write rule (BI-010) and workspace-manager's WM-012 both rely on this.
      Sensor: Cat 6a detector (bead `in_progress` with two+ task branches each advertising `Harmonik-Run-ID` without `Harmonik-Verdict-Executed`) per [reconciliation/schemas.md §6.3].

  - mnem: wm-inv-003
    kind: invariant
    req: WM-INV-003
    title: "Sensor: checkpoint commits obey git append-only on the task branch (two-part)"
    description: |
      Per WM-INV-003: any git observer of a run's task branch MUST reject commits whose new tip is not a fast-forward descendant of the prior tip (no amend, rebase, filter-branch, force-push, `git replace` rewrite, or history-editing operation may rewrite history on a task branch that has emitted `workspace_leased`). Git's native commit semantics are the contract; this spec adds no transactional layer. Constrains handler-contract (S04 handlers per [handler-contract.md §4.1]), workspace manager (merge-back), execution-model's checkpoint-cadence per [execution-model.md §4.5 EM-023].
      Sensor (two-part):
      • Part A: branch-tip monotonicity. EM-024a check — daemon persists last-observed task-branch-tip SHA per in-flight run; any non-fast-forward discrepancy routes to reconciliation Cat 3 per [reconciliation/spec.md §8.4]. Catches amend/rebase/force-push.
      • Part B: history-editing audit. Conformance-time invariant-auditor tool walks `git reflog` for every live task branch; rejects any reflog entry whose operation is `filter-branch`, `replace`, or non-fast-forward `update` on a run still in in-flight state. Tool home pending `testing.md` per OQ-WM-017. Catches filter-branch/replace tip-identity-preserving rewrites.
      WM does NOT rely on reflog for state reconstruction (per [execution-model.md §4.7]); reflog dependence confined to invariant-auditor test tool — robust against operator-configured aggressive `gc.reflogExpire`.

  - mnem: wm-inv-005
    kind: invariant
    req: WM-INV-005
    title: "Sensor: canonical-path discovery without a registry"
    description: |
      Per WM-INV-005: any subsystem reconstructing workspace state from filesystem MUST derive workspace location from run_id alone per WM-002 without consulting a separate registry, index, or SQLite table. No registry-backed lookup MAY be declared authoritative for workspace path resolution. Constrains workspace manager (WM-013, WM-013c), reconciliation's startup pass per [reconciliation/spec.md §4.3], orchestrator's run-resume logic at restart.
      Sensor: WM-013c filesystem discovery by construction — any workspace whose path does not match `<repo>/.harmonik/worktrees/<run_id>/` for some recognized run_id is a violation, detected by startup enumeration pass and routed to reconciliation Cat 3c (inverse premature-close) or Cat 6a (integrity violation) per [reconciliation/schemas.md §6.3].

  # ───────────────────────── §6 schema beads (5) ─────────────────────────

  - mnem: wm-schema.workspace
    kind: schema
    schema_kind: schema
    title: "Define `Workspace` record (§6.1)"
    description: |
      Implement the 12-field RECORD: workspace_id (String, deterministic from run_id per WM-004); run_id (UUID); repository (String, absolute path to LOCAL clone per WM-001 + WM-002); parent_commit (CommitSHA); branch_name (String, task-branch name per §4.2); path (String, absolute filesystem path); state (WorkspaceState ENUM); interrupt_state (InterruptState ENUM); bead_id (BeadID | None, opaque correlation field); implementer_handler_ref (HandlerRef | None, set at merge-pending per WM-022); metadata (Map<String, String>, closed map: keys "created_at" RFC 3339, "operator_fingerprint"); schema_version (Integer, N-1 readable per §6.4; set by S06 on create). Type aliases: CommitSHA per [execution-model.md §6.1]; BeadID per [beads-integration.md §6.1]; HandlerRef per [handler-contract.md §6.1]; UUID is UUIDv7 per [event-model.md §4.1 EV-002].

  - mnem: wm-schema.lease-lock-file
    kind: schema
    schema_kind: schema
    title: "Define `LeaseLockFile` record (§6.1)"
    description: |
      Implement the 4-field RECORD (per-workspace file at canonical §6.2 path; JSON body per WM-013a): run_id (UUID, owning run); pid (Integer, daemon PID that wrote the lock); created_at (Timestamp, RFC 3339 wall clock); ttl_sec (Integer, advisory lifetime; does not enforce auto-expiry — informative for orphan sweep). Lock-file existence represents the lease; absence represents released. Birth at `leased`, death at `merged` / `discarded` per WM-013b. Atomic write discipline per WM-013a. Cross-spec coordination: HC-044a + PL-006 disagree on filename; OQ-WM-005 BLOCKING-CROSS-SPEC; WM's path + JSON content authoritative.

  - mnem: wm-schema.workspace-state
    kind: schema
    schema_kind: enum
    title: "Define `WorkspaceState` enum (§6.1)"
    description: |
      Implement the 7-value ENUM: created, ready, leased, merge-pending, conflict-resolving, merged, discarded. Terminal states: `merged`, `discarded`. In-flight states: everything else. Drives §7.1 transition table. The `setup` value retired in v0.3.0; MUST NOT be reintroduced (was never reachable in §7.2 pseudocode and contradicted WM-016 ordering).

  - mnem: wm-schema.interrupt-state
    kind: schema
    schema_kind: enum
    title: "Define `InterruptState` enum (§6.1)"
    description: |
      Implement the 5-value ENUM: none (default; no interruption), operator-paused, operator-stopped-graceful, operator-stopped-immediate, daemon-crash-suspected. Orthogonal to WorkspaceState for in-flight states only per WM-037 / WM-037a. Enum values locally owned by this spec but map onto operator-control vocabulary per [operator-nfr.md §4.3 ON-011] and reconciliation Cat 6 detector per [reconciliation/spec.md §8.11].

  - mnem: wm-schema.session-metadata-sidecar
    kind: schema
    schema_kind: schema
    title: "Define `SessionMetadataSidecar` record (§6.1)"
    description: |
      Implement the 7-field RECORD: run_id (UUID); node_id (String, namespaced `<parent_node_id>/<sub_node_id>` inside expanded sub-workflows per WM-026); agent_type (String, agent-type conformance class per [architecture.md §4.7 AR-024]); workflow_id (UUID); bead_id (BeadID | None, present iff run is bead-tied); launched_at (Timestamp, RFC 3339); schema_version (Integer, N-1 readable per §6.4; set by S06). Authoritative join key for CASS indexing AND authoritative source for agent-type at merge-time implementer identification per WM-022. Atomic write discipline per WM-026.

  # ───────────────────────── §8 error taxonomy (single bead per §2.6 BrError shape; F-pilot-WM-2) ─────────────────────────

  - mnem: wm-error.taxonomy
    kind: error-taxonomy
    title: "WM error taxonomy (§8) — 12-class typed sentinel set + transitions + downstream routing"
    description: |
      Per §8: implement the 12 typed sentinel classes + workspace-transition consequences + downstream routing rules:
      • `WorkspaceAlreadyExists` — `create_workspace` observes existing directory at canonical path. (no transition) → orchestrator reports run-create failure; reconciliation Cat 3c may fire on reboot if prior run's terminal transition incomplete.
      • `RunIdReuseForbidden` — `create_workspace` observes run_id has been dispatched before (violates WM-034). (no transition) → orchestrator run-create failure; caller-error class.
      • `WorktreeCreationFailed` — `git worktree add` non-zero (bad parent_commit, concurrent git lock, disk full). (remains in initial) → orchestrator run-create failure; operator-observability per [operator-nfr.md §4.1 ON-001].
      • `LeaseLockHeldByOrphan` — `create_workspace` / `launch_session` observes live lease-lock belonging to prior daemon generation per WM-013c / HC-044a. (stays out of `leased`) → Launch fail-fast per [handler-contract.md §4.10 HC-044a]; reconciliation Cat 6a investigator if correlation reveals lost lease.
      • `SidecarWriteFailed` — metadata sidecar write fails on I/O (disk full, permissions, concurrent file conflict). (stays out of `leased`) → run reported failed; operator-observability.
      • `MergeConflictUnresolvable` — implementer re-dispatch or all-mechanical-branch per WM-022a produces no successful merge. `conflict-resolving → discarded` → `merge_conflict_escalation` per WM-023.
      • `InterruptOnTerminalWorkspace` — operator-control or reconciliation signal targets `merged` / `discarded` workspace. (no transition per WM-037a) → silent reject; operator-observability log entry only.
      • `RefNameInvalid` — integration-branch template substitution (WM-006a) produces a name that fails `git check-ref-format` after canonical fallback, or transformed name is empty / collides case-insensitively. (remains in initial) → orchestrator run-create failure; operator-observability.
      • `BareWorktreeNoLease` — discovery (WM-003a) finds registered worktree with no lease-lock and no sessions. (no transition; directory is orphan) → reconciliation Cat 3 via evidence type `bare-worktree-no-lease`.
      • `SidecarWithoutLease` — discovery (WM-003a) finds registered worktree with sidecars but no lease-lock. (no transition; directory is orphan) → reconciliation Cat 3 via evidence type `sidecar-without-lease`.
      • `GitignoreWriteForbidden` — WM-013e detects `.gitignore` missing required entries AND daemon lacks write permission. (startup-fail) → daemon refuses to start; operator must fix `.gitignore` permissions.
      • `GitVersionTooOld` — WM-ENV-002 detects installed git below 2.34 at daemon startup. (startup-fail) → daemon refuses to start; operator must upgrade git.
      Detection of each class is daemon's responsibility; class identity flows to event bus via appropriate lifecycle event's payload (event-model owns schema), or to operator-observability per [operator-nfr.md §4.9].
      **Single-bead form (per discipline §2.6 + F-pilot-WM-2).** WM's §8 is a flat typed-sentinel set (BI shape: BrError-style enum of error sentinels), NOT a multi-stage classification scheme like RC's Cat 1..Cat 6. Single `wm-error.taxonomy` bead is correct. The 12-class count is just above RC's ~11 threshold figure — the SHAPE discriminator (flat vs nested) drives the §2.11(c) decision, not COUNT.
      **§2.11(c.2) edge direction.** Vocabulary owner → consumers `block-on` taxonomy. Edge direction `<req> → wm-error.taxonomy` ALWAYS; never inverse.
    extra_labels:
      - "kind:taxonomy"

  # ───────────────────────── Test-infra beads (7) ─────────────────────────

  - mnem: wm-test.worktree-primitive-fixture
    kind: test-infra
    title: "Worktree primitive + crash-evidence fixture (WM-001..004 + WM-003a)"
    description: |
      Per §10.2 (WM-001..004 + WM-003a): filesystem-scenario tests — `git worktree add -b` runs produce canonical path + fresh branch atomically; workspace_id derivable from run_id after daemon restart; run_id filesystem-safety regex enforced; workspace_id prefix treated as opaque by consumers (negative test); crash scenarios produce `bare-worktree-no-lease` and `sidecar-without-lease` evidence types per WM-003a and route to reconciliation Cat 3. Foundation harness for downstream WM tests.

  - mnem: wm-test.branch-naming-fixture
    kind: test-infra
    title: "Branch-naming + ref-safe substitution fixture (WM-005..009 + WM-005a + WM-006a)"
    description: |
      Per §10.2 (WM-005..009 + WM-005a + WM-006a): branch-naming unit tests — task-branch and integration-branch templates produce expected names; parent-bead-derived integration branch survives `git check-ref-format` validation; pathological bead-ID inputs (`@{`, `//`, sole `@`, leading `.`, trailing `.lock`, control chars) exercise canonical hex-encode fallback and re-validate; small-scope-collapse operator-policy-gated (default `integration`, override `main`); sub-workflow expansion does not create additional task branches.

  - mnem: wm-test.lease-fixture
    kind: test-infra
    title: "Lease-lifecycle + crash-recovery fixture (WM-010..013 + WM-013a..e)"
    description: |
      Per §10.2 (WM-010..013e): multi-agent-sequential scenario tests — three agents run in sequence in one worktree; lease-lock written exactly once per lease with atomic temp+rename+fsync+parent-dir-fsync; lock JSON content matches WM-013a; lock released on terminal transitions (WM-013b) with lock absence AND workspace-local `lease_released` marker as release proofs; per-terminal-path release gates exercised (merged, run_failed, post_escalation, verdict_driven); filesystem discovery matches canonical path (WM-013c); canonical-path re-use rejected (WM-013d); `.gitignore` hygiene enforced at startup with `GitignoreWriteForbidden` surfaced if daemon lacks write permission (WM-013e).

  - mnem: wm-test.merge-back-fixture
    kind: test-infra
    title: "Merge-back + scratch-worktree fixture (WM-018..021 + WM-018a + WM-019a)"
    description: |
      Per §10.2 (WM-018..021 + WM-018a + WM-019a): merge-back scenario tests — one-commit-per-task on integration branch; `--strategy=ort` pinning verified; synthesized commit message carries `Harmonik-Run-ID` + conditional `Harmonik-Bead-ID` trailers with author = LaunchSpec identity (agentic) or daemon identity (non-agentic), committer = daemon identity; scratch merge-worktree lifecycle (create-use-remove) validated via WM-019a option (b); conflict detection from non-zero `git merge --squash` exit + porcelain status works.

  - mnem: wm-test.conflict-resolution-harness
    kind: test-infra
    title: "Conflict-resolution + 3-attempt-cap harness (WM-022..024 + WM-022a)"
    description: |
      Per §10.2 (WM-022..024 + WM-022a): cognition-tagged integration tests with twin implementer — synthetic merge conflict triggers implementer re-dispatch using `implementer_handler_ref` derived from sidecar walk (NOT from trailer walk; confirm absence of `Harmonik-Actor-Role` dependency); three-attempt default cap exercised with escalation on cap-reach; operator-configured cap in [1, 10] tested and out-of-range values rejected at startup; unresolvable case emits `merge_conflict_escalation`; all-mechanical task branch skips re-dispatch and escalates directly per WM-022a; handler-class retirement case routes to escalation (WM-024 terminal clause).
    extra_labels:
      - "tag:cognition"

  - mnem: wm-test.session-log-fixture
    kind: test-infra
    title: "Session-log + atomic sidecar fixture (WM-025..030)"
    description: |
      Per §10.2 (WM-025..030): filesystem tests — metadata sidecar exists before `workspace_leased` for first session; sidecar atomic write (temp+rename+parent-dir-fsync) verified; `.tmp-<pid>` orphan cleanup by startup sweep; subsequent session sidecars do not re-emit `workspace_leased`; namespaced `node_id` tested inside expanded sub-workflow; `.gitignore` excluding `.harmonik/sessions/` detected as misconfiguration; CASS (S08) reads sidecar + log; post-merge retention default verified.

  - mnem: wm-test.reconciliation-and-interrupt-harness
    kind: test-infra
    title: "Failed-run + verdict + interrupt-state harness (WM-031..036 + WM-037..040 + WM-037a + WM-038a + WM-INV-003 part B)"
    description: |
      Per §10.2 (WM-031..033, WM-034..036, WM-037..040 + WM-037a/WM-038a + WM-INV-003 Part B): daemon-restart scenario tests — failed-run worktrees persist across restart; lease-lock released on terminal failure per WM-013b with marker before unlink; orphan sweep uses content-first staleness (mtime tiebreaker only) per WM-033; `git worktree prune` invoked after sweep; operator-issued `git worktree lock` respected. Verdict-driven scenario tests — `reopen-bead` creates fresh worktree at `run/<new_run_id>`; reuse of prior run_id rejected; `reset-to-checkpoint` / `resume-here` / `resume-with-context` keep worktree; `accept-close-with-note` / `escalate-to-human` produce no re-run; `no-op-accept` clears interrupt_state if previously marked; unknown-verdict produces classification error. Interrupt-state tests — interrupt_state composes with lifecycle in in-flight set; `workspace_interrupted` emission comes from reconciliation detector only (crash path); operator/verdict-driven transitions write workspace-local `interrupt_state_changed` markers per WM-038a and consumed by reconciliation on next sweep; interrupt signals against terminal workspaces silently rejected per WM-037a; clearing requires operator resume or reconciliation verdict; non-matching clearance attempts detected by reconciliation's transition-audit pass. WM-INV-003 Part B prose-level test — synthetic `git filter-branch` on task branch during live run MUST be detected by invariant-auditor tool once `testing.md` lands (OQ-WM-017).

