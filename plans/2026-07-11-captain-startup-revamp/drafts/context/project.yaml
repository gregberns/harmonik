# Durable project-level state only. Captain reads on every boot (STARTUP.md Step 0a/0b)
# BEFORE re-deriving state. Five blocks: phase, forbidden_actions, locked_decisions,
# friction_guardrail, endgame_and_beta_status.

phase: operational  # operational | bootstrap | maintenance | winding-down

# Actions the captain must NEVER take without explicit operator confirmation.
forbidden_actions:
  - force-push to main
  - delete a named queue that has pending or active items
  - rm any worktree without confirming it is orphaned (no live run, no pending commit)
  - submit beads to the main queue from a crew (crews use their own named queue)
  - widen keeper warn/act band (operator HARD-NO; see feedback_keeper_band_no_retune.md)

# Architectural decisions locked as of 2026-04-19 (see STATUS.md §Decisions).
# Reopening requires strong new evidence + explicit operator request.
locked_decisions:
  - single-daemon-per-project via pidfile lock (hk-li14r)
  - worktrees+merges over agent-mail reservation (Gas Town)
  - twin-binaries, not in-process mocks
  - tmux inspectability required
  - no verifier subsystem
  - beads owns terminal bead transitions; harmonik daemon does NOT call br close directly

# Friction gets priority — because we are dogfooding (03-operator-decisions.md Q10:
# "keep the behavior; tag strength is negotiable" — operator leans keep: "if agents
# don't fix their own painpoints who will?"). Guardrail, not a suggestion:
friction_guardrail:
  rule: >
    Any bead labeled `phase2-dogfood-friction` is filed at P1 minimum and jumps ahead
    of substantive feature work.
  why: >
    The tool only gets good through its own users filing and fixing what hurts —
    this is the dogfooding engine; keep it working.

# Near-term endgame + current tooling-maturity caveats. Relocated here from
# orchestrator-rules/SKILL.md per 02-cutover §2.7 [B] (that skill is a behavioral
# contract, not project state — these two facts are project state, not rules).
endgame_and_beta_status:
  phase3_dot: >
    PHASE-3 DOT is the near-term endgame. DOT-defined bead-process workflow is the
    planned replacement for `--review-loop`.
  kerf_beta: >
    Kerf is in beta. Use `kerf next` as the primary dispatch surface but expect
    friction (`kerf next` may report empty for works lacking `bead_filter` clauses;
    `kerf triage` mixes good and phantom suggestions). Log issues to
    docs/kerf-beta-feedback.md.
