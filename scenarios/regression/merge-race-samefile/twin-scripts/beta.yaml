# Twin script: merge-race-samefile / beta (loser)
#
# Role: beta — the second twin to commit; in the same-file merge race, beta
# is the loser whose squash-merge fails with non_ff_merge because alpha has
# already advanced the integration branch.
#
# startup_delay_ms: 200 makes beta start 200 ms after alpha, ensuring alpha
# commits first and the winner/loser relationship is deterministic.
#
# The commit_on_cue step writes a sentinel file and commits it.  The
# sentinel_path payload field declares the shared path that BOTH twins write
# to, so the daemon's merge path faces a genuine same-file conflict.
# ST3 (hk-q3u57) confirms or extends commit_on_cue to honour sentinel_path.
#
# Cite: specs/handler-contract.md §4.8 HC-036a; hk-xeqtv (ST1).
heartbeat_mode: scripted
startup_delay_ms: 200
messages:
  - type: handler_capabilities
    payload:
      run_id: run-hkxeqtv-mr-beta-001
      session_id: sess-hkxeqtv-mr-beta-001
      protocol_versions_supported:
        - 1
      claude_session_id: claude-sess-hkxeqtv-beta-001
    relative_timestamp_ms: 0
  - type: agent_ready
    payload:
      run_id: run-hkxeqtv-mr-beta-001
      session_id: sess-hkxeqtv-mr-beta-001
      capabilities:
        - scripted
        - commit_on_cue
    relative_timestamp_ms: 10
  - type: agent_output_chunk
    payload:
      run_id: run-hkxeqtv-mr-beta-001
      session_id: sess-hkxeqtv-mr-beta-001
      chunk_index: 0
      bytes_emitted: 256
    relative_timestamp_ms: 5
  - type: commit_on_cue
    payload:
      sentinel_path: merge-race-sentinel.txt
    relative_timestamp_ms: 0
  - type: outcome_emitted
    payload:
      run_id: run-hkxeqtv-mr-beta-001
      session_id: sess-hkxeqtv-mr-beta-001
      node_id: node-hkxeqtv-mr-beta-001
      outcome_status: WORK_COMPLETE
    relative_timestamp_ms: 5
  - type: agent_completed
    payload:
      run_id: run-hkxeqtv-mr-beta-001
      session_id: sess-hkxeqtv-mr-beta-001
      exit_code: 0
      outcome_ref: run-hkxeqtv-mr-beta-001/outcome
    relative_timestamp_ms: 0
