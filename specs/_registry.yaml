# Harmonik spec requirement-prefix registry.
#
# Every spec under specs/ that declares a `requirement-prefix` in its front
# matter MUST have an entry here. The lint check (see
# docs/foundation/spec-template.md §Conformance checklist) verifies that
# each spec's prefix is present in this file and not duplicated.
#
# To reserve a new prefix:
#   1. Pick a 2-3 letter uppercase code unique across the table below.
#   2. Add an entry with `spec-id`, today's date as `reserved`, and `status: draft`.
#   3. Land the registry edit and the new spec in the same commit.
#
# Status values: draft | reviewed | finalized | superseded.

